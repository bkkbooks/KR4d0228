body:
  text: 雪山集卷十六宋王質撰詩餘相見歡薄霜霜花零落全稀不成飛寒水溶溶漾漾軟琉璃紅未湧青已露白都晞案此下原本缺四字沙暖戲鳧鷖長相思暮春紅疎疎紫疎疎可惜飄零著地鋪春殘心轉孤鶯相呼燕相呼樓下斜楊遮得鳥倚欄人已無前調漁父山青青水青青兩岸瀟瀟蘆荻林水深村又深風泠泠露泠泠一葉扁舟深處横垂楊鷗不驚生查子見梅花見汝小溪灣修竹連疎影林杪動風聲驚下毿毿粉見汝大江郊髙浪搖枯本飛雪宻封枝直到斜陽醒楊栁枝淡月慣得嬌雲趕不開去還来淡光無可照樓臺且停杯薄雨疎疎時幾㸃灑浮埃賣花未上擔兒擡聴他催浣溪紗和王通一韻簡虞祖予何藥能醫腸九回榴蓮不似蜀當歸却簪征帽解戎衣淚下猿聲巴峡裏眼荒鷗磧楚江涯夢魂只傍故人飛又夢到江南夢却回夢歸何處得身歸故溪渌浄看鳧衣下到瞿唐春欲杪桃花香浪渺無涯三台回望五雲飛又征雁年来得幾回春風無雁帶書歸故應春瘦減春衣花桞傷心經嵗月江湖無夢失津涯到家無樹不紅飛前調有感細雨蕭蕭變作秋晚風楊栁冷颼颼無言有淚灑西樓眼共雲山昏慘慘心隨烟水去悠悠一蓑一笠任孤舟清平樂感懐江沙帶濕莎露和烟泣落日欲低紅未入悄悄暮峰凝立疎林秀色荒寒頻頻駐騎回看應是梧桐影下秋風蹙碎眉山又㫁橋流水香滿扶疎裏忽見一枝明眼底人在山腰水尾梨花應夢紛紛征鴻呌斷行雲不見緑毛么鳳一方明月中庭前調梅影從来清瘦更被春僝僽瘦得花身無可有莫放隔簾風透一枝相映孤燈燈明不似花明細看横斜影下如聞溪水泠泠眼兒媚送别雨潤梨花雪未乾猶自有春寒不如且住清明寒食數日之間想君行盡嘉陵水我已下江南相看萬里時須片紙各報平安西江月借江梅蠟梅為意夀董守月斧修成膩玉風斤琢碎輕氷主人無那壽杯深倩取花来喚醒舞罷繡裀鳳蹙飲䦨畫閣香凝試將花蕊數層層猶比長年不盡泣梅又輕蠟細凝蜂蜜薄羅深壓鵝黄玉容縱不似他郎也在百花頭上試看眉間一㸃全如瓶裏孤芳明年此日趁鴛行記取今朝勝賞蠟梅前調和王道一韻促畫屏蹙蹙紅中烟潤梢梢翠尾風斜閒軒幽樹少啼鴉此處最宜君畫望眼不知天濶歸心常恨天遮見君江浦到蘆花意在琵琶亭下軒外有石榴芭蕉壁間有所畫江浦蘆鴈前調感懐壁水橋邊此客金鑾坡上何人沙塲老馬事無成淚濕青瑩夾鏡袖手烟霏小景回頭石嶺空城乾坤遺恨渺難平目斷塞鴻孤影滴滴金晚眺隂隂濕霧霜無汁江氣逼樹聲滴荒林只見夕陽入誰喚晚烟集漁翁猶把釣竿執蓑共笠時時葺風剛浪猛早収拾天外莫雲黒燕歸梁送别拂拂春風入馬蹄駐緑楊堤緑栁堤上乳鸎啼聲聲怨怨春歸而今一似花流水蹤跡任東西利成名遂在何時早贏得兩分飛青門引尋梅尋遍江南麓只有斑斑野菊梅花不遇我心悲一枝得見便是一年足微香来自横岡竹飛度寒溪曲落路尋人借問謝他指向深深谷鷓鴣天山行空響蕭蕭似見呼溪昏樹暗覺神孤微茫山路纔通足行到山深路亦無尋草淺㨂林疎雖疎無奈野藤粗春衫不管藤搊碎可惜教花著地鋪前調詠漁父一隻船兒任意飛眼前不管是和非魚兒得了渾閒事未得魚兒未肯歸全似懶又如痴遮些快活有誰知華堂只見燈花好不見波平月上時一斛珠十一月十日知郡宴吳府判坐中賦海棠風流太守未春光試回春手天寒修竹斜陽後翠袖中間忽有人紅袖天香國色濃如酒且教青女休僝僽梅花元是羣花首細細商量只怕梅花瘦前調桃園賞雪寒江凝碧是誰翦作梨花出花心猶帶江痕濕輕注香腮却是桃花色飛来飛去何曾宻疎疎全似新相識横吹小弄梅花笛看你飄零不似江南客前調有寄平塘玉立薄羅飛起層層碧人心不似花心宻待要相逢未必相逢得襪塵不動何曽濕芙蓉橋上曽相識櫓聲搖去江聲急西北髙樓回首浮雲隔怨春郎宿池口蘆花已老蓼花已老江腹衝風山頭殘照暮烟不辨栖鷗識歸舟歸舟照顧新洲閣驚波惡别㨂深灣泊南津北濼水村總沒人家莽平沙虞美人即事縁隂夾岸人家住橋上人来去行舟逺逺喚相譍全似孤烟斜日出閶門浪花拂拂侵沙嘴直到垂楊底吳江雖有晚潮回未比合江亭下水如飛前調李敷文席上翠隂融盡毿毿雪慘澹花明滅嫩沙拂拂漲痕添想見故溪緑到草堂前夕陽紅透櫻桃粒掩映深沈碧成都事事似江南只是香衾兩處受春寒臨江仙和徐守聖可縹緲清霄雲一握太清羣玉光中鈞天聲裏拂香風紫皇低接手穏步上層空雀扇徐開鸞影轉日髙舞動蛟龍雙瞻御座立昭容回班趨複道環珮響丁東又千頃翠圍遮緑浄菱花影落波中看看紅錦漾清風此時催入覲烟浪拍雲空佇見觚稜棲寳爵旌旗全仗飛龍赭黄一㸃現真容御麻宣未畢雲鏡上天東前調宴向守簇曲水流觴修褉事袚除洗盡春愁舉樽再拜壽君侯只今虚鼎足好去作班頭自古相門還出相春旗小駐南州雲孫將紹祖風流他時如見憶江漢一漁舟前調南樓席上夀張守八字山頭来較晚彩雲未散南樓夕陽千丈映簾鉤君侯如欲老江水莫教流扇底清歌塵不動胡牀明月清秋天漿為浪玉為舟酒䦨君便起歸去立班頭定風波夜賞海棠曲曲䦨干曲曲池萬紅繚繞錦相圍花到黄昏思欲睡休睡眼前多是好相知銀燭轉添花轉好人在花深深處更相宜似此好花須愛惜休惜鬢邊消得兩三枝前調贈將問訊山東竇長卿蒼蒼雲外且垂綸流水落花都莫問等取榆林沙月静邊塵江面不如盃面濶卷起五湖烟浪入清樽醉倒投牀君且睡郤怕挑燈看劍忽傷神又白璧黄金爵上卿紫宸殿下拜絲綸纔出龍門開虎帳但看甲光如水夜無塵古古今今男子事搖動芙蓉旗影入金樽到得關河公事了早去白雲堆裏養精神蘇幕遮守倅移厨孟夏上澣使君通守不以荒寒肯臨老杜所謂盡日淹留佳客坐百年粗糲腐儒餐者也兩辭極道湖山雲月之趣因以記相與之意云水風輕吹不皺上下浮光兩鏡光相就雲錦搖香吹散酒細聴清談玉屑津津嗽明月前斜陽後竹露秋聲拂拂寒生袖掇取湖山聊入手紫閣黄扉到了終須有前調送張刪定赴召驛塵飛天意緊香雪芝封猶帶吳泥潤昨夜寳奩開玉鏡一㸃西風便覺寒秋近白蘋洲紅蓼徑風露凄清快促黄金鐙疊疊重重聴好信擲了碧油幢更擲雙堂印前調聞鵑啼眼將穿腸欲裂聲聲似向春風説春色飄零自是人間客不成淚都成血朝朝暮暮何曽歇叫徹斜陽又見空山月又夜茫茫春寂寂含烟叫裂空山石吸盡東風化作垂紅滴漏將䦨情轉極月明繞樹聲聲急無數閒花盡染啼痕濕青玉案木樨中央自有仙風度散入千林去萬㸃秋芳洒飛露舜裳赭色堯眉黄彩化作花無數層層翠葆鸞旗舞吹下天香遍瑤宇萬嵗千秋奉明主桂華月苑蕊珠寳殿長聴黄金縷前調池亭浮萍不礙魚行路細數魚来去静倚溪隂深覓句碧鮮清潤影搖香度易覺䦨干暮鳧鶵深傍蘋根住浴罷紅衣褪殘縷一寸江湖無可付渚蘭汀草卧烟欹雨荒了垂綸處江城子席上賦細風微揭碧鱗鱗繡帷深不聞聲時見推簾籠袖玉輕輕不似綺樓髙捲幔相指㸃總分明斜灣叢桞暗隂隂且消停莫催行只恨夕陽雖好近黄昏得到釵梁容略住無分做小蜻蜓又細風吹起翠田田雨和烟入梅天鮮潤繁隂悄悄轉清圓十頃蒲萄深貯碧鷗共鷺各翩翩影搖香度小嬋娟竹林賢總神仙滴露飛霜雲壑注氷泉伴了芙蓉城裏客無一事北牕眠前調宴守倅栁梢無雪受風吹緑垂垂乳鴉啼直下蒲萄春水未平堤郤似今年春氣早白團扇已相宜紅巾當日鳥銜飛曲江湄暮春時孔雀麒麟交蹙繡羅衣何似野堂陪勝客花影外竹隂移驀山溪詠茶枯林荒陌矮樹敷鮮葉不見雅風標十二分山容野色因何嫩茁舞動小旗槍梅花後杏花前色味香三絶含光隠燿塵土埋豪傑試看大粗疎争知變寒雲飛雪休説休説世只兩名花芍藥相牡丹王未盡人間舌滿江紅幕府諸公郊外同集以病不去方丈維摩䝉衲被都齊不省空悵望錦裘繡帽玉珂金鐙十月小春逢此日一時勝事輸公等問短衣匹馬射南山何人肯山暮紫峰如筍江寒碧沙如粉望塞鴻杳杳水遙天永飲罷不妨瓶屢卧歸来自有風吹醒試㫁橋流水月明邊尋疎影前調慶夀整頓乾坤恨舞袖回旋不足須付與腰金疊赤面槐參緑功業豈無人可了英豪自有心相伏自孤牕寒燭聴經綸常三復舉大白傾醽醁為公起歌此曲曲中意惟有斯賢堪屬萱草喜除煩惱障蓮華妙享清涼福願年年團扇弄生綃長如玉前調春日慘淡輕隂都養就朱朱白白最好是梨花帶雨海棠映日暖霧烘成芳草色嬌風分與垂楊力聴紅邊翠杪囀清圓曽相識春緒亂還如織春夢㫁還堪覓看青梅下時有遊人嘖嘖愛酒正香須滿泛憐花太嫩休輕摘把領巾収聚衆香濃憑風立又生縠平鋪吹不起輕風無力西江上斗牛相射水天一色二妙風流今代少一時光價何時息更絳霄白日下雲軿芙蓉客整飛馭成得得尋前約寛憶憶正雲飛雨巻舊紅新碧茁茁抽長荷柄緑毿毿吐浄楊花白漸衣篝香潤入楊天紅綃濕前調漁舟莽莽雲平都不辨近山逺水儘徘徊尚留波面未歸灣尾浪猛深深鷗抱穏波寒縮縮魚沈底恐狂風顛雨岸都摧舟難艤船篷重拖不起蓑衣濕森如洗想杖頭未足盃中無計漁網吹翻無把捉釣竿凍㫁成抛棄到髙歌風静月明時誰如你前調牧童落盡斜陽尚有些㫁霞殘影甚灣環東溪西巷南巖北嶺行熟更教羊引著睡濃却被鴉驚醒漸孤村樹暗顫山欹霜風冷人世裏嫌他蠢牛背上輸他穏但芒鞵一緉蓑衣一領五臓荒坡蔬薦口雙髽幽崦花漫頂雖雲烏月黒路䝉籠何曾窘前調聴琴紙帳梅花有叢桂又有脩竹是何聲雪飄逺渚泉鳴幽谷紅蓼白蘋須拂袖餘音尚帶清香馥挽素娥青女問飛瓊誰家曲韓退之歐永叔惚兮恍恍兮惚試側耳山常似黛水常如玉顔子操中何足怨醉翁徽外無人續正青天明月上東南芳時足水調歌頭京口江水去無極無地有青天怒濤洶湧巻浪成雪蔽長川一望揚州蒼莽隠見烟竿雙矗何處捲珠簾落日𤓰洲渡鴻鷺滿風前古戰場皆白草更蒼烟清平猶有遺恨久矣在江邊北固山前三傑遙想當年意氣亹亹昵中原上馬促歸去風墮接䍦翩前調中秋飲南樓呈范宣撫細數十年夢十處過中秋今年清夢還在黄鶴舊樓頭老子箇中不淺此㑹天教重見今古一南樓星漢淡無色玉鏡倚空浮帶秦烟縈楚霧熨江流關河離合南北依舊照清愁想見姮娥冷笑笑我歸来霜鬢空敝黒貂裘把酒問清影肯去伴滄洲前調遊銀山寺和壁間張安國作晚嶂倚斜日秋樹戰悲風一泓紺紫澄碧中有睡蛟龍散作清溪明玉激上長松流水雨電亂寒空抛却紅塵袂飛入妙光宫佛國大天溥博地含洪空巖亂壑遞響珠影動金容萬古碧潭空界一㸃青霄明月澇漉總無功雲散殿突兀風動鐸丁東又草蔓已多露松竹總含風羣山左顧右昐如虎更如龍時見魚燈三兩知在誰家浦溆星斗爛垂空萬有付一掃人世等天宫秋蕭瑟林脱葉水歸洪江湖飄泊鴻雁洲渚肯相容要使羣生安堵不聴三更吠犬此則是竒功一任畫麟閣吾自老牆東前調九日雲巘在空碧天宇共髙明重陽易得風雨今日不勝晴天為兩朝元老付與四時佳節不動一絲塵香靄洗金㦸飛霧洒霓旌山鳴葉江動石總懽聲劍關玉壘千載誰見此昇平細看樽前萬蕊相映眉間一㸃黄氣鬱駸駸江漢下淮海都賴一長城前調饒風嶺上見梅花上插蒼碧花下走清湍濃霜深覆殘雪更有月相參似我竹溪茅屋欲曉未明天氣扶杖繞籬看秦楚五千里何處是江南饒風下人不㫁馬相連頗嘗見有此客相屬意惓惓欲為横吹出塞無處可尋羌管短䇿叩征鞍策㫁征鞍裂驚墮玊毿毿前調夀查郎中淮海一星出分野到梁州玉京羣帝朝斗公在列仙流盡掃攙搶格澤髙拱紫微太乙霞佩拂紅稠非霧非烟裏永侍紺雲裘日南至月既望壽君侯梅花滿眼一朶聊當一千秋半夜玊堂承詔翼旦路朝宣冊歸去作班頭風浄瞿唐峡安穏放行舟前調慶夀河漢湛秋碧玉露曖瑤空太清仙子飄渺飛佩響玲瓏暫馭青鸞紫鳳来玩十洲三島旌旆捲芙蓉身在大江表名繫絳霄宫兩仙客歌駐月舞迴風寳薫輕度簾幙香霧結重重已覺長安近日㑹看北星朝斗千載慶雲龍翠靄彤烟裏長侍衮衣紅八聲甘州懐張安國海茫茫天北與天南吾友定安歸聞濡須江上皖公山下駕白雲飛莽蒼空郊虚野古路立斜暉顔跖皆塵土苦淚休揮一代錦腸繡肺想英魂皎皎健口霏霏望寒空明月無路寄相思嘆千古興亡成敗滿乾坤遺恨有誰知今何在一川烟慘萬壑風悲安國死後在准南屢降憑箕作詩詞偈頌及結字比生前愈竒偉淮寧宰陸同得遺墨尤多前調讀周公瑾傳事茫茫赤壁半帆風四海忽三分想蒼烟金虎碧雲銅爵恨滿乾坤鬱鬱秣陵王氣傳到第三孫風虎雲龍㑹自有其人朱顔二十有四正錦帷秋夢玉帳春聲望吳江楚漢明月伴英魂浥浥小橋紅浪濕撫虚絃何處得郎聞雪堂老千年一瞬再擊空明前調讀諸葛武侯傳過隆中桑柘倚斜陽禾黍戰悲風世若無徐庶更無龎統沈了英雄本計東荆西益觀變取竒功轉盡青天粟無路能通他日雜耕渭上忽一星飛墮萬事成空使一曹三馬雲雨動蛟龍看璀璨出師一表照乾坤牛斗氣常衝千年後錦城相弔遇草堂翁前調讀謝安石傳氣佳哉烟紫石頭城雲碧雨花臺想東山前後望春樹緑看晚潮回自古英雄豪傑無不待時来擁鼻微吟處山静花開商皓亦嘗如此羨蒼生皆有瞻望之懐但淝河洛澗此事偶然諧疑是彼八公草木得神明相亮不相猜西州淚千年猶濕回望興哀倦尋芳試墨氷壺秋月去了潘郎傳到梁老騎馬乘船麾斥五湖三島任梢雲兼拂日拽蛟龍鱗鬛都推倒向塵中分付髙人勝士把雲烟掃乾坤巧自蒼筠無汗烏錐無刃此為至寶第一君門通表書囊諫草第二文章揚事業第三編簡攄懐抱千百般終久被他磨了前調渡口酒家斷崖樹老側岸槎枯倒倚斜揷脚面淺溪掌樣平洲重疊著芒鞵攜竹杖遇亂莎幽澗縈紆涉那人家有竹篘瓦缶頗頗清冽曾微呷正斜陽淡淡暮靄昏昏晚風獵獵轉眼已成陳迹不堪追躡試問舊醅還好在暫停歸影留時霎待重来細拈弄水花山葉萬年歡有感一輪明月古人心萬年更寸心存滄海化為黄土心不成塵杳杳興亡成敗滿乾坤未見知音撫䦨干欲喚英魂沈沈又没人譍無聊欹枕搔首夢廬中壇上一似平生共挽長江為酒相對同傾不覺霜風敲竹睡覺来海與愁深拂袖去塞北河西紅塵陌上尋人真珠簾栽竹翠虬夭矯拏蒼玊飛来到吾廬溪灣山麓一笑忽相逢更解包投宿北池之畔西牆曲與主人呼青吸緑恨我無天寒翠袖共倚脩竹每遇飛雪蕭蕭更驚風摵摵清標可掬更與月同来無半㸃塵俗冬有寒梅閒相伴春亦有幽蘭相逐香足纔露下飛霜又有秋菊沁園春閒居二百年間十二時中悲歡往来但蓋頭一把容身方丈無多縁飾莫遣塵埃屈曲成幽蕭條生浄野草閒花都妙哉家無力雖然咫尺強作縈回竹齋向背松齋須次第春蘭秋菊開在竹籬稀處宻栽甘橘荆橋斜畔疎種香梅山芋芼羮地黄釀粥冬後春前皆可栽門通水荷汀蓼渚足可徘徊紅窻怨送邵倅欲寄意都無有且須折贈市橋官桞看君著上征衣也尋思榜舟楚江口此㑹未知何時又恨男兒不長相守苟富貴無相忘若相忘有如此酒前調即事簾不捲人難見縹緲歌聲暗隨香轉記與三五少年在杭州曽聴得幾遍唱到生綃白團扇晚涼初桐隂滿院待要圖入丹青奈無縁識如花面鳳時春見殘梅標格風流前輩纔瞥見春風蕭然無對只有月娥心不退依舊㫁橋横在流水我亦共月娥同意肯將情移在麤紅俗翠除丁香薔薇酴醿外便做花王不是此輩泛蘭舟譙天授畫像蕭蕭烏帽黄衫烟水拍雲岩風清月白一雙碧眼瑩秋潭四海九州茫茫東北渺渺西南松霜杉露毿毿龍門隔如參井青城佳氣與天參蔽山充野牡丹紅外茯苓甘鶴頂凝丹隙駒蹀􅞃儘百年間乾坤雲海風颿譙名定涪陵人受道于伊川後棄鄉里隠河洛復歸蜀居青城之老人村至今尚存無月不登樓種花池塘生春草夢中共水仙相識細撥氷綃低沈玊骨攪動一池寒碧吹盡楊花糝氈消白郤有青錢㸃㸃如積漸成翠亭亭如立漢女江妃入奩室擘破靚粧擁出夜月明前夕陽敧後清妙世間標格中貯瓊瑤汁才嚼破露飛霜泣何益未轉眼度秋風成陳迹别素質請浙江僧嗣宗住庵一箇茅庵三間七架兩畔更添兩厦倒坐雙亭平分扶䦨兩下門前數十丘䆉稏塍外更百十株桑柘一溪活水長流餘波及蔬畦菜把便是招提與蘭若時抄疏鄉園看經村社隨分斗米相酬鐶錢相謝便闕少亦堪借借常収些筍乾蕨鮓好年嵗更無兵無火快活殺也雪山集巻十六
