body:
  text: 雪山集卷十一宋王質撰雜著和陶淵明歸去來辭元祐諸公多追和柴桑之辭自蘇子瞻發端子由繼之張文潛秦少游晁無咎李端叔又繼之崇寕崔德符建炎韓子蒼又繼之居閒無以自娛隨意屬辭姑陶寫而已非自附諸公也歸去來兮朝而出兮暮而歸曠煙淨而川明幽風度而林悲魚游泳其自適鳥飛逸其難追觸一境兮皆實徙一歩兮俱非坡向陽而起塵崖背陰而生衣人益逺而益稀路轉深而轉微嶺寒虎蹲林響鹿奔間聞舂聲俄覩柴門桑柘少茁艾蕭多存山肴無皿野醅無樽畦丁老而斑首饁婦稚而赬顔倚嘉木而假息藉柔荑而求安春容蕩而澹沲春聲婉其間關山苞擷而堪餐巖花睨而可觀雀鬬驚而葉墜鳧泛盡而波還俄羽毛其毿毿有鷹隼其桓桓歸去來兮行雲流水同斯游雲于水兮無取水于雲兮無求既無鄉其容喜亦無國其容憂深青青兮隆陂暗㶁㶁兮平疇陸有芒鞵川有松舟桃李側兮竹岡蘿杉外兮茆丘杳谷兮虗音曲竇兮微流月騰波而欲上日斂轡其將休已矣乎今為何日仍何時非我孰能與于此他人不可使知之白蓮自有社赤松自有期燦玉樹兮何植炯瓊苗兮何耔吾不知典謨訓誥之書亦不知國風雅頌之詩樂天知命吾何憂窮理盡性吾何疑祈晴文三日以往尚且為霖一春以來可謂常雨支頤何望奔命安歸自故年赤地之餘至今日轉溝之極一之為甚旱與水其可荐臻二者何先麥比蠶尤為至急妄希一得已十失全攷之箕疇則咎徵屬狂稽之月令則陽氣不勝儻非造化曷致燮和伏願哀愍下民保綏首種若能得此庻幾接西寳之秋如或不然難以度南薫之夏厥罰常雨咎則有歸彼蒼者天民其何罪伏念臣將明失指感召無方自知蟻蝨之微盍下雷霆之譴委一身而䝉責冀百姓之蠲災大地衆生莫知所措皇天后土實鑒斯言伏願號召鬼神奮除宇宙顯行白日駿發清風儻一極之無凶庶九功之無壊祭昭勇廟陰兵文千載英靈與此邦而作鎮一朝緩急捨遺愛以誰依方羽檄之交馳蔑金墉之可恃潢池弄盜今時惟興國之多敵騎詭行前日有武昌之渡雖恃邦君而不恐有非人力之所能敢告于神無忘兹土九歌之國殤既死願普收鬼魄之雄八公之草木有靈或恐致人形之肖祭梓潼神文物情多私聖人弗憑于是有託度量權衡又不可信則求諸神是非紛綸至神乃定曷維其然大明至正天地不悖聖人不惑其曰無疑以神為質伋也有訓參貫三極某有沈寃無與控言神如皦日為某一暾某有竊憤無與攄發神如震雷為某一泄某有愚忠無路可通神其介之上逹帝聰某有樸學無地可廓神其道之下及民瘼司命東皇靈均所些已矣無人非神孰可某言孔悲聞者則怡流涕告哀不得一噫某身良苦見者則憮鞠躬乞憐不得一拊某亦人乎忍也如此使國無法某則當死當死若生維神所命凡人之言曾何足聽若此有罪亟下嚴誅若其無辜盍亦鑒諸祭虞丞相文采石之危危于淝水淝距長江尚隔千里岐亮之鋭鋭于苻堅秉幟登壇刑馬告天維公之功功于安石彼乃處中公切凴敵采石之急急于澶淵澶當其衝敵頓莫前岐亮之才才于宗真華夷悉俱百萬是羣維公之難難于萊國潛超猶全錡權皆北自古强敵三宼江淮瓜歩徐歸國無人哉燾至平城命殱宗爱厥軀雖夷厥師弗敗惟堅與亮宗覆身殞天耶人耶鑒此其警堅還長安餘年而斃亮殂維揚期月而已靖康建炎嗟公生遲早三十年强敵奚為國有丕烈天與英傑釣渭築巖如印鑰符節將定淮蔡遺元和度將復河湟遺㑹昌德裕克西雍東洛至德維郭下兩淮三關顯德維朴在辛巳紹興豈天無心弗有斯厄弗有斯人維宋無極維功無斁乗雲空飛矯首何及貌在凌烟功在太常名在四方以暨八荒哀摧我肝液漲我睫欲報無從一念千劫柴君益深哀辭并序玉山汪先生其言為世所師柴君淵之誌之銘之出也其孰敢不信余不識君而君之猶子端義書來告曰叔父既有以識諸幽而聲諸顯者闕也公其辭之謹按誌銘所書士之仕也猶農夫之耕行其義也故植芸耦耕孔子弗與同其羣今君年五十有五以死而無為階仕之哀哉士之尊賢非王公之尊賢也天位天職若天禄皆天之物也王公有之而弗可獨則當與天下賢者共之故費惠晉平終于此而已矣孟子屈而士之卑之也今君年五十有五以死三者無一日加焉哀哉臧文仲其竊位者與知柳下惠之賢而弗與立也見賢弗立王公之至醜而世恬居之則賢誰與為媒以逹其志道之不行我知之矣哀哉言無實不祥不祥之實蔽賢者當之災祥非士所當計也竊位不足以醜蔽賢而後以不祥驚之然固自若也則君子所以佑賢之意殆將窮耶哀哉死者已矣而賢者之存于世或老且窮而莫舉之若君所師清湖先生徐君存者胡可謂無人乎哀哉余之哀如此又廣其意而為之辭曰余于君悲也有不堪其悲二也有可以塞其悲亦二也有不獨為君悲而為世悲又二也有不獨為世悲而為我悲不可以一二數而無窮極期也道與位相依有道而無位則不堪其悲一也德與年相隨有德而無年則不堪其悲又一也有賢猶子增之以益崇之基則可以塞其悲一也有大宗師濟之以不朽之資則可以塞其悲又一也生民賴賢以濟有賢于此而阨窮使利澤不見于世則為世悲一也王公倚賢以榮有賢于此而槁死使羞及于在位之公卿則為世悲又一也士君子資賢以益有賢于此而先逝共域而不得見同時而不及識則我悲何有窮極也王仲説哀辭并序王仲説大夫仕于時不苟于其職繩繩律律引義助法操切事情他人不足仲説有餘所謂能者非耶然天下學士多訕怒之豈所謂人情者哉語曰才者動色不才失魄非虗言也察察似刻栗栗似暴汲汲似躁世所以病才盖亦有端非苟而已也真偽相形能否相臨所謂莫能兩大者耶勢逼伎生故緩不切事不謂之迂謂之大體繆無能為不謂之庸謂之長者斯言之行于世也才者病焉昔者趙廣漢以擊斷死蓋寛饒以亢直誅李德裕郭崇韜以果敢斃裕于才者凶其家足于能者殃其身不亦悲乎優哉游哉聊以卒歲此不亦無咎無憂康寕而考終命耶然立志之大不以彼而易此者不肯自欺其心也吾于仲説之死而哀之辭曰五溪兮紛流蹇不進兮淹留渉其淺兮濡轡亂其深兮無舟日冉冉兮崦嵫下鬼出遊兮跳舞庭有鐘鼓兮擊考左春華兮右秋素滿堂兮芳菲出門兮不顧虎弗􅕭兮君車亦平生好遊之故也進無底兮退無依也吁嗟已矣兮命之衰也湘水之上兮九疑盍往兮陳辭曰維帝其天兮臣死無歸誌銘周德昭墓誌銘易有否泰其言天下治亂備矣君子小人内外消長否泰分焉故君子有位而後天下治反是殆哉岌岌乎斯民也江西有君子周其氏珩其名德昭其字位止于簿既致仕也宣教郎終其身有文學言語聲于太學時其為士也有政事聲于潭之長沙郴之永興時其為官也有德行聲于撫之臨川時其為鄉老也斯亦無憾矣嗚呼君子所計非其位也位者載道之器也故仁者在髙位則宜賢人在下位而無輔則悔君子所計非其位也道也君子不得其位奚損而弔之何哉宣和四年議復燕要人有慕交者密訪之君言不宜且後患必大㑹本兵者方專不敢以聞靖康元年金人犯京師君獻書論天下所以存亡當國者交讙讙無能為天子語二年天子䝉塵于青城敵帥以我臣為力相與鬻國于太宰張邦昌君遮勸范瓊絶苦瓊弗聽嗚呼推此類具言之君子不得其位不可以為大事非耶當是時君博士弟子也使君在位或如君者在位在位矣君臣又相得也則伐燕之舉可定卻金之䇿可遂立楚之議可格雖未必能然其殆庻幾乎故邦之興喪有可以一言決也君既無意于世自號足翁其終八十有八年矣見崇寕宣和之恬熙見靖康之俶擾見建炎之中興見紹興之載寧見隆興乾道淳熙之寖盛嗚呼其閲世之長如此事業不著于時德澤不加于民然而以善藥救人命以善言救人心盖三十餘年于其鄉又延及比境其功亦豈少哉曰翰曰衮曰擇其曾王父王父若考也曰昱曰景曰三俊曰三省曰三益田佃曰僖曰僎其子若孫也某氏某氏張氏其曾祖王母王母若妣也黄氏其婦也初王父擢嘉祐八年進士異等後六年鄉人王介甫得政意下士可華膴動之乃陳介甫所建為非是又騰書以切磋之遂不合晚為藤州以死君逮事之其淵源所漸豈淺鮮哉銘曰縣以臨川鄉以長寧其山靈谷君子有之降爾遐福嵗以丁酉月以壬子日與嵗一君子宜之俾爾多益書以九齡狀以煥之實維陸氏有連于兹介景之辭今質以詩是嵗仲秋吉日辛巳乃恪乃蠲如其所志維君有堂誠意正心欲觀其人盍攷厥名羣聖一門繇此塗出逹者得之何事不畢視君斯堂瓦解氷融誰謂君死如月當空百世之上百世之下其誰與歸當有知者東平王君鍚墓誌銘王氏去山東來江南自甲叔君玉發科始更為儒家君玉資豪爽妙言語不屑措意生理惟丙叔君鍚事乙兄惟謹陳力庀事于有無贏縮之間君玉推心倚之某是時甚稚年旁觀丙叔于乙兄蓋精確非矯餙也少孤長以李觀之字為名而君鍚表之間關多依君玉方秦氏奉金人凡索無少違乙叔秀叔與安陽郭氏為倩夫婦皆當行君玉聞之亟命君鍚自巴陵趣豫章趣錢塘祈哀當位者雖弗諧殊可壯也某尚記其從都返命形枯足裂固已太息今世兄弟之風衰薄而君鍚能如此于季孟雖不皆然斯亦難矣某稍進有益聲見多方藐無同氣之風求如君鍚于君玉何其鮮也今世兄弟見先登則嫉見不羣則忌寖憎而不已則芟夷之某嘗涕泗横絶而弗禁也君鍚生長亂離視詩書希闊然樂見其兄飛騰翩蹮每告語則動喜色益為之奔奏禦侮此風非當世之君子見謂誦讀書者比也君鍚遇事多機間關往諜見昔人挾智術而取功名者愛之倘逢時伸志事為雖不純當可觀也晚依先隴勞生六十有三而死瘞其某地某原子某孫某而誌者甲姪某也銘曰汶乎生􅎵乎死惟汶滺滺惟滫泚泚魂兮魄兮毋痛歸父兮母兮皆在此雪山集卷十一
