body:
  text: 雪山集卷十三宋王質撰五言律詩何處難忘酒何處難忘酒英雄太屈蟠時違聊置畚運至即登壇梁甫吟聲苦干將寳氣寒此時無一盞拍碎玉䦨干次蕪湖聞張彥晉船已行陸路如蛙鈍江流似馬馳不嫌君去速只恨我來遲兒女三杯酒溪山五字詩英豪到此地莫更問何時蕪湖道中擾擾千支水攢攢一簇村牛羊紛下括鵝鴨閙爭門晚徑飃松子秋田長稻孫霜天好風日壯士鐵衣温山行卽事二首轉岸波仍急瀕溪路半無柳低侵樹腹蓮濕墜花鬚田舍籬憂倒漁舟柁喜扶雨餘山更碧倍費我工夫浮雲在空碧來往議陰晴荷雨洒衣濕蘋風吹袖清鵲聲喧日出鷗性狎波平山色不言語喚醒三日酲和御製詩五首案此詩當是孝宗乾道三四年間所作某前日恭䝉樞密宣撫出示御製春日聖作名儒巨公賡載之餘輒采其意之未盡者和成五章寒逺不能以通帝所持詣鈞墀仰塵崇覽列聖兼仁武隨時議戰和佇開新日月重照舊山河西北浮雲斂東南王氣多大唐功十二一一付鐃歌大慶通宣德西華近保和草荒朱雀道沙壅護龍河九廟烟塵暗七陵風露多君王既神武父老莫悲歌舊京宣德門與大慶殿相値自西華門即入保和殿御路直朱雀門南薫門外則護龍河濠楚前通泗舒廬内接和眼看花靨渡夢想白溝河火德時方盛金行數不多儒臣且經略未要載賡歌鼎待周公定羮須傅説和上方資羽翼誰解廢江河志定功應就時來力不多晉公門下客豫製凱旋歌景運開乾德昇平到政和七星摇帝座兩界隔天河義士何曽少謀夫不在多鯉魚長尺半恐有扣牛歌集杜子美句賦所居二首田舍清江曲柴扉掃徑開野花乾更落水鳥去仍囘渺渺春風見冥冥細雨來幽棲身懶動坐穩興悠哉野屋流寒水春星帶草堂忘機對芳草駐屐近㣲香農事空山裏柴門古道傍眼前今古意看劍引盃長郊居不著烏紗帽自開青竹籬鴈號殘月渚猿掛冷霜枝有淚不知落無心空自悲人情正翻覆去住總難期秋興有願投金粟無情上玉除吾甘披短褐君自曵長裾浥浥雲生屋涓涓水到渠十難三四好八九在閒居物幻詩北海鯤從化南枝蟻戰勲宋龜靈自困周蝶夢誰分外物不可必此形何足云勞生竟不覺幻境徒紛紛次虞樞密九日登髙韻案此詩及挽楊参政詩當是乾道三四年間所作風動旗千榦霜明甲萬聨愁邊悲有淚幽燧冷無煙殺氣藏金鉞台光照玉船元豐韓相國故事講軍前代虞相挽楊參政二首特起西南紀孤飛五十年名登千佛頂位亞六階躔文社尊韓伯經門事董先山川有冥㑹公在孝廉阡道德平生足功名歲晚成掛冠方再表負杖忽三聲樂夀兼仁智哀榮備死生我家無故老不忍見公傾代李叔介挽楊參政運泰風雲合名髙泰華秋杓衡方北指江漢已東流寡祐良臣死鍾情志士憂驚心波浪裏不見濟川舟有感北斗䦨干外浮雲拄杖中天髙千障立月静一江空宇宙横揮麈乾坤落轉蓬浩歌聊舉酒無泪哭英雄卽事竹色交簷暗苔痕擁舍深羣麕無定響斷鴈有孤音戀闕穿雙眼憂時折寸心中原既傳檄乃更有陳琳送晁侍郎二首案此詩當是乾道六年所作元衮催韓覲鏘鸞遲甫歸無功生靜福有道正危機棄智輕觀世忘言妙格非五車書滿腹字字莫相違昔欲全家託今惟隻影依任從龜左顧獨自鵲南飛災淺謀三至心危泣百揮英豪天下少不敢廢依歸次青渠市井雖聊爾風光略勝他稻田方稍稍瓦屋漸多多得路皆平地逢山但淺坡日斜煙欲集將奈晚寒何舟中作二首昨日到今日滿江常湧波山川非不好風浪抑何多所愧累公等固知如我何柁樓無晚照髙臥一長歌昨夜一葉落秋風江漢波晶晶紅日淡慘慘素烟多世事今如此吾曹可若何凄凉聊繫棹一和大風歌上王公明壽四首案王公明名炎為四川宣撫使此詩當是乾道七年所作緱氏吹簫逺王家奕葉光昔多稱建業今獨盛安陽泰華何曾老江河各自長一名重兩火與宋大休祥正統承周後元臣在鄴昌治平扶嗣聖乾作道興王指日恢中土何時過故鄉新堂標晝錦門下有歐陽稷契伊周後功名事業誰眼驚希世傑心喜太平時不老池邊鳳長生印上龜旂常書不盡太廟有宗彝風起雲飛志包含具善鄰試看公出手毋謂我無人揮羽思平魏登場决幷秦功成身莫退小駐八千春采石道中聞説前年事分明是偶然羣雄誇好手萬事有蒼天浪沫埋椿木波聲撼戰船蕭條苦鬭者揮淚立江邊魏城道中岡背車㾗亂崖陰馬足黏地爐茶帶苦幔店酒多甜水減溪身瘦冰凝樹角銛衣篝都已盡無可更重添青陽道中二首今日青陽路行行不忍過人家茅屋少原野稻田多樹木連蒼色陂塘湛碧波斜陽攲半嶺將奈鏡亭何一路皆平坦今朝稍屈盤僕飢争小店橋斷㨂枯灘處處山都好家家酒不酸人生各有地所樂是長安宿石谿寺落日寒山裏荒烟野寺中僧垣水衣白佛座蘚花紅舍後蜂糖熟門前雁米豐夜長難早睡擁被聽松風敕局同年相餞是日謝遣婢子春饒者還其家同年大不然之共悵然也案此詩當是乾道七年所作已恨此身多將如之子何自甘吾潦倒真恐汝蹉跎身老便孤睡家貧喜自歌輜軿他日見各想舊婆娑發家書别乘非為辱江陵稍近家牙緋雖滯色頭白亦增華見説堂前竹勝如屋角花脱身歸到得餘事總塵沙上亭雨色昏何在鈴聲怨阿誰一朝人世改萬事帝心知西去身雖脱東邊勢更危秖應南内裏不似上亭時雨花臺亂草踏秋碧斜陽立晚紅天低昏海霧江闊渡惟風臺有餘基壯碑無舊觀豐愁人惜倦眼不敢送歸鴻見九華峯有四十餘其最秀者不知孰為九也因作是詩稍稍雲氣散溶溶山態囘翠旌千丈立寳障百重開此地真堪老何時遂得來海中蛟蜃惡吾不問蓬萊送虞丞相孫運幹詩三首祖予尚閉戸案集中有和通一簡虞祖予浣溪紗詞祖予蓋允文孫之字景文當入山未能黄綺外姑在尚彭間眼到風塵暗頭依樹石斑曹溪有正路飛倦要知還尚象子生子高風新又新昔看三檜戲今見一槐春父祖有家法典型如老人傍觀應自肯自肯乃方親曲肱真事業袖手大文章想子歸家急如吾捨世忙何時見丞相幾日上瞿唐見問宜多説不言君亦忘題東林姚貴高書屋島嶼深沉碧溪花淡薄紅連山收宿雨當戸進凉風暮靄孤村外斜陽一笛中西山起明月未放酒杯空題洪景伯得江亭詩二首眸子發孤照太空無阻修萬波爭赴海一嶂直當樓渺渺憐身小茫茫覺世浮斜陽攲埤堄隨意數行舟主去朝行在花留伴此亭别催心衮衮春攪思冥冥此事須丘壑何人嗣典型但當添種竹相對北山青題舫軒詩一舸江湖外風濤有是非著身安實地冷眼看危機烟樹何曾逺鷗羣故自飛若人能轉物滿載月明歸題施大任雙桂軒詩濯濯雙引幹􅌉􅌉同結根人知靈草木天與好兒孫嫵媚花窺眼婆娑秀此軒門中福未艾遶樹更蘭孫題孤山寺詩窈窕孤山寺光明大士龕佛香時縹緲茶味亦清甘竹挺森千百僧房並兩三全無兵火氣不似在淮南和王充道夜坐二首索索風呼葉蕭蕭雨打牕遙思雙白髮相對一殘缸夢落湘南浦身浮浙右江漏窮鐘未斷猶自咽㣲撞風雨連三日晨昏共一牕天寒憐翠袖夜永對青缸有泪揮吳月無船上楚江夢寒元易斷鐘静不須撞和孫仲甫浦漵清溪遶人家緑樹圍竹墩森翠葆蓮蕩亂紅衣薄雨生朝潤斜陽隱暮霏桃花流水意不在鱖魚肥和姚明之草色動秋緑松陰留晚清日烘蟬吻燥風助燕身輕蒼莽家千里飄零酒一觥客愁銷不盡還與暮烟生送陶茂安赴湖南二首禮樂華今日江湖得此天繡衣開使指錦帳卷郎氈峻嶽車帷外清湘簜節前何如歸禁籞花柳自風烟飄泊年家子依歸父執尊不知分此袂還更躡誰門欲語無言訴相期有意存何時憑水檻凉夜倒清樽送韓總二首斗絶重關險星馳四牡騑昕朝三勞遣晝錦再光輝距踊歡趨死權竒飽欲飛羌兒還解事早送版圖歸飄泊春餘絮孤寒歲晚松誰知文有虎秖道士無龍湓浦城相别蠶叢國再逢論心能幾許山水又重重送鄭德初歸吳中相識雖非昔相知不似今歲寒三益友金斷兩同心半子來歸葉孤兒維事任此間拈鼓笛那更有凡音送清堅老人宰辰陽四首黔郡隨山壌盧溪上水舟雙眸長不夜兩鬢未全秋製錦寕傷手鳴琴自㸃頭武陵花賞遍安穩上瀛洲黔郡盧溪見九域志苦棟風方作桃花水未生逢村宜早住趂路莫宵行且止青春酒頻添碧澗羮槐根幷馬骨切勿厭官清青春酒名碧澗羮名見韓退之杜子美詩云卻背五城關旁連七寳山楚臣經夕宿漢代入辰灣花縣成陰了桃源覓路還功名歸晚節矍鑠上清班五城七寳楚臣漢代皆見輿地記穴出丹砂粒川呈暈角輝向來曽畫諾此去稍斜飛若不吟紅藥還應對紫薇太公雖白髮西伯要同歸挽李平仲二首杳杳歸無極茫茫恨有餘九原那可作萬事總成虛汀草何嘗歇雲山亦自如此囘真定别無雁可傳書窮達皆昨夢死生同一波幻身非我有薄俗奈渠何霜樹柯莖少江湖洲渚多老來不禁淚未忍過懐坡平仲有閣曰懐坡挽吳節夫二首古道在今世今人離古心延陵存一老元祐得遺音樂善稻粱熟憂民江海深二毛方五馬當代阻為霖生死一大事聖賢三致思朝聞應夕可春葉又秋枝高眼世無比㸃頭人有誰朔風吹槁野天地亦含悲贈程元鼎二首邂逅識程子牽連懐老坡山林深自引琴劍肯來過春事已如許客情將若何舟行相風色江面水方波杜宇正呼急程君來告辭自憐吾老矣敢問子何之起柁指行在求官鳴有司歸來定何日秋事以為期憶張安國天上足官府舍人何處歸世情傷幻化道眼羡空飛易合誰終始難言有是非九原如可作來共立斜暉李南卿西歸求語以贈行山谷偈云八萬四千關捩子與君一箇鎖匙開僕亦有一箇鎖匙謹以奉贈之子何方去荆江上渚宫頗知君筆力能嗣我宗風境熟拈來是心圓觸處通贈之一轉語收了萬年功贈同省訪别咳唾相聞地江湖各一天所思無物似此去有人憐身逺何能近心寛自覺便難言知幾許囘首意茫然贈日者何君巨源婺女人與范右史元卿有連其談五行歴歴可聽自富川過蘄春將之武陵塵埃中試求公卿當有雷霆一世者自墮胞胎裏難逃造化中一毫皆有數三昧卽無窮消息深深見機緘了了通君能希八九亦足問元功詠蘆高致想江湖當庭植小蘆清風時自至緑竹興何殊漑灌情偏重琴尊賞不孤朗吟應有趣瀟灑十餘株送胡秉彝歸毗陵千林秋葉深此際有行人握手恨無語出門愁始新殷勤一枝柳聚散百年身眺逺情何極茲來跡已陳雪山集卷十三
