body:
  text: 雪山集卷六宋王質撰記遊東林山水記紹興二十八年八月三日欲夕步自闤闠中出並溪南行百歩背溪而西又百步復並溪南行溪上下色皆重碧幽邃靖深意若不欲流溪未窮得支徑西升上數百尺既竟其頂隠而青者或逺在一舍外鋭者如簪缺者如玦隆者如髻圜者如璧長林逺樹出没烟霏聚者如説散者如别整者如㦸亂者如髪於冥濛中以意命之水數百脉支離轇轕經緯參錯迤者為溪漫者為滙斷者為沼涸者為㘭洲汀島嶼向背離合青樹碧蔓交羅䝉絡小舟葉葉縱横進退摘翠者菱挽紅者蓮舉白者魚或志得意滿而歸或夷猶容與若無所為者山有浮圖宫長松數十挺儼立門左右厯厯如流水聲從空中墜也既暮不可留乃並山北下岡重嶺複喬木蒼蒼月一眉掛修巖巔遲速若與客俱盡山足更換二鼓矣翌日又轉北出小橋並溪東行又西三四曲折及姚君貴聰門俯門而航自栁竹翳密間循渠而出又三四曲折乃得大溪一色荷花風自兩岸來紅披緑偃摇蕩葳蕤香氣勃鬰衝懐罥袖掩苒不脱小駐古栁根得酒兩罌菱芡數種復引舟入荷花中歌豪笑劇響震溪谷風起水面細生鱗甲流螢班班若駭若驚奄忽去來夜既深山益高且近森森欲下搏人天無一㸃雲星斗張明錯落水中如珠走鏡不可収拾𨽻而從者曰學童能嘲哳為百鳥音如行空山深樹間春禽一兩聲倐然使人悵而驚也曰沈慶能為歌聲囘曲宛轉嘹亮激越風露助之其聲愈清悽然使人感而悲也追游不兩朝昏而東林之勝殆盡同行姚貴聰沈虞卿周輔及余四人三君雖紈綺世家皆積嵗憂患余亦羇旅異鄉家在天西南隅引領長望而不可歸今而遇此開口一笑不偶然矣皆應曰嘻子為之記玉淵龍記五老峯於廬山最高其傍有瀑如萬斛鎔銀騰空而下山崖峭峽水盛怒無所輸瀉盤旋勃鬰欲迸崖而出則有巨石如屋如屏如車輪小者猶如釡如鐘磬水力不能加之則益横與石相衝相擊如戰馬如奔象其㣲者猶如鬭雞如獵犬水盡鋭以爭石極力以拒相追數里率未得勝負也忽山崖横裂有如物擘而開之向所謂巨石皆滅没不見有如物掀而去之則有平石曼衍數十丈如几如鏡水力稍寛方肆欲曼流則石勢㣲洼掣水力而赴之盡墜於深潭彼方挾其無窮之怒而縱其不可遏之情不虞其有洼也勢一就之不能以自制方其與石鬭也猶宛轉排蹙未至夫斗落而無以自禁也至是懸奔驟馳無崢嶸岌嶪者沮之其勢則崩撞衝激乃始大肆如奔星如激矢如驚鷗如戲羊其聲如疾雷如震霆如百萬之戰聲其飛流濺沬如急雨如飛雹其窮而下者如潑乳如揮膏是謂玉淵兩崖植立如鑄如削其上則水所自落其下則敷為淺灘湔為細流獨其中不知其㡬百萬丈相傳有龍居之徃徃夜静月明或見有婦人立於潭際者即之輒入于淵有僧負溪為厠夢有婦人訶責安得汚我室比夕再夢僧懼亟去之乃止故以是為雌龍也夫水惟其無心至則受之而玉淵纎芥之觸不納人有負劍澣衣者劍忽躍去趣之併没于潭已而浮尸于潭之上近嵗久雨大水湧至山石皆突出空行潭面而過無一墜者其為龍居信然不疑間雨暘弗若守土之臣有禱必先焉無不立應盖其來久矣紹興三十二年三月十七日予與友人王阮南卿俱來棲賢訪智通不遇則徘徊玉淵亭上有若蛇者驟見于崩濤駭浪之中或與水曲折相抵冒如鈎或引吭樹起如筆平行見其背如黛倒側見其腹如金蜿蜒上下如戲如怒如有所喜予顧謂南卿曰是何為者予疑其非常蛇者二玉淵之上去草木甚逺平衍瑩滑非蛇所冝至且水勢乃爾他蛇至則靡矣尚安能立是二者吾意其龍焉南卿未對智通自外歸指以問之智通駭曰是矣是嘗出焉所聞正若此以子豈有所求歟何為其至也予曰求之而後至不求則不至矣則其出没無亦皆闗於世歟爾言非也予聞古之見異人與物者必其真氣全也天地萬物皆是氣也是氣者全大而天地夥而萬物皆吾類也不全則有所隔異物非能神也有所間斷則若兩家者焉間斷則疎疎則隠隠則神矣而後有異物者生焉三代之前有豢龍氏御龍氏之官其豢而御之也無以異于常畜彼其天機深而嗜慾淺其于真氣未有所傷也則見龍也如見夫馬牛也又奚能神道喪而人偽滋起而後鞭䇿制馬楅衡制牛于馬牛猶所憚而况于龍乎予之聞道末矣嘗于杭州遇異人焉以為可與語也予問其故曰世人委順流靡者最害于道何者見物則遷中無定操也子剛猛而果鋭有所不為世外之欲鮮焉其庶㡬乎兹龍之出豈不以吾偶有自脱于世塵而近道也夫莊子曰天地與我並生萬物與我為一吾然後知玉淵之為吾囊橐而兹龍之為吾血屬也爾乃以為求而致之則徃來于玉淵者相踵爾盍不告之俾求之歟智通曰唯唯沈氏勝栖堂記案此記當是孝宗隆興二年所作余以嵗戊寅來東林此地方為菰田沈氏兄弟竭智力營之自其先君睥睨十餘年至是捐金錢數十萬乃得集市之閒民競輦土石實之役工數千始平稍徙花竹藩飾其處余為指其最勝者曰是可堂異時果堂其以勝栖名之二子齊諾即所指地增築將基為堂者後四年過之所規為略就位置行列皆應繩墨曰凡堂之材若資悉具忌嵗未敢屋以俟明年又三年過之芙蓉木犀梅杏桃李皆成林楊栁冬青皆成䕃修竹滿徑菱荷滿池隠然一堂宏麗靖深挾以蔽軒引以修廊是為勝栖進二子而謂之曰余過此者三初過之地始除再過之堂始營三過之草木森然棟宇穹然昔意於心今形于目二子持家有功抑余告子物難于成易毁事難于進易退守之在誠行之在勤子惟肯堂之志甚確誠守而勤行之乃克有濟先勁後弱始鋭末殺或隳其中何成之云不輟肯堂惟堂故成無斁治身惟身故立人情進退甚亟上之其變三始而慢再而駭三而羡下之其變三始而疾再而憐三而鄙是故丘陵貴增削則寖頺江河貴盈縮則寖涸學問貴益損則寖荒道徳貴崇卑則寖㣲子以為然余將示子以方義重于財厚義薄財徳重于勢就徳輕勢禮重于物崇禮卑物恩重于怨取恩舍怨今日三過堂而堂之事三變他日屢見子而子之能屢更將有信于余言長字虞卿次周輔興國太守題名記案此記當亦隆興二年所作滎陽張公采元亮為此郡無毫髪不稱人意郡闕太守題名元亮心不滿之間謂某曰前事之不忘後事之師也去者漫然來何觀焉不惟如是太守於民有父母之道師帥之義行路視之人情薄哉顧有所不決江西一道十餘州此最毒于兵凡圖書金石皆散壊不可稽騐我最後於諸公故老遺黎日就彫零益無所諮叩數熙豐來楊公繪王公琪各以文章事業表見李公冝又捍難保門有即墨平原之功至于今誦之然追其嵗紀官稱已莫獲其詳姑憑其概見著之懼有舛焉獨得王公旉以次實之將於此乎權輿闕者夥矣如之何而可質曰著而舛猶未著也疑者于法從闕又何尤焉于是始定于王公旉凡若干人具次于左方汪參政生祠堂記案汪參政名澈此記當是孝宗乾道元年所作紹興三十一年秋七月詔以御史中丞鄱陽汪公宣諭荆襄自行都及襄陽所過搜疵剔隠凡格而不流與壅而不上達者咸驛置以聞天子惟公為信疏函朝通膏澤夕下而興國被惠最厚興國地多山谷其稍夷衍者則漫為深瀦淺澤不得盡為民資又當江淮走集之衝徃嘗與東南巨寇桀賊為巢窟蹂躪戕圮較一道十州獨甚舊占籍八萬四千九百有竒今二萬三千六百有竒是存者四之一舊輸苗六萬一千有竒今三萬二千七百有竒是損者十之五以四一之民輸十五之租其他稱是已不可復任而淮衣與税縑並征税縑四千有竒淮衣六千三百有竒垂將倍之公且至衆相謀曰被此毒以來叩郡庭湊使臺謁省闥先後以數十計矣朝廷取決于民部民部有司也奚敢議繩尺之外故屢進弗獲今天子寄公耳目心腹公又聰明果達祥順慈厚與天子意相通試告之冝納既至相率羣拜于庭列次于門且延于衢千人一色慘怛怵惕久乃得言曰維氓幸生兹時還定安集尚敢冀其他惟是淮衣沿襲因循遂成不革灼爛肌膚灰滅頭顱于今有年願假須臾之景有請于公公曰何哉吾惟有不知知之敢有不告天子惟有不知知之豈有弗行爾其示我以詳于是進曰初大河未他裂郡有賦曰黄河巻埽錢緡計一萬七千有竒蘄黄為代輸而郡以縑充之匹計一萬四千有竒自大觀二年始也今黄河不巻埽蘄黄不代輸而淮衣著為經常自紹興五年始也其初二千一百有竒二十五年増六千三百有竒及大觀之數則止膏竭命殫可以損不可以加公其哀之公應曰諾又進曰徃者以錢視縑緡計一百二十有竒得縑百承平時其直相當民雖不欲而猶能堪之今無易縑之錢而一縑之估錢四千五百有竒是一縑而羨三倍之錢徃者蘄黄與興國各有虧餘相通蘄黄為興國供河埽興國為蘄黄調省縑今蘄黄自若而興國獨抱虛逋承實禍是一州而輸三郡之賦公又應曰諾明年春正月公歸拜參知政事具白其事天子即詔有司以為率勿增令下闔一郡三邑數萬之生靈扶伏踴躍首擊地手加額上戴天子次則戴公維天子高視兩儀萬物之上敝屣神器褰裳遺之何藻色之可狀而端倪之可窺公出而與世同憂公不能忘世世亦不能忘公衆又相謀曰古者敬愛其人而不得親或思其人而無所寄情則貌而奉之故其像有畫其祠有堂于是鄉黨喜事有力者相與述人情規古義以請于太守張公采太守曰地庳薄則不稱位宇囂隘則不稱徳書得其略而不得其詳則不稱容乃得西城佛宫相其位置之尤者傑為之屋而擇其輩行之名者工為之貌奔走經營無所不用其至而後得公精神儀幹冠冕佩服之真既具以曉其部之民民曰如是可以無憾雖然自辛及乙宿師用兵五年溝池櫂艦樓櫓營屯之役金鐡絲纊榖粟皮羽之斂魚鱗鳥氄錯布疊出嗚呼殆哉斯民岌岌乎此邦也淮衣至是亦將無以為輸且朝廷知其無名盍亦除之吾儕小人苦不知足之嘲願受而不避無亦使盛世清朝何有待來年之云太守曰天子視民如傷公愛物如己千載一遇不謀而同符公將秉執元鈞佐佑太平兵甲斂息無所興發府庫充仞無所庀藏復常庸蠲常租省常調爾行將見之民曰如是誠可以無憾則以告其客汶陽王質求文以列實質不敢辭不獨以彰天子之聖著公之賢凡志士仁人皆可以動心焉去思樓記案此記當是乾道二年所作興國太守張公未去郡之三月作南門冠樓于其上通守王君澬間語余曰樓將成名未具也此邦人民心不負於公之去而力不足于公之留有怏怏不滿之容有鬰鬰嗟吟之聲夫未去而惜則既去而思也不既切乎吾以去思名之人情宜事實稱也余曰今之為吏與古異也不論古與徃數年又異也不論數年與徃十餘年又異也古者事省而易應法簡而易行物豐而易征人醇而易令故吏之為力也易施長老所傳承平未亂之時雖拙者猶能從容閒暇有辦而無趣退食之餘賞心樂事銷太平之景以余所見距此三數年太守亦或閒庭几而府庫倉廪聞其充未聞其竭也有時而竭亦有時而充未聞其不可復充也獨八九年來為吏者至不可終朝余徃來兵間所厯殆遍東南平時豐州壯縣氣象變改月異而嵗不同諸公所憂方隅乏佳政之吏田野少歡聲之民此亦何足怪也事益繁法益急物益窘人益澆御益澆之人掊益窘之物守益急之法應益繁之事雖黄霸龔遂卓茂魯恭之賢將施其所積而遂其欲不獨余知其難也民不能以盡徇吏故吏之怨民日深吏不能以盡假民故民之讎吏日毒當是之時有未去而怨者矣烏有既去而思者乎而張公所遇又天下之至難建炎紹興之交江西無地無兵而興國受毒最酷舊占籍八萬四千九百有竒今二萬三千六百有竒是存者四之一舊秋輸六萬一千有竒今三萬二千七百有竒夏輸十一萬三千九百有竒今五萬七千一百有竒是損者十之五以四一之民輸十五之租而又無故輸淮衣六千三百有竒雖解兵二十餘年益困弗蘇而辛巳至於甲申復連兵四年溝池櫂艦樓櫓營屯之役金鐡絲纊弓甲皮羽之斂視大州同科而以和為糴者少亦不下五千有竒以汰去軍者多稍増至一百有竒大州不堪而况于興國公來以甲申之夏其去以丙戌之秋經大役者二興國平居為盜賊之淵甲申之虞猺毒垂發公獵取數輩亟慘治之而警其餘姦不得肆民乃少定凡城之隅若江之瀕布民兵其衝逺者敕吏調存撫視近輒自行熾薪爇酒躬酌以飲民博飱巨胾佐之部勒卒乘整厲弓戈出入游警以張民兵之聲行者歸居者安强者奮弱者不恐市無讙言野無走塵若貧若富相安以卒無事故警既撤而民始親乙酉合忠義新軍于江州露食草宿立須具廬興國當三百有竒為木若竹若蘆若鐡十萬有竒伐削之工覆築之工建治之工遷運之工舉不在其間讙訛相驚欲遁欲移不能者含憂以俟斃已而一物以計皆賦資于民而易其物一工以積皆假直于民而取其工凡物視其時之價凡工視其私之傭内郭外郊奔衝銜屬而樂與之從事既周其身又濡其家故役既已而民益愛以再嵗攷之上供之運錢計十萬五千有竒米計十二萬三千有竒吏兵之俸錢計五萬七千有竒米計八萬四千有竒至陋之國極困之民然而財以時輸上上不繩愆俸以時給下下不告病此冝其度越經常醖釀新竒有所不免者問之在廛在廛不知問之在野在野不知余能言之窮其㣲𦕈而塞其漏鉗其變態而銷其姦析其竒贏而嗇其出嚴其開闔而謹其藏如苦儒専經窮晝夜之力争尺寸之功如枯僧縳禪棄形體寢食于寒暑之外拾遺腐于糞壤之聚奪掩匿于盜賊之懐故財紓于上而賦不及于下勞切于身而擾不至于民自公觀之以身之勞易民之擾自民觀之移已之痛為他人之苦此而不有所感禽魚無此情蠻貊無此理也則未去而惜既去而思何異之足言而余獨念夫當故人難施巧之時處今人至不幸之地去而得思于民此不亦天下之至難哉或者不以余言為然自履之則知矣故余之于公惟憐其至難而歎其不可能也公名采字元亮鄭人是為記興國軍學記學在郡之北西附而東鄉舊者也在郡之西北附而南鄉新者也其新者今太守縉雲葉公之為也請論昔自紹興二十年寖毁厯二十年大毁奚以寖毁吏無政也奚以大毁吏無志也奚以弗新吏無才也請論今自乾道六年秋八月以興冬十二月以成奚以必新公有志也奚以能新公有才也奚以能速公有仁人長者之心也必新以志能新以才速亦才也不以才以仁人長者之心何也請論志人各有私異同相形愛憎相搏不撓者寡矣而不撓者志健也請論才才各有量抵其窮則咫尺不加進毫毛不克舉也而不窮者才充也請論心夫民戚上而弗之歡敬上而弗之愛心不交也我與民為親則勞佚同民與我為親則緩急同蹶然動之趯然其趨我也此略也請論詳公始至有事于先聖之庭悼先聖之失其居而懼已之弗䖍其職也公之言曰佛老之宫嚴且麗率與皇居相侔而先聖所庀乃弗及中下之廬先聖吾天也慢天者不祥且吾所受制書學吾事也違制者當論如律於是公之志立也既稽諸有司則負上之逋以萬計負下之逋亦以萬計上以峻督下以哀蘄公之言曰峻不已則怒繼之哀不已則怨繼之上下交相憤也志將何之于是公之志既立而未果行也期年戢姦整慢嚴藏嗇出而平時飛揚滅没之財並集峻者夷哀者怡矣又推而應公上之羨征滿既徃之宿負待後來之急須得衍算也于是公之志行也此迹也請論理志者有意而無體必有所依而行才者所以為行志之具也才者易縱而難収㣲失所控則肆故仁人長者之心所以為御才之器也志健而才不足則事弗濟才充而仁人長者之心弗篤則事雖濟而多傷事且濟而無傷非三者相須而無虧何以及此也此名也請論實凡物木章計若竹若石若瓦若甓箇計灰石計若鐡若丹若堊斤計取具為物三十二萬三千有竒地為官者積弗取多閑材不足則定其價而後市賦其資而後輸視其願則徇而從之餘須皆如之凡工為廬事常廪為土事常廪有差不時而撫其勞而扶其疾也餘須又有差既役為工二萬二千有竒凡用以材事之質劑命掌比之治者主之凡掌比之治皆民之有力自重善持家恥犯法者也以役事之稍食命掌學之政者主之凡掌學之政皆士之秀且賢遵法度可蹤跡者也民之良者勞于外士之彦者持于内姦者有以寓目而無以措手也靡錢貫計五千一百有竒粟石計九百三十有竒無一而不至于民也凡民受役要者咸喜弗受役要者咸慕相勸而至不忍舍而歸此其情非有感乎利也凡室自殿若堂達于門皆序而兩之自殿若堂衍于旁皆挾而兩之暨他室楹計二百五十有竒昔之所有必具而有加其無也乃今有之此政也請論人公名模字叔範其考是為石林先生嗚呼可謂有子矣興國四營記興國升軍則有兵自太平興國二年始也二十五之忠節十五之効勇十九之武雄牢城此凡軍之額也其肄額自何年始也六百六十有七屬諸禁二百六十有七屬諸廂此凡軍之籍也其著籍自何年始也城之北少西忠節効勇牢城營之城之東少北武雄營之此凡軍之營也其建營自何年始也其廢自建炎三年始也其興自乾道六年始也六年則太守縉雲葉公為政之再期也六十有四以舍武雄四十有九以舍忠節三十以舍効勇皆即其故營營之又三十以舍牢城更而西之非其故也四十四萬二千一百有竒積其物而計之也六千九百六十有竒積其庸而計之也二千三百三十有竒以貫計錢二百八十有竒以石計粟市材召工之費也市者弗告虧酬之優也役者弗告勞廪之厚也為坊五于其郭為鄉十有三為里六十有五于其郊無毫毛之自出也于是兵之雜處者皆遷兼其家者専舍之止其身者合舍之其身他𨽻而以其家自隨者闕之戍而未歸者制其室數以待之募而未集者分其地域飭其材事以待之戍兵之歸皆具而未來者乃今有以逆之則其為恩至衍也嗟夫月一其廪嵗兩其縑既有限也征役則添有給慶禮則横有頒又弗常也鐫其有限弗常之禄而廬人之廬甚矣其難也且非惟其私而已凡兵非涅不為兵貴其辨于民也涅而去之以某罪論惡其無辨于民也不足又以其服判之其品七中而至于屨其采五白而至于緋謂之軍容其弗遵者以某罪論惡其無辨于民也不足又以其居别之當舍而弗舍弗當舍而舍與弗當入而入皆以某罪論聴而弗問又以某罪論甚惡其辨于民也請有闘傷之禁有博戲之禁有禽犬之禁有巫卜之禁有飲禁有濫禁有逃禁有盜禁有詭名之禁有匿姦之禁有斂財之禁有弛藝之禁有竊造軍噐之禁有私傳兵式之禁有出法物之禁有結義社之禁法也者馭兵之噐也營也者施法之地也官無寺無以施政也士無學無以施業也工無肆無以施事也兵無營無以施法也凡營别而謂之都都有頭總而謂之指揮指揮有使以伏事之儀制階級之律重則死之有兵于此弗嚴則弗肅弗肅是縱而菑之也凡營有房房有號號有籍損闕而失繕修一日以某罪論三日以某罪論若垣墉之敗則登時築之庇兵于此弗整則弗安弗安是錮而苦之也登時較之一日為多一日較之三日為多四十三年而弗復可以為多否也嵗秋八月乙丑有令禁兵之占于籍者以盈為度其闕額錢毋輸冬十一月乙酉有令禁兵之疏于帳者多闕弗登必罰無赦此地曠而人稀五方之游罕集初皆以致兵為難及是憚為兵者趯然動疑為兵者毅然決變其目之所習見而感其心之所樂為則營之勸也奚為勸示其不恝然于彼而覈其不漠然于此此營之所以為勸也官日以丑酉之令從事孰敢不力惟公之敏而功也奚為敏而功無敺之以勢而致之以道此公之所以敏而功也雪山集巻六
