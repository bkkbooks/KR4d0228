body:
  text: 雪山集卷十宋王質撰銘章德茂破硯銘廣漢章德茂出硯示余絶佳雖中斷墨位猶全且道所來云戊子某月日得于昭化傳舍初癸酉水壊某甲歸鋤某地見此硯誤碎之驛吏善某甲求得以行郵書居十有六年昏翳汚塞無硯矣以緡錢千故硯一易之吏不為難刮剔營治燦然端產也以示今紫薇張公直父公為之銘又以要余余辭不可銘曰錮于石藏不密遭刳剔墊于江沈不極受括擊雖有眼弗能鑒欲避不能嬰此憾雖有趾弗能履欲去不能䝉此恥嗚呼四皓來而復歸不如兩生止而弗來音離兩生止而弗來不如漁父莫知所之棠陰閣銘耽耽新堤有截中流臥鐵千尋弗震弗芤崇崇其閣以時以作不疾其符維民是若公來祝堯冠佩鏘鏘拜稽以興萬鱗洋洋維帝之恩如川之長維公之賢導帝之滂率俾我民近天子之光公來燕喜既多受祉振振其鼓民奔來趨公醉升輿翼者溢涂維公之澤如水之淵維民之歸視公其天葦以秋繁蓮以炎滋公則去矣維公之思魚泳于潛鳥集其茂望公于京道阻且右謂撫此邦公實臨之嗟民之心公其知之公則去矣無我或遺簡軒銘并序古以永興為壯縣今未必古之如然亦壯矣君來為政弗以壯為病從容閒暇酬之必有道焉而人莫之或知也簡軒之建略呈露圭角出談笑而揮浩穣也固宜君居東越識晦庵此理其知之矣銘曰敬居簡行奚太之云簡不屬境實在此心四壌百里邊淮接湖事至物來與雲烟俱求簡弗簡則有闕遺我簡爾繁殊途同歸莫富于坤坤以簡能易從有功其大亦宏旁多嘉山亦夥竒水意舉目到簡即其理一寸湛然七竅燦然隨叩隨應湛者弗遷人嘻君勞我莞君佚秋乗凉風春翫華日何必撫絃迺堪怡神谷音泉聲皆君之琴暎帶亭銘并序上饒周君某介施君某求斯亭之名于汶陽王質施所讚詠略與山陰蘭相符焉于是以暎帶掲之右軍語也銘曰崇山峻嶺茂林修竹清流激湍厥妙維六蘭亭已塵右軍如燭人有渭涇地亦瓦玉於粲攸躋衆甫咸足呂曾尹汪上征不復山君水王安得俯伏有懐斯人而立于獨錯綜烟月斡旋谿谷雖無此手亦不鹿鹿不能奮飛徒有遐矚白雲東南託兩黄鵠贊石林贊并序石林縉雲葉氏之所遷也嘗聞石之妙矣静者石之性也動者石之情也澤者石之氣也剛者石之體也光者石之精也土含于性故不根而能定木託于情故不二而能生水蓄于氣故液流而水至金孕于體故石裂而金潰火潛于精故石戛而火明箕子以金而廢石金者石之子也邵氏以石而代金石者金之母也王質以石夀公石者造化之全宇宙之永者也其辭曰維公左丞與石造始以石之妙付在其子維公使君與石作朋以石之全體在其身邵氏之微在物六篇左丞不然以心相傳嶪嶪巖巖莫匪石之天使君不動以石為用静鎮羣動剄劘百壬其光而明以洪斯文其澤而温以篤斯文凡如是者尚石之細抱一全真出天地之外出天地之外是故不殆役使五行變千億界維石所產直古之幹閲其孫枝拂霓捎漢維石所憑遠空之岑或墊為谷而還為陵遼東鶴歸皆非其故有不改者惟我石林曁叔範父陶靖節贊謁潯陽刺史不如交劉遺民遺民見招山澤素心為彭澤令君不如歸柴桑柴桑衡宇松菊無荒登著作庭不如遊斜川斜川閒美層丘清漣見郡督郵不如延田父田父好懐壺觴見候玩太守華軒不如把東籬秋菊秋菊佳色露英可掬留檀將軍粱肉不如納王使君醇酎醇酎銷憂身名奚有為五斗米不如耕東臯東臯遠風我懐良苗從鎮廷威軍不如臥北窗北窗湛陰清風其凉嗚呼無可奈何而乞食抱飢叩門不羞辭拙不得已而止酒政恐多誤大醉堪醜未能忘懐而責子聊且進杯天運如此無可寄言而贈影答形大鈞無私萬物自森老少賢愚縱游天化而同死生者耶自贊一百年前蜀山之下有蘇子瞻煒煒煌煌若鳳若鸞一百年後楚江之濱有王景文波波挈挈半癡半昏横笻踞石風標則一英氣蹴天嗟哉難及贊者子由畫者伯時今則𣺌然我皆無之吁李平仲真贊有軒冕委蛇之度然詘于時而未昌有巖壑静深之意然游于世而弗藏富貴足以為浮雲三旌或輕于屠羊朝市足以為小隱柱下或仝于首陽進而崇未必臧遯而肥未必良封侯萬户走子房絶交一書殺稽康莫若斵旁袖手血不染指隙中觀鬬争不及已處隱顯之兩間故人不能深毁泯涇渭于一流故事不欲全是此聖人所謂隨時于夫子可為得計矣王稚川真贊静淵不波玉沉其㡳清而徹太空無雲月行其中明而潔勁弩駭機鼓以疾風剛而烈落花游絲熙以陽春和而悦要之一聞百解不如一拙一日千里不如一歇四海弟兄不如鳥散而雲飛萬人鼓簧不如金口而木石當是之時望奔塵者決眥蓼水之陽追軼駕者息踵華胥之國徐行簡真贊一寸之眼照四世界三寸之舌卷大瀛海足踏須彌歩底雲飛手玩崑崙游戲指揮堂堂管葛不直一喝巍巍良平撥轉三匝萬古拊掌羣豪鼓髯野馬蓬塵醯雞甕天徐家父子英氣葢代若見妙喜請禮三拜趙損之真贊大年一幅小山叢竹德麟三盃洞庭春緑遇蘇與黄乃作金玉寳玦珊瑚貴介所服未之前聞抄書滿屋紫薇晚香宜以相屬豈其戎衣塵此車轂舉世英豪眼相具足寧無雪堂亦有山谷拙庵老人真贊一寸之心無城無郭雲開大空塵飛不著三寸之舌無浪無波風静長川月明相磨不絿不競多喜少愠不忮不求易退難進即之也温久而愈真四海一家莫非弟兄有唾師德師德不違有枉不疑不疑受之得見君子斯可矣焉得長者而稱之毋謂無人斯焉取斯京丞相真贊籋雲之虬九霄之顛横海之鱣萬仞之淵有赫帝命下征人間其或不然二十八躔又或不爾三百六僊玉皇有子槖籥大干輔以斯賢吹嘘洪甄人傑地靈天寳物華產茲壌者乃其人耶許公緒真賛豐而碩者厚也粹而清者秀也堅而澤者壽也掇真丹青之上者巧者之手也發揮翰墨之外者辯者之口也至于大耳對國師無言季咸見壺子郤走則巧與辯者皆瞠若乎其後和張總得彌勒贊捧腹周遊四百州得抽頭處且抽頭莫欺肩上三升袋盛了人間萬古愁墨竹贊望之森然劒㦸擁林聽之蕭然風雨作聲聞之郁然粉籜吹馨按之隱然枝節生稜雖然子以意畫吾以意想夫天地萬物同歸是幻本無實相而況以假託真以形傳神以死寄生以有色見無色以有心出無心者耶文石贊敷文李公得二文石其一如人紫面蒼髯周其身淡白雲也衣半領以下不見其裳皆雲也其一如稽首鞠躬周其身深墨雲也而衣純素凡此皆以意命之而李公以為鍾離權呂巖先生滋以意命之也蓋世所摹寫鍾離多髯而吕衣白且呂晚得鍾離劒訣始能變化以飛騰世以鍾離為呂之師其磬折則若事師之禮然李公以意命之亦非苟然也物與心相依故想生天地河山佛者以為皆因想想斷則物無從立雖然足以作興道心蠲掃塵縁方之他想賢也佛者教人斷想而誦説其國諸美樓殿珍寳香華食飲聞者慕之凡想皆妄也是名妄想即非妄想豈不以趣善故耶汶陽王子即李公之意贊之案贊詞永樂大典缺載傳承元居士傳滕修字曼卿泰山人後徙象郡好巖居自號絡石先生既知名更號承元居士初居士多兄弟長曰石龍子次曰木蓮子地錦子扶芳子附楓子土鼓子常春子蘡薁子白華子石血子甘露子象頭子烏􅦣子續斷子丁公子千金子又有釣生感生唐顯慶五年髙宗詔太尉長孫無忌求山澤異產石龍子兄弟多在選中惟不及居士至長安皆拜尚藥奉御居士意不自得以周易筮之遇井㢲下坎上之大有乾下離上其繇曰木而驅漆而塗水而舒金之刳附首而居遇暑而敷以問太史太史曰㢲木也坎水也乾天也離火也漆木之滋也金水之液也首者天之象也暑者火之候也木也漆也金也成之器也首也託之所也暑者進之時也子其識之乆而南海匠氏良遇居士山中匠氏曰子外柔而内堅貌瘠而神腴支離䝉籠與葛藟葛蘿同居子盍從吾游乎居士曰若將何以處我匠氏曰子獨勿聞而族頼我力多矣吾入東陽郡得氏生遂與側理子澄心丈人齊名吾入延德郡得盤生結事承華宫貴人幸臣更持之吾入長樂郡得喬生自皇后昭儀出入皆從吾入嶺方郡得龍生相生倚生皆為世用吾入南海郡得竹簟生木簟生今為平曲侯木偃師侯子誠從遊何憂不彼若居士猶不決匠氏力引之乃出然其質樸拳曲粗梗陋甚乃使金氏銛水氏濡木氏堅漆氏合交致力其間時居士已老而華彩儀矩乃更如通家少年子開元七年四月明皇避暑華清宫忽忽不樂貴妃使東西頭供奉􅂾十輩往來關内山東諸郡求所以悦帝意者居士聞知喜而歌曰承矯龍之首兮孰與山夫之蠆髮兮薦伏犀之腦兮孰與野人之鶴頸兮即詣崇元門上書曰臣外爽中虛上隆下平外爽則目明中虛則心清上隆則不攖下平則不傾若是可以為天子近臣矣書奏即召見清思殿上悦稍得親近㑹晉陽進角生桂林進牙生武都進石生居士寖疎頃之寕州進琥珀先生荆州復進玉處士上大親重由是角生牙生石生其寵益衰七月上宴清暑殿罷洗沐臥承風閣召玉處士琥珀先生居士謂牙生曰上豈亦須我哉牙生笑曰我弗敢望也而尚何道居士大慙是時上親幸文思使李奉趾宮中早朝贊者導奉趾班居士上居士歎曰履雖新不加于枕吾其何以在此因乞骸骨許之流落長安市中木生漆生見居士老退皆舍去他日匠氏遇居士金光門外問何以至此居士曰興廢時也成敗􅂾也吾無恨矣二子始與我雷陳終與我耳餘吾有憾焉匠氏曰木生幹衰而不堅漆生體敗而不固度終無以助子有子皆賢吾為料理之更與子為新交居士依二子稍復振整然益老不自持木漆强調護之居士力愈敝卒解去二子亦散皆莫知所往或見之建康馬糞巷中與土生壌生共處云贊曰居士在山林烏有愛憎輕重于其間者乎一出而變態棼起顛擠流落至于土糞同腐出處可不重哉玉處士琥珀先生其光價重于居士固也然貴賤無常使遇宋武帝者韲粉矣平舒侯傳蘄簟竹氏最盛于楚而其良多蘄春郡漢征和二年武帝疾避暑甘泉宮顧左右侍御忽忽不樂少府進曰細旃重席之上所與從容者誠不稱陛下之意臣聞楚竹氏多材陛下試裁擇焉上乃召拜平為寝郎女兄圓為婕妤女弟通為夫人上稍近幸平曰臣之别族覃孤髙秀文其材宜在臣上隱積布黄石山中不出陛下能致之安枕而臥矣上召東園主章將作大匠曰誰能為我致覃者東園主章辭曰往陛下詔臣召杞生于南山梓生于北山二子臣之友也今竹君與臣無故徒往無益將作大匠曰臣以大匠為官無所不當與至蘄稱詔召覃覃儼不動乃使鉅平人利金城人剛微嘗之覃意即解又使姑篾人修内黄人起龍編人密相與調護至長安覃身長八尺膚澤凝淨上臥涼風臺望見覃良悦覃曰臣無心求陛下陛下召臣臣舒而來弗用臣臣卷而去上笑曰在野則惟君今卷舒在我不在君也且我老多病雖煩彊與我相依上疾尋愈于是制詔丞相御史曰覃挺跡林野不為時用迺者朕身試之含節韜潤體柔而性堅列為文章耦比綜錯縝密華整各中規矩憂勞萬幾炎蒸偃薄神志憒瞀覃夙夜陪朕清制爽規解囂蠲煩妥安朕躬厥功茂焉其以代郡之平舒千二百戸封覃覃頓首曰生臣者天地成臣者將作大匠也微此人陛下安所用臣願分國邑之半奉之上亦以東萊之曲成七百戸封大匠為曲成侯人以此多覃之賢乆之覃益親近自衞皇后李夫人鈎弋婕妤後宮幸御者覃未嘗輒避后夫人亦皆昵愛之競引其族自近然莫得與覃比族父青州刺史筠公與覃書曰子以長才清節植立山林為衆所髙仰今附近人主偃仰翻覆惟主意是視而又參錯嬪娞陪助綦專玩臣弄兒擁持拂嬰子曾弗羞奈何覃曰㑹合無常遇時則親背時則疏一日時節變移上意轉遷吾不在九真之無編則日南之西捲矣甚則與鬼薪同論事固不可知也人生適意耳尚何言是嵗九月上幸河東祠后土詔隰成侯温蒲領侯厚從中黄門謁者猶擕覃偕行上燕羣臣于汾水之上中觴作秋風之辭上凜然不懌而罷中黄門欲納覃寝門令引卻之曰覃有大罪三棄直就曲摧剛化柔毁平日之節不可復列士林其罪一也昵近帝所甘適主欲專便燕私無以禮正君臣之義其罪二也干時戀寵不知進退泚顔屈體自託僕妾之手其罪三也上嘿然乃盡罷歸竹氏寝郎平徙陰館婕妤圓徙重合夫人通徙曲梁覃願就國上不從徙渤海之束州更封漏臥侯食牂柯之漏臥三百戸征和三年四月上自長樂温室從御温凉殿思竹氏兄弟使使視之皆垢弊枯槁而覃尤甚不敢出見使者上乃詔别選竹氏之材以聞復以覃長子爽為安舒侯又封其族子瑣為陰密侯潤為廣柔侯華為細陽侯淨為平曲侯分遣給事長信増成掖庭椒房他諸宮殿竹氏侯者五人支孫生冒姓桃氏遷巴西遂與安舒侯異族太史公曰吾聞竹氏之先常顯重成康之間成王病臻與天球河圖並列于庭受顧命之遺宣王之興也為之安宮室之寝致男女之祥斯干之詩作焉蘄侯遇武帝受恩席寵無與等夷矣始終之際何其異也吾從上行幸甘泉五柞長楊及祀雍畤汾曲上隴坁封泰山觀寒暑推移爱憎變遷奚獨蘄侯哉麴生傳石泉子姓緑氏麥城子姓白氏本同姓麴氏也初麴氏與酒氏世相須為官酒氏者仕周為酒正其官掌酒之政令以式法授酒材祭祀天地神祇供王后世子饗賓客士庶子耆老孤子凡饌齊酌數器量與名物賜頒皆有書契成要其繁重如此然無他助專資麴氏力是時古近族姓簡麴氏惟石泉麥城兩房此兩房子弟資髙下酒氏隨調適之而皆能成美才故兩家絶厚善無等比其後酒氏更相傳寖逺酒式多廢而兩家往來本末恩意子孫罕通知者故酒氏視石泉麥城良疎豆氏桂氏糵氏霍氏舒蓼氏越椒氏皆排拫麴氏儳進讙曰石泉麥城緩也不足用酒氏惑之亦撓曰緩也不可用二子争弗能得始麴嘉臣沮渠王髙昌傳八主矣貞觀十四年交河總管侯君集平之俘其王智茂以歸關東士大夫以麴氏為愧諸遮止二子者因汙衊之二子内自醜于是即居石泉為緑氏號石泉子麥城為居白氏號麥城子他儳進者皆冒麴氏而蒲氏滕氏連氏蒼氏踵出亦竊借麴氏以行與豆桂争衡矣曾有詔緝王氏族于是金城米氏詣闕上䟽曰臣聞麴氏之先后稷之子不窋生而有文在手曰鞠案史記周本紀不窋子名鞠鄭樵通志氏族略云鞠氏姬姓后稷之孫生而有文在手曰鞠因以名之此即以為不窋事有誤不窋之孫氏之麴鞠之變也麴氏有才子二人長曰石泉次曰麥城間酒氏弗職引異族䝉正宗真麴氏子孫顧反他外避媒孽今緑氏白氏是也陛下幸詔有司條源緒本門望勒成當代言典伏惟追懐后稷之烈深嘉麴氏之勲訓齊酒氏之官治辨他族之目釐正二子之系臣昧死以聞帝下其書有司酒氏免冠置對曰臣愚不知古今沿革真偽之變陛下幸赦弗誅請按本始還之臣願與麴氏締前好規後圖糜身報德奉千萬夀帝乃詔中書門下酒氏過誤厭故喜新其釋勿治夫辨族宜嚴録才宜寛緑氏白氏可復姓麴氏豆氏桂氏諸族朕聞之與麴氏有連其聽姓麴氏如故令有司别其房為支族有司以故事奏請如詔制可贊曰麴生之名始出自唐通元先生張果生儒稱也秦漢多道之或曰生少稱也賈生年二十餘諸老先生皆生之非也酈生年六十餘伏生年八十餘豈少也哉生天姿清白自喜人多眄伺之寖老猥自䝉翳所謂埋光鏟采非耶及遇米氏相資以成功瑩然故不沒也鳴呼行世當如此矣玉女傳玉女者其出身甚微荒居蓬蒿少小不為鄰里所愛號曰鬱臭又曰苦低弗能得美稱寖長稍憐之更號曰益明又曰貞蔚事母甚孝故又號曰益母玉女者得諸唐髙宗皇后武后于是其名始寵人争竒貴之當武后稱制徹簾帷弗御顯朝羣臣決萬幾于是年垂八十矣見者老之是時方開明堂建天樞鑄鼎受圖四方百蠻咸朝集京師后患之間語幸醫尚藥奉御顔澤澤曰臣聞有竒女在民間號曰益母妙能變化顔色第生長荒寒陛下習觀祕掖采女美人懼不如指后曰誠有異奚他嫌載初元年五月五日后燕羣臣于蓬萊宮退御含風殿澤引内益母翠衣素袂紺纓儀矩支離后不懌侍御皆笑澤曰臣嘗以聞陛下幸詔臣惟能是采臣是以敢奉詔陛下盍試諸弗酬臣當坐罔上后頷之澤引卻益母趨西廂益母驟見室屋服器惶怖戰栗澤為置火近之俄衣冠面目熏灼蒼黒后偷望見疾戲曰去姑自治已毋庸謀人澤曰臣聞金錬則精人錬則明益母新從下土來微也其變色失度固當惟陛下寛之后曰我何心第若是将安用澤曰誠䝉陛下厚恩願少遲之后曰無傷顧迺終何如澤再拜謝曰願畀臣妻段氏妾盧氏烏氏敕謹遇旦夕視且欲速則弗成陛下幸寛期俟之段若盧烏俱賢也數數進苦辭烈語居十餘日澤曰可矣白入之后猶持前説既見大驚光潔明潤非宿覩者也遂大被爱幸益母善候伺每后起頮面将受朝益母從旁調護顔色光新鮮妙間不時為容左右趣傳呼益母益母至即粲然他昭容修容諸御女皆莫敢儳進雖内熱顧后性剛危厲惟益母能調娛之以故後宮鮮失而外庭亦少安天授二年制詔中書門下朕春秋髙重以徐敬業程務挺裴炎之變多戚寡欣平原女子益母擁護朕躬改色回容俾朕精神弗衰厥功茂焉三妃六儀皆弗稱其賜號玉女宰相率百官伏紫宸殿稱賀即日改元長壽神龍元年后徙上陽宮意不自得華益落不復親幸玉女初暴貴承間從容言顔澤妻妾供養勞苦狀乃以段氏為懐澤郡夫人盧氏秀容縣君烏氏華陰縣君澤為壽光縣侯人以此多玉女稱長者贊曰玉女之先曰蓷知名東周之際中谷有蓷是也後轉側不常而以居中谷為正郭璞劉歆數為時人道之而弗著其功能至玉女成聲武后之朝貴重矣彼其初居中谷者嘅嘆啜泣亦各其所也雪山集卷十
