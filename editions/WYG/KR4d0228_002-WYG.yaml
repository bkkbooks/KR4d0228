body:
  text: 雪山集别集類三宋提要臣等謹案雪山集十六巻宋王質撰質字景文其先鄆州人後徙興國集中毎自稱東平或稱汶陽不忘本也登紹興三十年進士召試館職不就御史中丞汪澈宣諭荆襄樞密使張浚都督江淮先後辟置幕府旋入為太學正孝宗時以上疏論事為忌者所中罷去㑹虞允文宣撫川陜辟與偕行後入為敕令所刪定官遷樞密院編修官出通判荆南府改吉州皆不赴奉祠山居而卒質篤志經學所撰詩總聞已别著録其文章氣節見重於世亦深為宋史本傳所推惟周密齊東野語載張説為承㫖時朝士多趨之惟質與沈瀛相戒勿詣已而質潛往説所甫入客位瀛已先在物議喧傳久之皆不安而去與史殊相乖剌攷史稱虞允文以質鯁亮不囘薦為右正言時中貴人用事多畏憚質隂沮之云云則質非附勢求進者殆張説等懼其彈劾反造蜚語史所謂隂沮之者正指此事密不察而誤載也觀其初受張浚之知又以湯思退薦為太學正而論和戰守疏中排撃二人皆無所假借此豈放利偷合者所能為歟其集久佚不傳僅散見永樂大典中史稱其嘗著論五十篇言歴代君臣治亂謂之朴論今止存漢高帝文帝五代梁末帝周世宗四篇又質自序西征叢紀云自丁亥至庚寅得詩一百三十有九詞五十有一記十序六銘二又于淳熙二年作退文有六悔有六變永樂大典所載乃總題曰雪山集無可辨别宋史藝文志稱王景文集四十卷又别出雪山集三巻焦竑經籍志朱彝尊經義攷則俱云四十卷攷王阮原序稱其家以遺稿見屬乃為蒐羅刪次釐為四十卷名曰雪山本其舊也然則質初有小集三卷自題曰雪山迨阮編次全集篇帙雖增而標目如故故三卷之本與四十卷之本諸書互見也至張端義貴耳集載其何處難忘酒詩稱所撰有雪齋集則又刋本流傳訛山為齋耳今據永樂大典所載分類排次共得一十六巻其詩文先後有嵗月可稽者各加攷證附於題下雖殘缺之餘十存四五其生平出處與文章宗㫖亦足以見其梗概矣史稱質博通經史善屬文與九江王阮齊名阮序是集亦稱聽其論古如讀酈道元水經名川支川貫穿周匝無有間斷自明以來阮義豐集尚傳而質集湮没不彰談藝家亦罕能稱道今仰䝉睿鑒取其論和戰守疏及上宋孝宗疏諸篇詞㫖剴切頗當事理特命校正剞劂以發幽光洵為千載之一遇至集中青詞一體本非文章之正軌今欽遵諭㫖概予芟除又如㑹慶節功徳疏福勝化縁疏真如修御書門疏天申節開啓疏滿散疏水陸修齋懺經疏及修造榜文諸篇皆語渉異教亦併為刋削以示别裁仍恭録聖訓冠諸卷首用以見表章散佚防遏竒衺之至意焉乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
