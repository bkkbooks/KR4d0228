body:
  text: 雪山集卷一宋王質撰奏議論和戰守疏案此疏是孝宗隆興二年質為太學正所上宋史本傳載之字句間有不同今附注本文下陛下即位以来慨然起乘時有為之志而陳康伯葉義問汪澈在廷陛下皆不以為才於是先逐義問次逐澈獨徘徊於康伯不遽黜逐而意終鄙之案宋史作獨徘徊康伯難於進退陛下意終鄙之遂決意用史浩而浩亦不稱陛下意於是決用張浚而浚又無成於是決用湯思退今思退專任國政又且數月臣度其終無益於陛下夫宰相之任一不稱則陛下之意一沮案意宋史作志前日康伯持陛下以和和不成浚持陛下以戰戰不驗浚又持陛下以守守既困思退又持陛下以和陛下亦嘗深察和戰守之事乎李牧之在雁門法主于守守乃所以為戰祖逖之在河南法主于戰戰乃所以為和羊祜之在襄陽法主于和和乃所以為守案此上三所以為宋史皆作有是和戰守本殊塗而同歸者也案此上十二字宋史作何至分而不使相合八字今陛下之心志未定規模未立或告陛下金弱且亡而吾兵甚振陛下則勃然有勒燕然之志或告陛下吾力不足持而金人且来陛下即委然有盟平涼之心或告陛下吾不可進金不可入陛下又蹇然有指鴻溝之意臣今為陛下謀案臣今宋史作使臣㑹三者為一天下烏有不定哉案定宋史作治上皇帝書案此疏當是孝宗乾道初所上臣觀陛下即位以來初欲繫單于而獻之廟社今乃坐困于二渠帥而不能抗初欲焚庭犁漠復秦漢全盛之幅員今乃併淮南而失之初欲驟奮雄張立乎漢武帝唐太宗之上今乃國勢有南唐之蹙陛下試遷慮回思則平日施設舉措為是為非為當為否至此可見富國有捷法強兵有要術管仲吳起商鞅諸葛亮王猛略得區區之訣皆能以嵗月取效今未暇亟言亦未能遽行直謂虎狼不可守門戸宜速驅使去耳以彼北摧契丹部族數十萬之衆南卻宿州七八萬之師不旬月而獲海泗唐鄧廬夀濠楚數千里之地殆非庸人所度劉寶郭振之流皆非其對陛下勿輕信人言謂無能為臣往還淮南久聞邳州汴京大治舟船圖水陸兼進之舉而東阻海北阻泗清口潁河之利不全長淮之勢不通不敢輕出移書三四移文六七使介兩三往來重失海泗必欲得而後和朝廷不深探其情便謂誠然倉卒委棄既得之則水利快便自清口而下者入滿浦自潁河而下者入洪澤我無力以捍淮隂蔽山陽退保真陽之間彼舟船得淮河運渠之利騎兵占天長清流之勝吾真揚之師何以能立彼徘徊展轉列堡據要而未肯深進者冬深旱久淮水低運河涸舟船不得以迫江面雖得真揚徒睥睨而不能徑渡去巢穴愈逺致糧餽愈艱何益又復遣人議和迢遞往来是特延引日月以待春水生運河深江潮應閘口通則騎兵徑驅蹙真揚之戍舟楫隨進迫真陽之閘與我爭長江之利無糧道之憂可以持久敝我矣完顔亮提百萬之師長江在前舟楫不具故格于采石頓于揚州慮懲前日之失是以有今日之為今朝廷有二幸幸其不入幸其自去彼據形勢之地有可圗東南之理何憚而不入成師以出一㦸不頓而坐制吾命何虞而自去朝廷若謂其本無用兵之意特欲見脅以成和恐遷延疑誤有如臣之所料今制寇之奇實在荆襄一自唐州擣潁昌以趨汴一自鄧州擣汝州以趨洛往者完顔亮盡萃其徒于瀕江吳拱李道成閔合十萬之師端坐淮漢曾不能少掣其後而成閔倉皇奔歸赴救徒耗死者大半宿州之長驅徳順之深入荆襄空屯數萬之旅飽食竟日終不能出汴洛之舉以分宿州徳順之勢故彼得專志以蹙徳順併力以退宿州今則專嚮淮南瞰江面以窺國都我又虗荆襄之力而弗應方且強驅民丁迫守江岸舉烽于樓設礮于竿築壘而建女墻掘濠而施釣板發坑以陷馬植樁以礙舟其形狀可恥堂堂之國不作丈夫之規而常事小兒之戲使敵見之愈足納侮安能示威耶侵我徳順之將士部曲其巢穴多在河中侵我宿州之將士部曲其巢穴多在汴宋汴洛一動闗河震驚淮南之寇回顧而有後憂其勢必退不退則心搖迹孤擊之可以得志臣不復引兵法陳史傳葢攻其所必救奪其所必爭此用兵之勝䇿自完顔亮南侵淮東之師敗于瓜洲淮西之師䘐于楊林去嵗又狼狽于宿州惟荆襄之師屢得利士氣全軍具偹王宣之猛趙樽之審相濟所長皆可以為善將宿州之役荆襄有掎角之令二帥鼓舞三軍踴躍既而止之咸相顧無色今敵盛兵以疑荆襄蓋亦慮有腹心之擣其唐鄧陳蔡之兵未必皆精揚聲十餘萬亦未必滿數往懲汝蔡之傷有憚荆襄之意今吾荆襄之衆不下萬人用吾全䇿乘彼憚意留三分之一以備諸要其餘徑擣直驅設使未有大功能掣之使退而後議和則辭令有氣而禮節有筋骨不至于厚幣遣使唾去而弗納陛下有此竒而不發非陛下不知亦非陛下不能臣竊料未有任事之人肯承陛下之意慮事不捷則已有禍蓋自張浚無成廢罷朝廷皆以言兵為亂人撤藩仆闗蕩然示之以無有而坦然交之以不疑夫是以至此之憑陵也今日刃侵于胸火逼于膚死中求活法當尋出竒之計而況理有必然勢有必中非妄舉輕擲如前日之比陛下若以臣言為然則斷自宸衷勿摇浮議行之可使制寇之竒勿投于無用之地臣非不能縁飾巧語鋪張繁文陛下何所用此且心危情廹有所不暇惟陛下憐其忠而赦其簡陋幸甚幸甚上皇帝書案疏中辛巳至甲申及十年無變云云當是乾道七八年所上臣觀今日事勢訓兵理財先為富強以待天下有變敵國有釁則乘機從事于中原此今日恢復之定規也天下未有變吾能激之使變生敵國未有釁吾能撓之使釁作使就吾之機以行吾之志此今日規恢之竒謀也弋者取禽獵者取獸方其栖深林伏豐草偶然自墮網羅而後取之非弋獵之妙也動之使飛而觸吾之羅擾之使逸而觸吾之網網羅在此若有所不可已而必陷其中此弋獵之妙也自岐亮殞亡葛襃自立案金史本紀不著廢帝亮初封岐王亦不著世宗雍初名襃而宋史于紹興十九年書金岐王亮弑其主亶自立三十一年書金人立其東京留守葛王襃為皇帝與此所稱合蓋據當時傳告之文非本國習稱故金史畧之其守國蓋亦得䇿然豈可以其得䇿而遂絶念忘懷以為終不可圖也要當使其不得已而必捨得䇿就失䇿彼雖明知而無可奈何必當出此臣所謂使彼就吾之機者英雄圖天下之妙訣也與陛下言恢復者衆矣亦有及此者乎正隆之末中原本不欲南向岐亮以勢劫之未至汴而軍已離未渡淮而盜已作未抵江而中原大亂數年而後定此覆車之鑒也葛襃鑒岐亮之敗其勢不得不歸于和方陛下堅持不和之論為葛襃者亦罔知攸濟其初欲棄河南啗我以為和其臣力言岐亮之死軍勢甚危我不能襲而止陳蔡之陷汴洛大震我不能進而退隴右之失闗中欲傾我不能取而歸以此三者卜天意之不與我苦勸葛襃勿棄河南已而削臣禮損嵗幣欲就我以為和而陛下難于棄要害之地固執如初已而大臣異議竝邊撤兵則乘間進師遂脅我以為和而陛下權宜從之葛襃謀和之序有三勢未安則欲啗我以為和勢稍立則就我以為和勢既振則脅我以為和于是僅乃得成自辛巳至甲申何其欲和之堅謀和之艱也葛襃之被衮服冕其初未敢僥倖久長也至是東南既和中原漸定而其國始可保矣葛襃初年金人已有亡徴其能存立漸致康强者和之效也成之既艱保之必力苟失和則必用兵用兵則中原之人又復如前而岐亮之患亦將襲後此葛襃之所甚懼也夫中原之與金人其不相安久矣靖康建炎之際宇宙橫潰生靈駭散莫知性命之所寄金人得以巻蕩而平吞之然而立偽齊而復廢還河南而復取徘徊展轉欲奄中原而未決欲棄中原而又惜之既見東南之僅欲自全而不能為害也中原久困蹂踐無所歸依其勢已折而不支于是決混一之計大徙五國之衆雜居中原不從令者蕩盡城邑誅及種族中原百姓既不能抗而又無所望于東南力盡勢窮而始定此彼之善觀天下情勢而疾徐操縱不失其節以是能成其强然號為相屬而實未嘗相安天意留此與我若將以待恢復者也岐亮好勝自任以為中原之人食我水土為我臣僕者數十年無有不從而不知中原之人非相服之真心特以風恬浪静難以施其鼉作鯨吞也風濤忽起足以鼓躍而簸掉則平時蓄憾之心至此得以逞矣岐亮之還師未嘗為我所得而多為中原百姓所殲闗中隴右山東河南州縣之稍復未嘗為我所下而皆為中原百姓所獻岐亮一動而中原之釁作為吾之利也如此為彼之害者如此葛襃因岐亮之變覺中原之心故其謀欲靜以安之中原安則其國安其國安則其身安臣知葛襃永不敢離燕地永不敢興南師何者其身所以得此位因前人之舉此事也我又為之則我身烏知其不為亮他人烏知其不效我也葛襃明見此理堅守此説故十年而中原無變葛襃之説終不移則中原之變終不作中原之變終不作則金人之勢終不傾不知我將坐待以至何時也近者誰為葛襃之謀寛誘中原之衆吾淮南遷徙之民稍復還歸或者以是為憂而臣益以窺見葛襃之心可以行吾之謀也蓋彼務為銷變而吾當激之使變生彼務為省釁而吾當撓之使釁作陛下既了然見天下之勢則當斷然隨勢而施謀儻移乘輿進幸建康則中原必讙傳親征彼不得不簽刷調發以為之備則木末之風漸起江心之浪隨生中原之情固已洶洶而不靖岌岌而不寧將漸逞前日正隆之態岐亮以斷然不移之決持熾然不可嚮之威方其簽發固已不肯盡從觀葛襃之庸豈可以比岐亮之果鋭人不肯盡從亮則不肯盡從襃也必矣不肯盡從則其間必有強黠好爭踴躍思動者出而為抗此天下有變之端也間遣一使者復請園陵其勢決不肯從不從則備我益急備我益急則中原益騷又間遣一使者求減嵗幣其勢亦決不肯從不從則備我愈盛備我愈盛則中原愈擾或者以為鷙鳥將擊而匿形苟欲圖人不當驚使為備此未可與權也吾之警使為備者乃欲激之使變生而撓之使釁作彼不如此則無以動中原中原動則彼覆亡之萌而吾恢復之資如此一兩年之間可以漸致中原之鬨坐成敵國之亂而吾厲兵秣馬揚欲進之聲而未動飛符走檄作欲往之勢而未行中原一擾則不能遽止寖久而寖多寖廣而寖熾彼方分刃以支中原未暇全刃以及東南也中原室内之患東南門外之憂彼將孰先則吾雖産其禍而未即受其敵其初隂攪之而未明犯之及其成敗之未決去住之未定分道整軍而前收中原之豪族以為吾爪牙據中原之沃壤以為吾囊槖立契丹之主使率契丹之衆歸其故部還為契丹立渤海之主使率渤海之衆歸其故部還為渤海諸國之在中原者各隨其主而返其故部則女真亦不能獨立于中原今人徒見其外龐然以大而不知其中枵然以空女真之衆曾不當奚契丹渤海韎􅞘等諸國十之一五國之衆又不當河南山東河朔闗隴等諸道百之一措女真于五國之間固已甚微措五國于中原之内蓋益甚𦕈今吾與中原相合而為一則五國不得不散而去女真不得不迸而歸苟其不然則亦自相魚肉決不能相守不貳以與我竝爭于中原也五姓之亂劉氏為匈奴而羯滅之石氏為羯而冉閔滅之鮮卑又滅之慕容氏為鮮卑而氐滅之復興而晉又滅之苻氏為氐而羌滅之復興而羌又滅之姚氏為羌而晉滅之金人殘滅諸國蹂躪中原假合而為一家凡今相處者非其不共戴天之讎則其不反兵之讎也故不獨中原與金人不相安而諸國亦與金人不相安也金人常蓄土摧瓦解之勢于其腹心而吾不思所以謀之亦可謂偷安苟活之計矣使偷而可安苟而可活如是而能久猶云可也太祖太宗相與議汴洛之都太宗以遷為難則決䇿居汴太祖歎曰不及百年東南之力竭矣未五六十年而東南己以病告蓋重兵宿于京師而供給仰于東南京師之備愈滋則東南之力愈負重今以東南為國西自興梁東至吳越羅兵為守已過承平之大半而未止也不獨養兵而所以為國之具其取諸東南者又倍重于承平之時今將五十年矣其力日削一日嵗朘一嵗蘇綽之在魏也以國用不足重為征稅之法既而歎曰今所為正如張弓非平世法也後之君子誰能弛之東南立國之初一時張弓之法至今不弛而更急者多矣近世趙開為鹽酒之法以贍蜀師將死言曰若因循不恢復蜀將大困而我為禍首也此與蘓綽之意無異今張弓之法不弛而更加急恐非可以持久也大抵東南本非久立國之地民力盡則國從之漢自靈帝以後而南北分在南為孫氏晉自愍帝以後而南北分在南猶為司馬氏已而為劉氏為兩蕭氏為陳氏唐自昭宗以後而南北分在南為楊氏已而為李氏其間擁虗器徒有名號者居多亦可謂國非其國也故在今日不得不注意中原以紓東南廹切之勢以圗宗社堅長之䇿西晉凡五十二年武帝麤安者二十餘年而惠帝懷愍極亂者三十餘年至元帝中興而中原已無情于司馬氏矣何者相恩之日少相毒之日多也故晉人恢復為難然桓温至灞上劉裕入長安中原猶有戀戀之情所謂長安十陵是公家墳墓咸陽宫殿是公家室宅舍此何之是時闗中相繼為苻姚割據將八十年與劉裕初漠然也而苦邀其留痛恨其返蓋慮北有拓跋西有赫連也我自太祖造邦徳澤洽于中原者二百年今相離雖漸久而其情未冺也為我毁族為我殺身者不可勝數而終不悔豈可使之帖然受制于人而無所泄其憤闊然相疎于我而無所効其情哉紹興隆興屢欲恢復而不就蓋謀國大臣握兵諸將之過而非中原之難下也中原難下當在他時日愈久而情愈衰則相視如路人甚則相疾如仇讎此則中原難下之時也宣和取燕山契丹曰南人只道燕雲是我故地不道屬我已二百餘年能無許久君臣之情今日但當死鬭故涿易二州之外其餘皆恝然也他時中原固應有此氣象有此氣象則難圗矣政不惟氣象難圗且恐當有草萊豪傑起而收之今日雖有豪傑亦未能收何者人情未忘我也人情未忘則知有我不知有他從我則能行捨我則不能立故豪傑睥睨而不敢輕發必待我而後可動雖使有赤眉王郎亦必託漢為名託漢為名則借漢為重是其權已在漢則終當歸漢何者偽不敵真也今陛下握金人興亡之權制豪傑從違之命而或者謂恢復為難陛下過聴而未決則是未嘗有以的然可指之形判然不可易之理而告陛下者也臣謂今日有事于中原以十分為率而計之六分用中原攻金人一分用諸國攻金人三分用東南攻金人若十分盡仰東南此晉宋所以多無成也宋文帝謂佛貍曰河南舊是我地今當修復不干河北不知中原已無情于司馬氏而安得有情于劉氏也故檀道濟王𤣥謨之力易窮佛貍之勢難遏蓋專取力于東南而無所借助于中原此元嘉所以再舉而再屈非今日事勢之比也今日事勢大略與東漢相同西漢自髙祖以至平帝二百年而奪于王氏十五年光隂未逺風聲相聞故人情思漢為深光武起于中原其勢為便陛下興于東南其勢為不甚便然光武極其力堅其志而期于必成陛下容有所疑容有所憚者必有一擲之語孤注之言以動搖陛下之心而不知天下有全䇿如臣之謀也光武至不樂兵嘗言每一發兵頭須為白闗東初旱不堪兵間之積苦且欲置隗囂公孫述二子于度外然終不能自已者慮後患之難圖也況陛下守東南難久立之地對女真不並存之敵未易可以安枕髙卧置此于度外以隗季孟公孫子陽待之也夫天下之勢至此不變則不解氣候煩蒸非疾雷迅雨則鬱滯之氣不散清明之氣不回當是之時惟英主能與世為雷雨陛下真英主也可惜蹉跎玩時將老陛下之齒髮迤邐遺患將殃陛下之子孫凡今所患兵之未精財之未裕陛下試令臣熟數于前然後知兵非難精財非難裕臣雖無似自度與陛下辦此而不難陛下誠能變風俗銷朋黨使淫辭詖行者舉不得作則出而與陛下同心圗事協力濟功者將患其多不患其少臣雖不才誠自信與陛下辦此而不難臣非敢自謂能也陛下有英主之髙資一借箸可以轉移天下之安危一躡足可以鈴制英豪之死生故臣敢謂與陛下畫䇿與陛下任事足以取效而無難恃陛下之為英主也惟陛下圗之雪山集巻一
