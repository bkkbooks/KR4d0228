body:
  text: 雪山集卷七宋王質撰記涪陵譙先生祠記案此記與白帝廟記張益徳廟記當是孝宗乾道四年六年質兩入蜀時所作孔氏亡而書存世以其書誘士以為使外騖之徒利之故正學廢而俗學興其所資者章句言語形名度數豪傑之士不堪以其髙明廣大之體滯於其間佛氏之子有達磨者自西土來中國斷拘攣之見掃凝滯之具引學者以駿利之途天下豪傑相詠讚以為依歸於是佛力始重自達磨建此宗而豪傑或見其趣嘘呵踧踏驚絶超拔之功故豪傑歸則權在佛而儒者行世多為富貴威武所制功業名譽所役有得於佛氏之家者輕之儒者雖外不服而内自媿也普通以來天下以明心見性之捷非求諸佛氏之門不可吾道之妙布列於詩書禮樂而潛寓於易時出於論語孟子而㑹見于大學中庸未有指而出之収天下豪傑而歸吾宗故惠能道一懐遜義元之流不受衣冠之所維縶使吾宗得此百倍于鄭元馬融案鄭元之元宋時避廟諱所改失之哀哉伊川先生實始標呈孔氏之秘比佛氏所明益顯露且親戚不絶衣服飲食不易發竒偉之事于經常之中天下豪傑自有天淵為飛躍之地異時插鍬繫竹咸為吾宗之歸孔氏之權重矣涪陵譙先生初習佛伊川授其學以大學中庸而指其法以敬先生悦之棄家破産疲曳妻子以從之遊及其困飢且死不以非義之粟而易將殞之命非天下之豪傑其能建立如此哉徃余在都有不悦伊川之學者為余道之余曰建炎之初詔起譙先生于河南無所蹤跡有野人道使者入嵩山深絶見先生卧土屋衣襦釡竈皆塵强掖起之既至與宰相不合遂去不知所之此孔氏所謂遯世無悶樂則行之憂則違之確乎其不可拔潛龍也天地造化有不可羈紲或攝受之無難可謂有力非耶制伏虎豹非西方獅子不能他非余所知也是時尚未熟知先生之詳後數年過涪陵見伊川之孫太守程公示余以武夷胡公憲河南郭公雍諸文且道所未盡者乃得其本末出處甚悉初涪陵未有先生祠堂公至始克為之險逺幽仄有此足以重天下而無與揚之至今蓋其後徙于伊洛而轉仄于吴楚存没皆不闗于故鄉其疎固冝雖于先生無所為虧而鄉黨之典與牧守之職則為曠非公道問學敦教化念其祖而欲崇其徒奬其先賢而欲風厲其後來者誰與領此堂成而余來非平時有慕於其中而竊見其餘末又誰當言之此豈偶然乎哉先生名定字天授起布衣為通直郎直秘閣喪亂莫知所終或云終於嵩山少林寺又云隠居青城之老人村易姓迨其今猶存云白帝廟記白帝公孫氏茂陵其里也清水導江臨卭其生所厯也成都其稱帝王及死所也瞿唐其廟也其廟不知其所始而其事則可次而言之也嗚呼更始元年稱輔漢將軍于成都欲保郡自守以待真主此白帝素志也美矣二年拒更始所遣將李寶張忠而稱蜀主貳於漢也當是時世祖皇帝轉側河朔之間未興而更始之政已亂非貳於漢也貳於更始也猶之可也建武元年以成家為號而稱天子於是欲與世祖爭天下尚奚言素志盡反矣嗚呼白帝其知天命所歸否耶白帝初聞李熊之言辭曰帝王有命吾何足以當之白帝之知審也熊曰天命無常百姓與能能者當之又何疑焉熊之弗知非白帝之弗知又審也嗚呼誤白帝者熊也六年世祖騰書為白帝平素之言且曰天下神噐不可以力爭白帝其知神噐可爭否耶是嵗隗囂以隴西歸白帝白帝得之與合從拒世祖嗚呼誤白帝者又囂也囂不能誤竇融而誤白帝竇以興公孫以亡其白帝之不幸非耶十二年世祖又移書為白帝苦陳之且曰以時自詣則全當是時隗氏滅任滿田戎敗公孫恢史興又敗謝豐袁吉又敗王師既守成都白帝其知事勢之去否耶十二之期至矣白帝固自知之而延岑之言曰男子當死中求生可坐窮乎嗚呼誤白帝者又岑也方事之急也張隆常少勸白帝以來歸此劉禪之譙周也而白帝之言曰廢興命也豈有降天子哉則已入岑言于先隆少忠謀格矣岑存而隆少死何哀如之乎嗚呼使白帝如世祖指挈圖迎降保族安民與河西竇融同功智士之事也既不能然勢盡力窮健決糜於一死不肯為姚泓慕容超以肉委人壯士之風也泓之果顧不及其童兒白帝視之壯矣嗚呼智士之事不足壯夫之風有餘廟以祀之非耶蜀也者魏取劉晉取李取譙唐取王特易於他邦而漢取公孫最後於餘敵且難白帝之能高非禪勢縱衍之倫也岑彭來歙强對也白帝能問隕之劉尚敗吴漢危不得脱白帝之能誠高也嗚呼議白帝者難乎其辭矣吾以為白帝之禍造於熊集於囂厚於岑非白帝也如是其可以少慰白帝之心不與張步秦豐同羞否耶白帝死而為神據江山之㑹而䕶持徃來於險阻之中豐功茂澤咸交讚以為歸則泥首銜玉畏死偷生之流何以得此也嗚呼其可書也已其可書也已張益徳廟記漢車騎將軍領司𨽻校尉西鄉侯張公與諸葛武侯闗氏壯侯案此節去舊諡一字原本如是後同以文武相濟夾輔先主紹延漢基其子孫終始死生之際皆無負漢者天以此三人遺先主成邦而共為存亡所謂期運者非耶初先主與公同以涿郡為鄉先得公壯侯自解奔涿於是乃得壯侯皆燕南故人也及先主依劉表駐新野於是乃得武侯語序武侯新於二公而先主所為魚水者在武侯惟深此二公所以弗悦雖其跡如此而忠於漢則三公同一心也公之孫尚書遵武侯之子衛將軍瞻俱死事於綿竹壯侯之孫夀亭侯彛與其宗殱於成都所謂共為存亡者非耶嗚呼事將成天也初先主畏偪自樊略宛循襄陽向江陵至當陽之長坂曹公垂將及之危哉公據水斷橋瞋目横矛以二十騎遏數十萬之師不得前而先主得斜道趨漢津㑹壯侯舟師以脱其不死幸也於是武侯以大計説孫公而周瑜赤壁之事乃濟敗曹公也其人為周瑜天下戸知之説孫公也其人為武侯天下亦戸知之以舟師濟先主也其人為壯侯天下亦戸知之至斷橋郤敵以免先主未有明為高於他功者㣲公先主虀粉矣武侯壯侯安在哉而尚赤壁耶此漢事之將成天遺公也嗚呼事不成亦天也初先主鋭復壯侯之讎是以為吴之師公提萬數之旅順流而東下陸遜豈易當之哀哉閬之難也公死而張南馮習本兵猇亭秭歸之恥童子知之矣此漢事之不成天奪公也天將壊人家國先奪其人人亡而後家國從之臺城陷羊侃先死江陵陷胡僧祐先死汴州陷王彦章先死夀春陷劉仁瞻先死人弗死如基弗摧室弗傾也夫先主北向以爭天下中道而失壯侯實建安二十四年也東向以爭江南中道而失公實章武元年也不二年無兩公先主身老志彫而永安之變已矣天其可知也武侯上失先主下失兩公而黄忠之卒以壯侯死之明年馬超之卒以公死之明年異哉其參㑹也漢之羽翼殄矣武侯欲以楊儀魏延李嚴馬謖之軰而囘天心武侯非不知之其未解之條六章可以推之矣至鞠躬盡力死而後已其成敗利鈍非能逆覩此武侯平生大指而形諸辭者也後十三年而武侯死漢事去矣公不没於閬壯侯不没於臨沮而武侯猶未殯於渭原殆未可量也公自中平之初至建安之末事先主凡三十有八年其相先後而終才一年有竒廢興存没其果有數也非耶公既没而為神其豐功茂澤形於死者愈益加於生則公為不死也神仙不死以氣之貞豪傑不死以氣之英氣無間於窮壤無隔於今昔嗚呼其可以弗敬也夫其可以弗敬也夫濠州雙穗堂記淳熙元年夏四月得麥於濠梁之郊一本而二岐太守張公曰桑無附枝麥秀兩岐此吾祖漁陽之誦也吾何以得之凡州之人咸曰維時穰哉維民康哉太守良哉公曰異畝同頴之禾唐叔得之獻諸天子天子得之歸諸周公歸禾之書是也周公得之旅天子之命作嘉禾焉成王不肯有叔父是歸周公猶曰天子之命也敢辭况唐叔哉國有祥天子承之其不有謙也臣揚之罔敢居之在小臣尤冝也凡州之人又曰徃者資政沈公使淮西其未入為大臣也有芝開其先焉堂以識之其名為玉芝者也於是濡須重矣公誠不自有毋亦肯堂以寵吾邦公謝不敢曰小儗大非倫也凡州之人又曰五榖奚别而麥見謂首種其有以也夫天將興周以來麰貽之及其降也春秋他榖不書至麥禾不成則書之非末矣斯堂也者重民事承天休太守之職也公其毋忽公又謝不敢弗能得則左其治之偏而堂之公曰以雙穗名若何凡州之人曰宜公曰宜則當書來告曰苟宜書公其為我書之漁陽在漢為宛人我於今為安豐人間因亂避地而去之殘牒尚有攷焉今逆數漁陽為建武初元得一千二百餘年而是物也復出大懼無以紹前人之休然天子之澤非我之力也余曰公之言義之正也不忘漁陽之烈知尊祖也不自有濠梁之祥知尊君也為人後知尊祖為人臣知尊君於法當書余之言義之正也初淮南被完顔亮之師公以諸生糾義旅䕶鄉閭故安豐不亡太上皇帝義而官之以郡參佐付之主上又以提封俾鎮之以儲閣俾直之居十有餘年安豐烟火桑麻有承平之風焉又以節俾持之濠梁要地既歸節又起而俾典之期年濠梁又成樂國民無榮悴地無肥磽兹惟人哉天無心孰兩夫麥之岐麥無情孰秀夫岐之兩也有沖氣行焉條達絪緼而為此祥兹惟人哉公於漁陽雖其詳未可見而其人有相似者為祖若孫或可以言之也漁陽少從世祖以儒家子為壯夫事下公孫述於成都破匈奴漁陽高栁以少擊衆諸將服之敵人畏焉以健武才施慈祥政開田疇勸耕耨陶富庶於閭閻能者難之此與公氣象規模余以為似之非耶漁陽班於郭伋杜詩亷范之間如公則將誰班議者必有以處之矣始公為安豐有蓮一幹而兩華及為濠梁又如之其祥不獨此也然非民政所闗弗著著其堂所自得名以示夫有志於育民者觀焉興國軍大冶縣學記天子非人才無與共治天下人才也者其源在鄉其流在郡其歸在朝廷積石河之源也岷山江之源也播而九之河之流也别而九之又三江之流也其歸則同入於海也河且南且東至於華隂底柱孟津大伾過大陸而北之此而見河之功江所厯曰沱曰澧曰東陵曰滙曰中江皆東趨此而見江之功皆未逾海之為歸其澤溥也人才在鄉不若在郡國在郡國不若在朝廷朝廷人才之海也而其源則濬於其鄉周制士有秀自鄉而升之司徒則以選士名之拔於其羣也選士又有秀自司徒而升之學則以俊士名之尤於其選也既升則弗征則以造士名之與民别也造士又有秀大樂正以告於王而升諸司馬則以進士名之與士别也進士又有賢司馬以告於王而官之爵之禄之此人才之濫觴也周官三百六十總以六卿内外高下而别之乃克用人盖人才皆繇此出也今之天下為里若干而屬諸鄉為鄉若干而屬諸縣縣也者鄉之㑹也此論士之積石岷山𨗳之則九國被其惠否則萬物壅其澤其利害顧不大哉公來為是邑則曰財匱當理訟滯當決有司事也學校弗振則人才弗茂人才弗茂則國奚須君奚頼哉國事也君事也古者三十年為一世州以士獻郡弗以名聞閲世而且過之其才小不展於州縣大不施於朝廷士奚怍有司之慚可既乎何為咎有司也縣令於民有父母之道也於士有師之道焉民弗興咎在父母士弗作咎在師公甚病之則以告凡邑之民曰學也者為國養才非虛拘夫士也士也者為國養徳非空廪夫官也徳足矣位及之所以訓治汝等既富且良而為美俗也於是役興而民驩趨則又以告凡邑之士曰學也者非徒其文也學之本在道士也者非徒其貌也士之實在心所以推之治國平天下惟公所學是資也於是工休而士競勸則以請東平王某書之公不自有又以告凡邑之士若民曰學也者天子制之有司行之當戴天子無思有司詩不云乎周王夀考遐不作人知本也夫於是以時釋菜於先聖之庭再拜稽首詠歌君師之徳以為天而后某為之述曰丙申冬十一月二十八日緒功也丁酉春二月十五日訖事也三十有七者其楹也西而北者其方也其來請者周君之竒朱君紱何君若董君維新萬君鈞陳君勛學之儒生也其更新者潘公子韶邑之令君也公三山人賢而有政事文章觀此其他不問而可知也張氏和政堂記案此記當是孝宗淳熙五年所作聖言該治道也悉矣箕子析為三正直一也剛克二也柔克三也孔子析為四施之以寛一也施之以猛二也平之以和三也和之至四也三即四四即三寛猛者剛柔之異名也和者正直之殊稱也若之何别之亦嘗引天下之理而伸之乎隂陽氣也晝夜者隂陽之變也隂陽交而四時成焉剛柔形也水火者剛柔之變也土石者水火之變也剛柔交而四維成焉寛猛事也緩急者寛猛之變也堅脃者緩急之變也寛猛交而四端成焉四時全則天和四維全則地和四端全則人和和與同異不相同而濟乃克為和古之人誰其得之仲山甫以之尹吉甫之誦曰人亦有言柔則茹之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮鰥寡不畏彊禦不茹夫柔以柔為剛也不吐夫剛以剛為柔也聖人曰寛柔以敎南方之强也死而不厭北方之强也故君子和而不流中立而不倚仲山甫無偏於南北而㑹歸其極是之謂致中和者耶近之人誰其得之西安趙公以之眉陽蘇公之辭曰其在官守不専於寛時出猛政嚴而不殘其在言責不専於直為國愛人掩其疵疾匪一於寛致猛以濟其寛也匪一於直致曲以遂其直也聖人曰寛裕温柔足有容也發强剛毅足有執也溥博淵泉而時出之趙公入是門哉兹其源乎所濬發深逺矣今之人誰其得之廣漢張公以之其為荆也慈温薰惻如趙公行春令之於益也峻發嚴厲如趙公行冬令之於杭也平舒肅潔如趙公行夏秋令之於處也合而為此邦此堂之所由作也其試偃仰游息於斯堂之上近取諸身逺取諸物而觀之日麗於晝而不能夜月麗於夜而不能晝惟人也晝則曰闢夜則曰闔天之全吾兼之動物横而不能縱植物縱而不能横惟人也立則體縱卧則體横地之全吾兼之呼吸而為氣能隂能陽屈伸而為形能柔能剛斂散而為事能寛能猛故人之為天地之靈也為天地之靈而弗能自用之物所移也性有强弱則五行之數移之也資有温燥則五方之氣移之也識有顯晦趨有邪正則父祖所陶師友所漸風俗所染又皆得而移之不動者真我也公定心所照無方不徹獨運夫天地之靈而翕張疾徐皆在我也人無所致其親又何所致其疏人無所施其畏又何所施其侮囘旋變化於寛猛剛柔之間水火醯醢鹽梅備矣所謂和羮非耶公名某字某其考太師某也父子所傳上之孔氏為宗下之至於今也孔氏之大㫖曰喜怒哀樂之未發謂之中發而皆中節謂之和惟其傳之正也故存心養性而精一執之中弗離和弗散含徳厚矣其不競不絿不剛不柔凡形諸外者充和之餘也其可書也已其可書也已平政堂記案此記當是淳熙六年所作上即位之十七年詔以某人為興國太守凡親若故咸止君勿徃曰究之習興國者瀕湖為郭其民與龜魚薲𤓰雜居水歸則葭葦莽蒼又與狐兔相參也是嵗諸大吏繩是邦以法者若干諸小民訴是邦以牒者若干諸吏若胥大若小重若輕論者若干諸當輸不輸錢若干粟若干諸當辦不辦兵若干甲若干推此類具言之又若干其何以當之君曰君命也將若之何既至信然某人欲引去某人欲引去或趨君勿留曰興國久不可為也而今為甚凡倉庾若府庫存者若干弗存者若干凡文符可報者若干不可報者若干凡城郭若鄉里可督者若干不可督者若干他不堪誰何者又若干其何以承之君曰君事也又將若之何古之為吏者以職守為業以官守為家漢制間即所居之官為姓號傳子孫而疾病休謁湯沐則歸而與其家相見其勤且専者雖湯沐亦弗出猶有純世之遺風焉古者重於以身臣人由此之故也今士大夫之家固有不幸而當其敗壊者則亦極力所致而已未有棄而他之也使為吏者舉擇夫便利美好居之則逺外之人誰與共理者上不鄙為弗能而俾之當此門持此家人主以天下為家者也衆建官師分職内外無非幹蠱之子承徳而用譽斯為亨也二爻幹母三爻幹父而終爻則父母之蠱皆弗及焉故曰不事王侯高尚其事此季夏園公之倫非委質事人者也且我方其未來則固徐氏之主也今委此身任此邦徐氏則傳舍路人而興國則家也觀夫徐氏滋輕矣其敢不力若履危涉難與死生相轇轕在勞心平時且吉壤者不可同年語也其又將奚辭有所難於此則有所難於彼慎重可以為事君之大義非耶已而反側者綏之使安離散者斂之使集愁勞者保之使康迫蹙者弛之使寛而後廢玩者震之使聳豪梗者鈐之使戢逋滯者整之使齊彫敝者厲之使精寛猛相濟剛柔適時而興國之政乃平凡邦國官府之財賦凡官吏卒伍之稍食凡祭祀賔客之勞禮凡都鄙稍甸之政令無或過無或不及而興國之政大平惟其閲義理明閲世故熟致此非難也而不擇劇易不間􅍇惡以大公至正克其心汲黯難於淮陽而君易於興國視古人有加焉其堂凡辨地域凡審面勢凡賦功緒凡飭財用事皆弗著著其大略而繫之辭從民志也辭曰峩峩其巔穹翠摩天君登斯堂意不在山皎皎其沚江湖表裏君登斯堂意不在水安在其心在帝之民有露有霜有秋有春維帝克聖維民是徇不剛不柔大公至正維君體之又率履之君明臣良相協濟之有熙斯辰有偃斯虹萬聲一歡徃來憧憧有晏斯居晝律夜書弗猜弗驚浮龜沈魚君之歸矣民之思矣有苃其隂無斁遺矣三聖壇龍祠記淳熙十有一年六月雨不以時至太守池陽王公曰先成民而後致力於神古之訓也凡治具攷古之度相今之冝以次畢講廼有事於上帝又有事於羣龍公曰在田在淵且在天龍之所止行也宜求夫並野並水而揚靈即其所止饗之東隔堤起阜屹立平湖之中勢不甚高而巨浸莫能踰相傳與水俱升盖神之久矣公曰龍實震為之雷亦震為之正東之卦也是地當用吏以祠龍之舊儀進公曰祖宗憲章至天聖迄嘉祐愈粹今皇祐之成式在是法當用公又曰是禮也文其何以將之中庸不云乎至誠不息不息則久久則悠逺悠逺則博厚博厚則高明博厚配地高明配天悠久無疆天地以誠而交參神其舍諸公又曰是理也隠其何以表之中庸不云乎視之而弗見聴之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右夫㣲之顯誠之不可掩如此夫誠可㑹幽明為一家神其彰矣聞者信居半疑居半咸曰聖人之言在世何其取用者多而收功者鮮也今將於公乎騐之丁亥禮行是日隂雲生戊子禮成是日膏澤洽越三四日至足而有餘越七八日洊至而不絶於是疑者皆信信者皆堅然後知神道非邈聖言非誣某以為公致天澤厚民生其功小使夫聖人之言信於天下之心其功大天下不取信於聖人聖人不見信於天下雖有粟安得而食諸公名某字某其學𨗳源於魯而㑹流於鄒故言行之氣象藹如也信是理深相是禮篤起是工敏求是文切汴都趙某以之觀是舉審紀是跡實汶陽王某以之建諸天地而不悖質諸鬼神而無疑噫此文之所以為作也東坡先生祠堂記先生以元豐七年别黄見詩桑下豈無三宿戀尊前聊為一身歸者是案聊為蘇軾集作聊與見詞好在堂前楊栁應念我莫剪柔柯者是今載集楊元素起為富川聞先生自黄移汝欲順大江逆西江適筠見子由令富川弟子員李翔要先生道富川滿庭芳序所謂㑹李仲覽自江南來者是案江南集作江東今藏下雉李氏先生自臨皋渡武昌見詩清風度水月銜山者是案度水集作弄水今載集見詞高安更過㡬重山者是今藏磁湖陳氏先生至富川見詩吾曹總為長江老者是今傳富川見詞緑槐高栁咽新蟬者是今載集且藏下雉李氏先生自富川趣高安與元素濃醉解别不及石田已暮見詩惟見孤螢自開闔者是今載集見詞過湖攜手屢沾襟者是案高安更過㡬重山吾曹總為長江老過湖攜手屢沾襟之句今集中佚之今傳富川前三十年一嫗尚及見修軀黧面衣短緑衫纔及膝曳杖謁士民家無擇每㣲醉輒浪適驩相迎曰蘇學士來來則呼紙作字無多飲少已傾斜高歌不甚著調薄睡即醒書一士人家壁云惟陳季常不肯去要至廬山而返若為山神留住必怒我書一民家户云今日借得西寺法華經其僧欲見遺吾云汝須得我不須得今傳富川先生至京師入禁林猶不忘此土見書都下全無佳思坐念公家水軒蒲蓮豈可復見今藏下雉李氏吾廬切與蒲蓮相鄰以小詞從事欽惟元豐矯揉琢磨先生於江湖之間五年不如是奚以為先生先生去齊安以四月一日至富川以七日去以十日至廬山以十五日至高安以五月一日去以十一日至吴楚梁宋河朔交廣又十七年不必攷亦不忍攷吁富池昭勇廟記昭毅武惠遺愛靈顯者王爵號也昭勇者王廟號也富池者王廟所也甘氏者王姓也巴郡之臨江者王鄉里也某為秦丞相王逺祖也某為吴尚書某為㑹稽令者王子也某為吴太子太傅某為晉鎮南大將軍某為散騎郎者王孫也鎮南者死王敦之難於襄陽晉忠臣也吴王所仕國也大帝王所事主也西陵太守升城督折衝將軍前部督王所厯官也破曹公於烏林於濡須獲朱光於皖城遏張遼於合肥走關羽於益陽解曹仁於南郡禽黄祖於武昌者王生而在吴之功也捍寇賊保城邑興雨澤救生靈於元豐於建炎於紹興於隆興者王没而在宋之功也王生而事劉表事黄祖皆弗克終而其際㑹建功立業者吴也王没而厯晉厯宋厯齊厯梁厯陳厯隋厯唐皆無所寵嘉而其尤大彰明較著者宋也宋有天下追録前代忠臣義士死而能有隂功密澤者於是以王為襃國公開寶五年太宗皇帝錫之也以王為襃國武靈公者元豐五年大旱禱雨有應郡以狀聞神皇帝錫之也以廟為昭勇者政和二年部使者以王功聞諸朝徽宗皇帝錫之也以王為武惠王者宣和五年道士臧歸真以王功上公車徽宗皇帝錫之也以王為武惠昭毅王者建炎二年以靈卜驚張遇郡以狀聞太上皇帝錫之也以王為昭毅武惠顯靈王者建炎四年以隂兵鎮金人御營使劉光世以狀聞太上皇帝錫之也以王為昭毅武惠遺愛靈顯王者紹興二十一年部使者以王功聞諸朝又太上皇帝錫之也王太守將軍於吴公於開寶增號於元豐王於宣和一再増號於建炎又增號於紹興嗚呼吴於王厚宋於王尤厚也順佑柔懿凡兩夫人小君若女也紹威紹靈凡兩侯尚書若㑹稽也建炎四年劉光世之請也嗚呼吴於王厚宋於王尤厚也吴所以興有五人也不能退曹公使曹公順流而下吴必亡其退之者周瑜也不能擒闗羽使闗羽卷襄漢而上吴必亡其擒之者吕䝉也不能郤漢先主使先主順流而下吴必亡其郤之者陸遜也不能取黄祖使黄祖據中而立吴弗興其取之者王也魯肅也肅之言曰漢室不可復興曹操不可卒除惟有鼎足江東以觀天下之釁𠞰除黄祖進伐劉表竟長江所極據而有之然後建號以圖天下此高帝之業也王之言曰漢祚日㣲曹操彌驕終為篡盜南荆之地山陵形便江川流通國之西勢也劉表慮淺子劣不可後操圖之宜先取黄祖進據楚闗漸規巴蜀此二䇿者吴所以興也漢高帝之興韓信壇上之辭也漢先主之興諸葛亮廬中之辭也吴大帝之興王所建取武昌并荆州之謀也周瑜吕䝉魯肅陸遜班也陳武凌統董襲蔣欽非班也後王之没千餘年始與史氏辨正而著王之等夷為高非諸公之品也嗚呼其亦有數也已按圖經王嘗為偏將領陽新下雉縣今在郡西大帝取以為武昌郡者也按傳王為西陵太守領二縣陽新在隋為富川又為永興去西陵千餘里疑傳未安也或者為西陵之後易領陽新下雉上接武昌下控潯陽未可知也按圖經王嘗侯溧陽鎮富池按傳王之卒也未侯嘗屯當口屯半洲不及富池疑圖經未安也今下雉去富池二十餘里或者富池即故下雉未可知也嗚呼校合山川道路於千載之上難也可以闕書而王之豐功茂烈則不可以闕書也受吴之恩報之如此受宋之恩報之又如此則王之忠義又不可以闕書也宋祚無極王心亦無極隂殄北敵永清中原共躋登兹王之威靈誠足以及此也詞曰陵谷兮迭為高深草木兮秋春明月兮不淪金支翠旗兮常新波濤沸兮簫鼓龍吟兮蛟舞瑶簪兮瓊琚江妃兮漢女巵動兮星流袂舉兮雲浮格澤欃槍兮播落踧踏虛空兮百萬之貔貅厲鬼驚兮疾走沙飛兮石吼玉劔兮不鳴天河兮無聲億萬年兮元功生死兮哀榮榖我兮絲我淮之右兮江之左繚荆陽兮提封惠澤兮穹窿赤縣風塵兮䝉籠掲龍旂兮在大宫談笑汎掃兮正帝位於天中有詔臣某兮女其為王頌之拜手稽首兮曰臣其敢辭壓波亭記湖今以洮名者是亭今以壓波名者是以名斯亭者丹陽陳希顔識後湖蘇公語也案蘇庠著有後湖集見陳振孫書録解題或曰公之行世困於言語之波濤寢老矣其將靖之懼之云乎抑憤之云乎有是哉公之隘也公聞道最早其視波濤均於皋壤矣奚其懼奚其憤夫以力御物為壓與物無競養力不形其相忘於道術者乎何以壓為然則公意安在吾不能追躡特以所見明之水之本性湛也波濤其變非本性也風摇之否則石激之風石之勢或緩或急而波濤從之有所使而然故曰非本性也變也本性則無所使亘古窮今常若是而已矣吾觀於天下之水環三蜀數千里之壤與夫西戎南蠻數十百國之幅􅊷㑹三十三江與夫數百萬之壑谷而走諸瞿塘他吾弗知自夷州達夷陵名灘四百二十有五極天下雄竒而其無聞者亦且駭神墜膽鬼神將郤避之石使之也至荆州水得平衍而縱横大肆以徹於海窮諸才辯不足以發明其博大雄豪之趣㣲風乍起萬波隨興瞬息顰伸天地為之變遷蛟龍為之掀舞陵谷山川弗主故常風使之也風石之力亦大矣而騷人墨客一觴一詠可使妥伏安帖文章之力滋大矣韓退之於南山杜子美於洞庭玩名山大川於股掌之上推此類具言之豈足以當文章之鋒哉公於文萬人之敵而有餘者也初定交於後湖春秋甚富也周行天下熟閲世故自芽蘖拱把而千霄梢雲後湖不及見也洮湖之波濤少時足以鎮之後湖已服其竒矣今三江五湖横放之四海不足容也而况於洮湖哉後湖當有以處之吾未嘗登斯亭也而預觀於斯文想亭下之風煙凝逺魚鳥不驚草木水石幽暇澄穆翛然有道之場塵中無有此也後湖之語其然哉後湖之語其然哉吾晚出於後湖後湖之意未究者猶可辭乎作止一如喧寂並遣無波濤亦無無波濤無所壓亦無無所壓萬物之自然而相為徜徉此之謂逍遥而天下之至樂蔑以加於此矣謂予不信作後湖於九原試以問之游無窮室記為姚明之作子王子問於子姚子曰子好遊乎吾將與子東絶大河跨龍門厯砥柱而窮其源之與牛斗接者登岱宗望滄海而觀日出泝汧渭略咸陽訪秦漢之故都而而想像夫阿房五柞露寒宜春之壯麗子能强而從我乎曰能吾將與子南浮大江陟九疑酹虞舜之瓦棺而弔英皇北傳長城數飲馬之窟而眺望三闗阻阨之形勢子能强而從我乎曰能吾將與子䄂手相對近不離几逺不踰閾而相與神遊八極之表朝發軫於蒼梧夕弭節於崑崙聲氣不接筋力不頓子能强而從我乎曰不能王子曰子云所以不能者有所礙也今夫織蒲以為屨斵栁以為履伐檀以為輪豢駟以為服合木以為舟緝竹以為筏此六者世之所謂致逺者也而卒有所窮何者之齊則違楚向秦則背越非齊楚秦越之病子也吾將使子不屨不履而能行不輪不服而能馳不舟不筏而能浮也如是則無齊無楚無秦無越是豈不在子耶昔者子列子之御風也徐行不見屨履疾行不見輪服而川行不見舟筏也蓬蓬乎與風俱高寥寥乎與風俱卑迢迢乎逺而不疲翺翺乎澹而不白善矣而猶有所待也風行則行風止則止是行止係乎風也行止係乎風則不在我故飄然而升薄乎雲霄我不能使之降委然而降墜乎川谷我不能使之升非天下之至游者也黜肢體墮聰明與化俱流與妙俱冝而後能游於無窮今吾子之室間函丈席間容尺人以為隘也而達者視之不然千仞之高生於目也萬里之逺生於足也超然越乎目與足之外則千仞烏能為高萬里烏能為逺哉函丈之室容尺之席其間盖有無窮之游乎吾子盍歸而求之敢命之曰游無窮而為之記達磨大師行龕記江陵張君孝芳事菩提達磨大師作行龕與俱以示某曰為我記之達磨自竺乾來震旦過建康見梁武弗旋踵遁去終其身於高山之間夫事佛之力他帝王未有加梁武者藉此足以有為矣而去之何也梁武繳纒名利之末固不足以領達磨所付而魏明者亦何足以知之魏明見之三達磨郤之三此非有所可否於梁魏也孟子曰舜生於諸馮遷於負夏卒於鳴條東夷之人也文王生於岐周卒於畢郢西夷之人也地之相去也千有餘里世之相後也千有餘嵗得志行乎中國若合符節大哉中土聖人馳騁之地也所謂天下之廣居者乎如長江巨河下萬斛之舟而巨風翼之如平原大川以絶足之駟而駕輕車其力易施志易展也英雄好為事業者固與道異趣所成如漢高帝斯已竒乎其王漢中也曰吾亦欲東耳安能鬰鬰久居此乎聖人雖無心於擇土而勢所便氣所合者多在夫七曜五行純全融結之所自慕功業者言之所謂建瓴水於高屋之上者也文王遷鎬而太公來達磨至洛而慧可出風虎雲龍此豈偶然也哉南印來東土越海踰漠為法求人見赤縣神州有大乘氣象達磨固自云耳雪山集卷七
