body:
  text: 雪山集卷八宋王質撰書與張都督書案此書當是孝宗隆興元年所作某自四月離揚州今至南陵三日而行四百里勞苦之狀不言可知獨是隂以觀聴求諸道塗薈蕞見聞或可以補助萬一前書略以某人御下無狀之迹告之欽夫持兵劫屬官之書擬刃臨總領之輿縱火焚編民之草乘酒撞納婦之居甚不祥也某在相公左右未嘗聞之某猶不聞也計不復至於相公之前矣然則相公平日所聞懼有非其真也夫居人之上者下之顰笑屈伸無所不當知之故能得其隠㣲而為之瀦洩古之為君也或出入南畝之間曾孫來止是也為吏者或㫖否饁食之際田畯至喜是也凡為此者無所不知之道也後世之民視君如帝視大吏如神視小吏如龍麟虎豹可見而不可近也故上之人耳目寢狹而下之人肝腸寖壅幸而達也未有無所厯且無所託而能也對面之間猶有乖隔況涉數傳之後乎相公之尊其得見者有數矣見而敢言言而敢盡者又有數矣故某惟相公平日之所聞有非下情所誠然者古之君子以苦言為良藥以甘言為美疢何者苦言之多出於情而甘言之或浮於實也雖不皆然要十之八九矣前侍相公因言趙沂來告吴璘之師復振西人之歸不絶近見馮時行移書唐立夫深病璘而危蜀趙子之論是馮子猶不失憂時愛國之賢者馮子之論是趙子可勝罪乎然則馮子非欺人者也趙子雖不欺人為人所欺則未可知也某亦安知某人為能與否有不令子弟足見其無賢父兄矣然此言難信者此事非某之素習也耕織當問奴婢軍旅當問武夫書生非其業也問佛於僧其知之固也至於飲酒茹葷為僧之病者其徒未有肯自列也問他人則知之矣相公重以軍旅之事而問士大夫亦重以士大夫之議而言將帥豈不以非其業故耶古之豪傑部賔客以軍法是滅秦抗漢之規也勑兒曹為部曲是駕魏陵吴之勢也近見陳阜卿云始謂御軍為難今又措置民兵府卒乃知不過如此某云天下本無難事意解便了然兵非士大夫之所常習亦非士大夫莫能深知此物與鬼神造化相通非庸人所能輕解故某前書略謂欽夫軍旅之權當使漸入士大夫之手只陳阜卿張晉彦之流使居兵間戈鋋刀槊之下便有古人之風今數大卒為之没世不能有美績也敗壊五家軍政職是數大卒而又燈燈相傳源源不絶態度殊不甚逺尚有加焉有陳金而置廡者必無宿城之奔有素服而殿師者必無徳順之效此豈過誤哉相公以此知諸將之才矣早晚還歸廟堂維新憲度若不易今日之軍政亦不過今日之武功而已相公之誠通天地而開金石盖有餘也然精神寖改於前時功業未滿於初心徒使相公深悲浩嘆之不足前日臨分之際相公忽動山林之興退與欽夫道而傷之諺云指望張三作王大争奈王大是張三蹉跎相公至此者則此曹為之也豈獨諸將之罪哉張晉彦聞已得祠必過維揚謁相公試留與語觀之偶動懐抱不覺宣洩尚惟鈞恕與湯相書案此書亦似隆興元年所作某於四月二十八日嘗以劄子訴相公以家貧親老之狀乞一官職為養伺侯二十七日不得報廼五月二十五日再以劄子申前懇益切伺侯又二十日猶不得報某竊自疑相公前後再當國天下之才超軼驚邁如張孝祥諸人皆弭耳下心聴命効力而不辭不獨相公有以服之殆有以致之也故近世宰相之門多人物者無如相公詩不云乎有卷者阿飄風自南阿卷則風至禮盡而士附某以身試之而未然豈有所得罪於相公窮思深維不可謂無罪然不得為罪也敢為相公陳之天下之人苟非園公綺里之流誰能無求于宰相受其求者尊則求之者卑惟其習為卑也故擎跽曲拳促縮喘吁猶以為不足某今未嘗一涉相公之門移書而求官閲月而狎至夫為天子之宰而匹夫可遥令且可趣得耶此其罪則近乎傲羣天下之士而敎養之于都其名曰太學以博士正録五七輩相與董治乎其事其名曰學官其人雖未精選而間亦頗有所擇故金銀伏獵稍不至其間而某驟出草萊未嘗為朝廷試用雖以舍選進士發身又烏知其非金銀伏獵之流而遽有所求乎此其罪則近乎僭傲與僭某不敢有所加飾獨念前日幕府之廢亟欲解歸而未能忘懐于相公猶僥倖夫一見而庶幾乎有成則歸且有辭以白大人而少慰其心是以匍匐奔走而來至東林而嬰疾有故人者館之盖將調䕶以待其平而自致相公之前又慮夫延日淹月不能以卒安而藴結含蓄之情有所留滯而不得疾吐如茹物于其咽而不下是以出此迫切率易之為而不知其非夫江淮去行都千里而逺東林去行都百里而近不憚千里之行而辭百里之役夫豈人情形近乎傲而心非傲也某入太學一年而校外舍二年而升内舍三年而中上舍季攷月書苟以事而不至盖未有至而弗獲者厯數前後或者以為某積累之頗多而步驟之最速且以為其人能自别于其徒略無場屋銷落塵滯之氣而其為文無所大戾於繩檢雖間有所不與亦以其取名之太多而躐等之太亟曳裾其後者不能無不平於其心至數某不肖之迹則亦不過布衣平時之常態滕甫馮京反以得聲而取重於世者也今之為學官者率出于進士之髙科宏辭博學之異選三舍之聞人而三舍所居且多于其他某有其一而又居其多則亦不可謂全無涉也五年之積雖無一日之厯盖嘗用大臣之薦得册府之召近年召試而報罷不旋踵而物故者許必勝也經年而為學官者劉度也四年而漠無他授者某也某似必勝則猶有喘息苟存于明時似度則嵗月邅迴殆或數倍過之某之負釁也則以某人密授之某人而隂嗾以某人某人之怒某則以某為主坐而不往見某人之怒某則以某辟屬官而不肯行而某人則奉之行之者也夫某人某人之為人自有公論某人死而某人廢凡其所排棄者無不奮迅光明而有以自伸而某獨流落棲遲未解某人某人之冤幸未至于與必勝同科猶可以援度而為例名近于僭而實非僭也相公淵博超明豈不孚乎其心而疑乎其形察乎其實而牽乎其名猶宛轉遲囘于此非相公有所靳吝而不肯予特欲矯揉頓挫使知官爵之不易得而世事之難期也相公敎誨之情甚至某感服之心甚深然而相公所以遷延者至再而某所以哀鳴者至三相公矯揉頓挫之功不可以有加而某急切懇迫之辭亦不可以有進上之不可以有加而下之不可以有進其勢皆將窮于此方其未窮也猶有所待也至其窮也而不囘而後可以絶望而無所待天地之為秋冬也風戕霜剝而物不怨形槁精乾而物之望不絶何者秋冬于今而春夏于後也使萬物知天地惟秋冬之専而無春夏之繼其望絶矣望絶則天地之造化亦窮故天地于萬物相資而至於無極者吾之造化不窮而彼之望不絶是以能久伏惟相公推天地造化之心畧去其傲僭之罪而深察其至切之情度其勢之窮而無使其望之絶也是用刳心瀝辭重足聴命與虞宣機書案此書當是孝宋乾道五年所作某乍去恩門忽忽若有所失如詩人所謂静言思之不能奮飛瞻望弗及泣涕如雨若非恩義相闗豈復滯情如此伏想賢父子之間所以鍾意不肖者若合符節龜山老禪有云已到岸人休忘後未曾渡者要須船盖記録可見其詳者一佛三十三祖五十二世一千七百餘尊宿無他事業止是岸岸相濟舟舟相渡到岸自已事了度人佛法事了達磨謂神光云吾從南印來東土踰海越漠為法求人此聖賢傳心付印之急要至勞至苦至痛至辱而不辭載在詩書揚善推賢亦是法也在出世界法則為報佛恩在世間法則為報國恩不獨是學人身分上事自是尊宿性命上事學人委命以求師先覺捐軀以求嗣西來之初達磨腐舌爛腸甘天下之至毒而神光斷臂立雪極天下之至慘與後世兒孫輩立本來面様今世有堪為法嗣而不遇引接之人有收為子息而不堪付授之寄豈惟禪門士大夫亦然某于恩門委身投誠如須彌山永無退轉如恒河沙永無窮竭于是恩門于某未知肯與一指頭禪三頓棒法否若謂果然則野水無人渡孤舟空自横又未知其説也老子問于常樅曰何以敎我常樅曰過故鄉而下車子知之乎非謂其不忘故耶常樅曰是已人情逺則疏疏則忘今某逺矣疏矣願毋相忘而已與虞相書案此書當是乾道六年所作某以凛冬之嚴厯馬嘶饒風之險以盛夏之烈犯瞿唐巫峽之暴以期年之間而行數萬里之逺以一介之㣲而當鸚鵡之憤可謂天下之至危至苦幸而死脱遂此生歸凡身體髪膚父母妻子皆相公再與之餘置勿復道也某心彫意謝無意從官固與相公有言矣自師友親戚交謁更諌皆不以為當以義相感者以為自秦漢以來王公不復下士宜少除豪以相遷就庶授受之間兩得其理此一論也以利相𨗳者以為知己當位時難得而易失過家宜亟去無留不可遷延持俟命之説此又一論也前者之論謂之宜除豪盖自無豪可除其説非也後者之論戒其勿俟命命者受之于天人若之何其説益可羞矣某之所以自處者甚確其自知者甚明也顧情有所迫義有所當然不得不為相公陳之父母既老兄弟未立全家所望惟某而已今既不能强行其所不欲則俯仰所以責任者未有以當之也伏念家君好學守道亷介勤畏兩任六年麤為統莅者所知今夷陵法掾垂滿若至行在謁銓部不惟數千里之役非老者所宜而三五年之次亦非窮者所易守也某省罷固法之所優而同列已各有處又以例之所當得者願以此移之于親惟相公哀之祖宗之朝有乞以已官予父者有司以法而格祖宗以情而從著在昭陵之録可覆視也伏望相公攷祖宗之憲推父子之情且念某既不能立身行道以顯親又不能靦容就録以養親將無所容于天地之間矣相公儻從此請則某雖死之日猶生之年雖不仕猶仕也竊度相公之心亦未能于某忘懐或有耿焉故嵗所賜誨言所謂如坐針氈之上者意可知也是舉可以釋相公之恨而滿某之願今而後相公可以恝然而某無所望矣某宦情既銷歸志已決山林之士固不當與宰物者相通此劉噐之所以絶書于司馬文正而文正重之者也然不及已而及親雖私猶公也相公雖擕而白之上出而示之朝議者亦無以罪某矣恭惟莆田丞相與某有十五年之雅同悲歡于患難之際共死生于兵戎之間一燈青熒對牀而聴夜雨兩騎蕭條竝轡以行秋風丞相之書所謂江淮幕府之契無如公者是也又謂毎得公書輒媿見顔面此其心不可謂不知慙矣使某皮焦肉枯窮天下辛苦之情心碎膽裂受人生危辱之極何冤何負而至于此異時丞相將何顔以見天下之士然此私情耳而有公議焉修謹寡過諒直自信謂之賢則不可誣也今其去矣為之慨然規模一旦雄張多士羣論不無儻若之歎台庭既未竝建則相公獨任其責矣富彦國營北事開端而讒已集范希文韓穉圭理西事中道而毁肆興異意者本以害諸公諸公之身既危而國家之事亦敗矣冦平仲收澶淵之功而骰子之譖繼起文寛夫䇿貝州之勲而燈籠之謗始作幸成乃爾而况于未必成哉惟冀保嚴自任之軀峻極維垣之品某稽首遐瞻傾心䖍禱與虞相書案此書亦是乾道六年所作某伏以即日凜秋恭惟一徳享天萬年永相鈞侯起居萬福某迺七月二十日以書徹于相公時則在武昌今八月一日以書達于相公時則在興國入蜀半期而無一字出蜀一旬而致二緘有嫌無嫌之異也某之作蜀視景偷生杜門避死之不給矧敢通宰執之訊以重危疑之嫌哉相公可以嘿喻矣今以父子迫切之情雖有嫌且不憚况無嫌乎伏念家君好古専經老猶不勌居家臨官介然自守其勤畏亷純異常雖當世獨行立節之士未易及也惟是屈于不遇之命少困場屋老沈下僚雖家君處之夷然而為子之職當無所不用其至今夷陵之掾垂滿異時之計不知所以裁之涉數千里而調官固非老者所宜待三五年而得禄又非貧者所能守私竊自念某省罷在法所優而一等差遣在朝廷所當予而難郤者也今同官王亢子蒼自幹辦而升治中省罷不一月而被命到官未十日而獲遷此雖非某孤寒懶退者所當援以為例而議者不能無羡亢而嗟某也伏覩朝廷均視親疎決無彼此願以所當得而移之于親此亦朝廷所樂為而易從足以厚風俗而非啓僥倖也具在别牘敢蘄鴻造某之自視良亦甚明固有欲抑之者矣安在其為抑之也梁武帝作浮山堰遏長淮以灌北道或曰四瀆天所以宣洩其氣不可塞也浮山一敗而淮南皆海矣故人之負英氣與物之抱俊具者皆不可抑也吕夷簡抑羣賢而慶厯之黨論興王安石抑羣賢而元祐紹聖之黨事熾蔡京抑羣賢而宣和靖康之黨禍極矣故不可抑而抑之抑者受名抑之者受謗甚則受禍豈不悲夫孫沔上封事詆吕夷簡以柔而易制者升為心腹以姦而可使者任為羽翼不進賢才但用不如已者自為之計仁宗遣中使持書即第示之夷簡讀而嘆曰善哉元規之言恨不早聞十年耳盖申公是時逼老將退雖知悔已無及矣惜莆田丞相之在位未嘗聞斯言也今雖去矣尚可告之庶有濟哉相公恢宏洪博善與人同天下所以繫望而知歸者以相公之大也文潞公欲引恬退之士謀于其客張子平潞公曰宜莫如韓維張瓌也子平曰王安石以静退著名其可遺乎潞公不答子平曰豈以瓌事相公加勤而安石無所加乎潞公瞿然乃并薦之願相公勿以事我之疏數為輕重則天下之賢無遺矣王文公數薦寇萊公真宗曰準屢言卿過而卿力薦之何也文正曰臣備位宰輔政事多闕他人相顧不言準獨能攻臣之短納忠陛下此乃臣所以重準也願陛下亟用之願相公勿以于我有毁譽而為去取則天下之賢歸心矣今某乃獨以齷齪而不能有所開拓取人主之輕受天下之責則相公可不闢至公之路開衆正之門上廣天子蒐攬賢豪之心下恢士大夫馳騖當世之氣哉某此生永已無路報恩惟望相公以道事君以徳澤民以公納士以正保身若乃勢位極乎鈞鼎勲業溢乎旂常此自所當有而未足道者也不敢摭以為獻云與李處全殿院書案此書當是乾道七年所作某比者浹月疊貢二書揆日徹聴久矣第一議之傳大哉言乎天之氣候世之風俗也五日一候至十五日一節來此隂陽所以分春夏秋冬所以序也今是非混淆而君子小人易位風俗不正故也欲正風俗當先從亷恥始嗟夫亷恥道喪未有甚於此時者也誕慢之風盛佞諛之俗昌而亷恥掃地狂生孺子敢竊借韓信諸葛亮以干時庸夫腐儒敢假託管仲范蠡以欺世執事者公受其欺莫能以理正之及其敗也又為之持調䕶之説下分解之令小人何憚而不為欺乎漢髙在廣武械繫言匈奴之不可擊者歸自彭城斷言匈奴之可擊者此令不行真登壇真顧廬之言永不可進真夷吾真計然之䇿永不得聞而㺯假三分影戲貪十萬貫貼子者出矣殿院明目張膽當變天下氣候使寒暑分明則白露不得為寒露小雪不得為大雪而况大冬之為大夏乎昔人有戲語兩轉極有味元祐謂元豐法不便即復嘉祐之法又慮其後患大率新書之法竝用時人謂之對鈎法或云豈惟法令年號亦對鈎矣今明知某事之非顯見某人之敗公議所攻不可得而已則調停和解可否並用賢否兩存豈所謂對鉤者乎近者發運之事似聞正衙露章甚切既朝廷講解乃已其事㣲損而其章卒不出韓魏公嘗云君子業履要須精㣲放過一事便為小人所窺前此天下未盡知殿院也數月以來深山窮谷無不以手加額何其速且廣也公議所在若有雷風播之鬼神傳之古今殿院取億兆之望于俄頃之間此物至靈常堅持力䕶猶懼其不留若造次放過開小人所窺之路某慮有倐然而逝也某與殿院陳義定交非苟然者平時無所可為或放懐冩意於詩酒之間今殿院立于國家命脈生民咽喉之上當以道相與以義相律非泛舟焦山憑欄需亭無與於世者之時也某抱影荒寒絶意休顯好不必已出殿院能不負所學以濟斯民在晉猶在楚也瞻望無期惆悵不已與趙丞相書案此書當是孝宗淳熙六年所作某伏以季春正時恭惟咸有一徳克享天心如伊尹之暨成湯佑我烈祖格于皇天如傳説之廸髙宗明靈降佑億兆知歸鈞候起居萬福某伏讀十一月八日制書咨禹之辭亮采惠疇之訓甚切命畢之辭正色率下之謨甚勤某所知者神州之境將復上道之日將行其闗諸度數協諸隂陽天之所為不可得而知也雖管窺蠡測竊知其土苴緒餘亦不能言也非獨管蠡不能言雖儀秦之辯深析萬宇之情亦不能言也雖莊列之機普觀六合之表亦不能言也雖佛祖之慧洞照萬劫之初亦不能言也徳山禪師有云窮諸𤣥辨若一毫致于太虛竭世樞機似一滴投於巨壑攷之吾儒所謂太倉之稊米大澤之礧空此某所以不敢重緘疊幅致讚詠揄揚之辭自知其繪畫之無益也然有一言敢述萬分自藝祖以來與國同姓而登庸舉其尤彰明較著者凡三人焉運屬建隆時則有忠獻趙公削平九牧混一萬殊有宋之業開創靈長者由此之故也運屬紹興時則有忠簡趙公案忠獻趙普諡忠簡趙鼎謚原本訛簡為愍今改正扶顛持危撥亂反正有宋之業復興再昌者由此之故也運屬淳熙時則有我公有忠獻公削平應變之略而守天下之大經有忠簡公元鎮持正之操而達天下之大權有斯人生斯世遇斯時宅斯地此孟子所謂興王名世者以其數則過矣以其時攷之則可矣其可謂非天乎其可謂非天乎竊獨未知相公經緯錯綜四海九州之度固已指掌於前孰為先孰為後孰為緩孰為急孰為第一議孰為第二議孰為推轂孰為合尖相公必有以處之矣而某未之或知也兹事姑止某有至危至迫至哀至窮之情敢冀相公試垂聴焉相公應期乘運實在己酉而老父生於庚寅某生于乙卯揆之常情事相公之日甚長事老父之日差短興念及此莫知身世之所存迫世垂年仕于遐邑欲挽而留之少安温凊之養而老父之宦情未衰欲勝而上之稍進優清之位而某之力不足將若之何將若之何昔丞相仙井虞公盖嘗造化老父以湖北之帥屬又嘗造化老父以江南之帥屬非獨以不肖子而埏埴老父也虞公篤孝于老太師某嘗為之畫贊有云五桂芬芬流香如水今茂其一尚餘其四三槐森森成隂滿庭其一屬子其二及孫大略云爾不獨興公之擊節又動公之傷神所以某之肺肝及于老父之間而公不忍拒也伏觀先太師克襄大事之時相公不鄙狀其行賜之俾製挽章為靈輀之先驅相公尚亦記之乎其詞盖云叩閽凛凛疏三通歸社蕭蕭酒一鍾龍卧南陽呼不醒鵬飛北海去無蹤無年及見安車召有子能荒大國封想見功名心未死亦隨江漢去朝宗其辭雖陋而已有騐矣可謂先見乎今老太師端居上清俯視塵寰未必慨然于功名之語也某輒敢憑此良縁仰於洪造相公其動念於老父耶其不動念於老父耶虞公之舊恩可援以為例耶不可援以為例耶皆惟相公之命錫類之仁聖賢之盛徳也方相公期運未至從容于紅蓮緑水之時彼此為之嬉笑者彌日今某可謂困矣嗚呼使之困者天也使之不困者相公也相公亦天也王仲淹云使如晦而得志於萬民其猶天乎天下皆戴相公之天而某戴之尤深天未嘗有私覆也某之情私也人之所欲天必從之天未嘗拒私情也顧其情如何盖有似私而實公者某之所陳老父之辭是也相公哀之相公憐之嗟夫仙凡之路異雲泥之分殊可以目覩而不可以迹親可以聲徹而不可以足至惟相公厚䕶棟梁永毗箕翼偉績塞乎鼎彛茂勲溢乎旂常某未畢餘生尚庶㡬見之無以報効相公者獨公之所不能形容某能發而為文著而成章徂徠慶厯之詩所謂維仲淹弼一䕫一契壯哉崇二老之煒煜也某則不然近取諸身則有賡歌之元首股肱逺取諸物則有乾之風虎雲龍參天兩地而倚數則有禹皋陶五百嵗之運幽贊于神明而生蓍則有傳説吕望夢卜之祥庶合于聖人之遺意而為不負於相公也徂徠復生儻以為然乎相公裁之與周樞密益公書案此書當是淳熙十二年所作某伏以季春之月在天為中和之候在世為清明之辰於易應泰於詩應頌於書應典而大賢皆乘之鈞侯起居萬福某戴天不知天之恩惟知其一曰予我以善根戴相公亦不知相公之恩惟知其一曰舉我以言語妙天下盖十有三年之前相府賔次驟見而驟語五字纔出一語纔已而雍公已降階相公已升堂矣古人以不見授意儒門有之荷篠丈人之類是也他門亦多有之以一字兩字授意儒門有之曾參之答唯孟懿子之得無違之類是也他門亦多有之立見一而揖三立語一而字五雖甚遽已亦足矣而某猶不知所謂則是土木也則是蛙蚓也嵗月朝推暮移而此五字不推不移形骸日遷月化而此五字不遷不化然某竊有不安者近時可謂於斯為盛矣言語俊而莊則有薛公叔雲此一妙也言語秀而麗則有李公粹伯此一妙也言語淡而雅則有吕公伯恭此一妙也言語嚴而健則有尹公少稷此一妙也言語約而肅則有劉公文潛此一妙也言語粹而明則有洪公景盧此一妙也大槩如此可略舉不可盡述也某何人斯言語之妙已不足以當之惟有數種各具一妙自惟妙天下者此也敢惟相公陳之某病僻平生不能曲隨簧鼔以脣吻為公論旁聯鉤鎖以黨援為良朋以為男子不能自立門庭而依人藩籬不能自守魂魄而附野草木每見古人特立獨行不為路人移轉腳根者明目張膽慕之故人以某為好異此一病甚大而自以為妙也某又有癡病平生嗜古過于嗜芻豢好書甚于好顔色纔遇得意忘飢忘渇而身世兼忘或經月或經年亦有經月經年不事此者故人以某為無常此一病甚大而自以為妙也某又有狂病平生耽江山悦林泉有意無傳則寄夫山水之鄉常繞湖百匝自卷雪至靈仙一夕而成百詠嘗榜江千里自興國至池陽順流而不知故人以某為抱恙此一病甚大而自以為妙也某又有懶病平時閉門郤掃佛來不著祖來推出雖未為息交絶游然賔朋亦稀輪鞅亦寡書疏不能為苛謹禮重必簡情真必切如是而已故人以某為輕物此一病甚大而自以為妙也又有拗病有蠢病不可勝言啖土炭為珍羞豈非受疾之竒哉今幻妙皆除惟相公所言真妙者始緒正而卒成之且如談詩自知音始世之知音者少而古聲不復傳于世隋唐之際河汾之區猶歌某詩和某詩而宣政之間鄉人竇氏尚間能以詩入律則其廢亦未甚云久既不可復攷姑且正音正訓正章正句正字正物正用正跡正事正人而為十正吴公才老得其一節而不得其大方要可以推其他矣少使訛舛稍歸于次第而後因情求意皆吾心腹肺腸之事此某欲妙而未能妙者也又如談易自知數始世之知數者少惟康節以此遺後人為入易之門而人多因辭生理惟其意之所欲不知聖人一字不虛發寓理于數寓數於理旁通曲貫數理竝行所謂吉凶悔咎皆有自而生故以邵意邵辭邵數邵理邵訣邵騐而為六邵稍見康節之緒餘而不為艱深盡屬平易非如張公文饒之有所泥而不𨗳當世以通津此某欲妙而未能妙者也兹事且置過此以徃時和嵗豐使米賤帛低上恩流及於下民得以銷日度年此燮理之妙有望於相公者也盜銷賊寜官不為貪吏不為酷金木稀文符簡而安静於田閭此康濟之妙有望於相公者也王子淵賢臣之妙陸士衡功臣之妙吕化光勲臣之妙至於韓退之元和一表妙之又妙石守道慶厯一范一富之頌妙之更妙必有任此者而某未之知也既老且衰卒有不勝洒掃之職不得謝一語之恩于數仞之下生有餘辜死有遺恨是以言此某惶恐惶恐死罪死罪雪山集卷八
