body:
  text: 雪山集原序紹興中阮遊成均與東平王君景文同𨽻時中齋聽其論古如讀酈道元水經名川支川貫穿周匝無有間斷間語世務計後成否又如孟子言歷千載日至無毫釐差咳唾隨風皆成珠璣使讀之者如嚼蜜雪齒頰有味其施之場屋如拾芥如破竹而為世所貴重者特其餘事耳未足以論景文也中書舍人張公孝祥使備制舉䇿略并論歷代君臣治亂蓋將舉焉會去國不果上庚辰春景文中進士第阮以服喪乃相契闊明年金人南侵御史中丞汪公徹宣諭荆襄又明年丞相張公浚都督江淮又明年丞相虞公允文宣撫川陜皆致景文于幕下樞密葉公義問薦試館職丞相湯公思退擢領學宫丞相梁公克家處以敕局丞相陳公俊卿更以編摩宥密府材譽赫然亦以是數致言者而景文退居其里矣守郡者亦其學校舊怨中以流言孝宗皇帝盛明即疑佳士不應有此而景文之冤不辨而自直阮之聞此也以書戲之曰名果纍人者哉景文答曰至人無名此某學道不至也時已病目後忽寄詩有我疾不佳之句而訃至蓋淳熙十六年正月十九日也其家勒以遺藁見屬乃為搜羅刪次釐為四十卷名曰雪山本其舊也惟廬陵歐陽公序蘇子美集有曰斯文金玉也棄擲埋沒糞土不能蝕必有收而寶之于後世者又謂子美擯斥摧挫之時文章已自行于天下雖其怨家仇人嘗出力擠之死地者至其文章則不能少毁而掩蔽之而后山先生贊劉道原亦謂當道原時識與不識相隨詆之如復仇施其逝未幾念慕歌詠恨其生之晚以為前私而後公又曰孰屈不伸有亡有存有一其得曷較後前噫景文得之矣孔子曰求仁而得仁又何怨慶元四年冬十月二十日敷淺原王阮南卿序
