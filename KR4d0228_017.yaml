body:
  text: 雪山集卷十四宋王質撰七言律詩西齋落成呈榮茂世主人乞我短牕明推挽清風墮兩楹千里坐安雙脚穏萬金難買一軒清掃除舊念無遺恨収拾新工上短檠幸有諸郎共料理緊催燈火赴功名幽居春跗秋蕚以時開爾自野生吾懶栽有飯故須間菘韭無羮安用著鹽梅雲蒼雲白變復變雨舊雨今来不来杉露松霜皆我酒竹根木癭盡吾杯秋夜讀書三首不須薄澣少纎塵時復閒行更脚輕樹有涼聲常摵摵燈無熱意但熒熒土鬆瘦菜從頭長地浄幽泓澈底清月化日遷人不覺見楞嚴豈惟月化兼又日遷郤于草木見先驚見蘇子瞻琴操秋風動而草木先驚縠紋絶似瀼西生見劉禹錫瀼西春水縠紋生王直方以為當作生熟之生乃徤霜沫全如潄玉清見蘇子瞻潄玉亭詩亂沫散霜雪古潭搖清空稍定心源渟夜氣即開耳界度秋聲旁觀事有千端異見王履道詩浮雲事有千端異返照身無一㸃輕一醉等閒千日過清江安用白鷗盟無嫌烏帽走黄塵塵外塵中總有人口但輕輕吹鳥毳杜子美詩見輕吹鳥毳腸休軋軋轉車輪見蘇子美聨句之子憤悶腸如車輪腹悶軋軋胷竒陳陳漫張明月清風眼試玩游絲落絮身半夜妙心花忽發十方一刹現渾銀見圓覺經心花發明照十方刹秀野亭觀雪不見湘娥十二鬟誰移白髪上青山雲開上界珠宫闕風墮游仙玉佩環洄曲城孤千騎入山隂興盡一簔還萬松嶺下寒溪口遙想梅花露半斑從陳阜卿遊翠巖馬輕人健有秋容飛到千巖萬壑中古殿含風寒佛骨峻屏揭水注龍宫行深野屨霑空翠睡醒僧簷轉晚紅彈指山川變光景横江旌吹擁元戎和張安國聞捷兩京喬木久秋風甘露棠棃非漢宫鐵鳳雕零周廟古玊魚流落漢陵空朝催戰鼔雲埋陣夜發戈船月照篷宣徳樓前清御道明年元㑹納羣工渡湖過大浩寺亂莎茁茁水皴皴紅葉黄花各自春隔竹歌呼知叟醉倚松疎嬾見僧真有時柏子捎衣落無數松枝刺眼頻山頂斜陽纔慘淡草顛多露已横陳和李平仲出郊渡頭脆栁不堪攀嶺背彫楓尚見斑店小青旗低拂馬寺荒蒼蘚暗封關但知魚樂如吾樂未必僧閒似我閒忽憶去年今日處楚山欲盡見秦山張元亮見訪留和坐客杯盤倉卒但隨家所頼龍山得孟嘉畧以詩聲知律吕敢于學海望津涯精神霜後千頭橘風味新時一顆𤓰髪白未應餘子識汗青當有後人誇晚泊東流案方回瀛奎律髓載此詩以東流道中為題山髙樹多日出遲食時霧露且雰霏馬蹄已踏兩郵舍人家漸開雙竹扉冬青匝路野蜂亂蕎麥滿園山鵲飛明朝大江送吾去萬里天風吹客衣江西道中落日平西樹起煙亂山缺處水連天城樓突兀棲雲表樹影叅差落眼前倒引歸心纒客病欲隨飛鳥渡平川不辭繭足投微徑慰藉征行有晚蟬林溪中阻風扁舟西去苦匆匆底事天回柂尾風倉卒未應旗轉脚慇懃聊借浦棲鴻半山烟雨駸駸暗兩岸霜林故故紅得意輕帆休笑我去来等是一孤篷代虞樞宻宴晁制置口號二首合奏元和鼓吹聲旌幢交映兩轅門中臺上相官儀重大國諸侯禮數尊一㑹星辰朝北極八方風雨聚西坤今朝賓主周旋地千古英豪氣象昏陳雷膠漆自平生申甫藩宣共此行夷則黄鍾相律吕南箕北斗對髙明蛟螭鱗甲搖千纛虎豹牙須立萬兵千載難逢今日㑹一盃且為故人傾和虞相喜雪二首縞夜寒輝花雨天灑空飛羽箭離弮普開薝蔔諸天供大展兜羅萬里綿見在十方惟此佛後来千古説今年乾坤正賴君調理未用輕尋范蠡船六花飛墮九重天凍折旌竿裂弩弮不夜嘗衘九龍燭未春先貢八蠶綿暫開晴色供前日二公十九日出郊頓晴復作竒祥餞故年二十九日又雪留得餘生食賤麥楊林江上海樓船辛巳公有楊林采石再走之功留别虞丞相二首太倉宇宙久陳陳合與英豪共作新修造鳳樓須有手住持烏寺可無人千官禮絶三司貴一士心歸萬國春藉與八風吹六翮飛騰意度不無神禹跡茫茫海㑹同有誰管領自西東側身江漢歸無所開眼乾坤見有公隠几三思籌去住歴階再拜叩窮通朝家有意尋幽側人在風烟慘淡中題山亭馬喜名山去不停半鞭馳度兩峯青飛来山鳥能言語老去江梅尚典型溪女半扉撩倦客野僧三肅上孤亭百灘流水蒼烟上倚盡斜陽且更聴題蘄倅烟霏亭落木寒聲晚更悲斜陽隠隠霧霏霏並塘官路青莎合帶郭人家緑樹圍莫遣風霜驚雁字從教烟雨潤鳧衣接䍦吹動肩樓聳却下脩篁徑裏歸題張君量恩波寺恩波全似海波深聊傍支流築小亭下映南山千丈影上通雲漢一河星濠梁此日堪同樂文沼何時共効靈人意亦隨魚意好一觥相對萬荷青寄題挹翠樓詩胸中磊磈但江山翠積靈臺挹不乾拂子折時無㸃滴杖頭轉處湧波瀾収回晚照千巖静放出靈光萬壑寒我欲登樓聊舉眼乾坤雖大不能寛張安國為朱黄二豪作傳索賦詩二豪名字遍人間未許癡兒見一斑俯仰半生雙鬢秃是非千古寸心關向來蹤跡埋空谷老去文章滿道山我有詩書三十乗肯來相伴小牕閒余過荆州張安國已請祠先行心事何曾吐一分鼓嚴早已報三聲元戎十乗公先啟野渡孤舟我自横細看好山須少駐緩摇柔櫓莫多鳴倘能黄鶴樓前見安得春江尾柁行趙景山程徳紹視旱有詩成編相隨騎尾紫游韁各佩牛腰古錦囊過眼風烟都領略聚頭燈火更平章鵲枝賦罷驕横槊蚓鼎聨成倦倚牆三讀軒渠仍伎癢亦撩草夢到池塘送陶茂安知永州弓刀陌上起征塵行到瀟湘春已深桞子文章親到眼魏公池館故沾襟莫生去魯遲遲想且慰歌亷望望心瀧水浯溪江不隔肯憑鯉尾寄佳音觀政堂成上黄少譽二首胸中道徳五千文聊借髙堂發妙音背倚飛樓懐古意面臨止水正人心新荷此際敷青葉穉栁他年貯緑隂但使厨烟無太逺時来分座伴孤斟潁州丞相舊能名傳到雲孫尚典型月在澄潭心共白山圍宴坐眼同青暫離方丈羣仙侣獨抱黄庭一卷經十頃玻璃能幾許看公擊水渡南溟題邕希孟静室緑玉珊珊宻映門雙扉不受一絲塵經函藥鼎元無用茗椀熏爐總是真坐閱百年俱幻境肯懸一榻貯閒身麈毛揮罷無人語静看氷壺一㸃春送鈕子明大夫離别莫心酸痛飲長歌作壮顔勿羨春江燒赤壁須從夜磧度隂山精神勃鬱雙眉上功業輪囷十指間看罷吳鉤騰上馬臨分小試出三關老人嘗饌北食兒女輩不能過蕪湖多魚且美僕生長澤國不可一日無此不得揚州蟹蛤嘗江鄉魚味亦相當自從南渡為生理慚見東人説故鄉出火麥團猶雪白帶漿米飯更鵞黄老人日日惟須此長笑兒郎太楚傖借韻含山寺一僧龎眉拄杖扶自汲石泉澆茗盂山深松樹鬚髯古寺老木魚鱗甲枯心閒逢人謝禮樂身倦到枕即江湖夢回石壁半斜照蝙蝠打人山鳥呼送王仲鈐口號華屋沈沈燕不譁緑隂悄悄樹含花旌旗照野元戎壮禮樂充庭使者華解袂莫辭雙玉酒同班行待五雲車金虬度徹陽關曲佳月隨人未肯斜送胡正仲二首萬安松檟已叅天屬眼昆仍故宛然榮尹堂前周兩紀甘王樓下跨三年八風翻海如如定一月當空在在圓太極清都天尺五柂牙捩轉去翩翩稍稍秋風吹客衣浮雲斜照送將歸搖開楚岸蟬方急行到吳江雁已飛直恐相思衣帶緩無令問訊驛書稀一牛鳴地難傾倒何况山川道路違和陳阜卿雨花臺下晚江秋曾對斜陽倒玉舟自㫁我當歸弔屈不應君亦未封留異時兵裏同悲喜今日樽前再勸酬悵望佳人雲暮合空遺别恨與湯休送酒與胡倅青堅堂下出香泉厯厯春聲到耳邊卷起白波滋舌本養成黄氣舞胎仙帝觴他日分涓滴家釀今朝養聖賢飲罷鈴絛應已製汝陽乘此去朝天送劉子開二首帝恩無吏肯承宣雨露滂沱貯半天璀璨兩星同拱所蕭梢一驥獨當先驅馳足下千重繭忠孝心頭一寸田孺子亭前見三雋為言秋事亦茫然塵中拈出玉光明追琢多年老更精㑹使低頭降志士無令抵掌笑書生此行原野霜風急所過溪湖潦水平鴻雁同天不同侣為傳好在與南卿送王充老歸盱江風遣輕蒲趣去程滿江秋月碧紛紛相看㫁雁情何極同著征衫袂更分千里固應俱對月一樽安得再論文從今竹枕蓬牕夢不夢懸刀只夢君送李公海内堂堂見此公孤髙不與萬夫同身行宇宙東西遍心徹乾坤表裏通莫共林泉謀老境更看彛鼎篆新功君王拊髀休長嘆亦有英豪在眼中送趙子真送藏經于朝廷憶昔同遊金鳳臺臨髙望逺思悠哉重来又作燕山别不意翻為驛馬催寳藏元輝天上去塞塵秋色鬢邊来歸期已定終年約莫遣丹心一寸灰别張君玉二首烟霜江漢雁南飛鸚鵡洲前再拜辭風勁周郎焚艦日月明庾老上樓時無言只共江聲語有意惟憑山色知他日中原公事了磨崖千丈要豐碑白雲黄鶴㑹相逢湖北江南故楚宫拭目文章王八座叩頭勲業趙三公今朝側耳聴竒偉何日投身佐事功公到京師相記憶蘆花江上竹竿風謝王巽澤新火月落參横剥啄聲起驚新火到陳人鬢隨周爟年年改心共商盤日日新桐甑飯香增意氣草堂燈影換精神侯家宫蠟晴烟起公自他時作好春老杜云朝来新火起晴烟是改火以晨韓翃云日暮漢宫傳蠟燭是改火以晚盖改火當以節侯今寅初得清明則以曉頒適其宜也足見處事雖細微必周盡故首及之謝范西叔惠詩世間無可似君詩兔杵聲寒露脚飛頷下驪珠能奪取袖中滄海更攜歸久荒此事成疎懶賴有斯人為發揮佳處不隨車馬得但扶古堞看斜暉贈徐輝五曜循環十二宫乾坤盡落往来中竹羅書在人安在姑射山空道不空疇昔未能知本末從今不復問窮通東樓恣享湖山樂三尺䦨千萬里風贈湯元亨湯子親攜寳鑑囊路開春草見王郎只今萍梗栖湓浦疇昔松楸在建康數轉話端纔歴歴一生身世不茫茫從今㸃破心間事獨對東風笑一場贈鄧東青藜半夜放光明玉字金文下太清舉眼試看君行略㸃頭㑹盡我平生運行勝景丁居丑嵗建昌期乙遇庚四十五年如夢過尚堪晚景見昇平贈劉遂良二年不下竹匡牀枕損茅齋小米囊吹起江風渡劉子踏開荒草見王郎胡灣此際談三命淝水何時戰一場他日中原公事了與君同話此荒涼和李粹伯不多風雨已秋容慘澹斜陽濕晚紅長憶蘋風過歸雁更思烟浪拍垂虹未應堂上燭能滅所願樽中酒不空卷雪樓前卸帆日却從天際望吳中又和李粹伯雲似諸公簿領閒不名阿堵但江山秋風未白平生髪尊酒聊赬壮士顔醉後參虛無咫尺悲来天地總間關歸眠夢繞瀟湘野紅葉黄花滿望斑問王稚川覓酒麥天一似菊花秋澀雨癡風故作愁幸自從来公不飲何如乞與我銷憂膠膠擾擾誰能問兀兀陶陶得即休七澤五湖烟水闊可容閒夢到滄洲次通守韻題和政堂攙天髙栁意堂堂栁外山長水亦長百尺氷壺清徹底一川雲錦爛生光暫看屬玉搖波影速駕麒麟入帝鄉宣曲宜春驂輦路上林風味薄沙棠上休賦沙棠櫟櫧吕氏春秋果之美者沙棠之實和郭子應二首子應以詩見遺有將分之語愴甚因用前韻少叙此懐出門吹面已薰風春在垂楊慘淡中我輩不須悲聚散此江元自有西東日暄波煖魚苗出雨潤泥融燕頷豐尚可淹留成一醉引盃説劍未輸公北牕睡起復西牕心事悠悠付枕囊日静無人驚燕雀野青隨意卧牛羊愁中故自傷遊子别後還應憶漫郎萬里梅邊尋斗米夫君身世亦遑遑和張君玉且把鋤頭且著書懶隨臣朔怖侏儒車腸久自思懐橘蓬首還應念執殳未暇洞天尋小有盡將世界付南無不知南北東西後肯寄書来問老夫和張君玉與史喬年弩矢先驅導繡衣芙蓉倒影動旌旗行歸容與螭頭陛且去摩挲峴首碑吳帝城邊逢此日越王樓上憶他時相煩問訊隆中陌尚有當年草木知和張君玉使星卿月共光輝行轉杓衡入紫微白粲萬檣軍總飽紅稠千榦馬能飛後身叔子今安得萬代夷吾古亦希風動一江吹晚雪嵗云暮矣送將歸和沈述之贈權幹詩江楓不敵寸心丹何待霜雄吏自寒滿眼空空無一佛舉頭在在有三官毛端解運三千界脚底常飛九萬摶鳬茈餘根挑欲盡莫憂魯巷有顔簞上臺幕府鄭重来修荒政吳人沈述之有詩魯人王某賡之昨共話㸃雪寮舉隠峯推車語只此一則便了平生故詩中畧露此消息共律身鈐吏念物孳孳遇事井井皆此中推出者推之又推天地雖寛奚足充塞耶用沈述之韻賦靈槎甘王樓下挽清暉不到三湘識九疑骨健任從波浪嚙眼空冷看市朝移常懐一簣香爐日不見三峰雪嶺時安得杜蘇添此沈相從地上作三竒子美假山詩云一簣功盈尺又香爐曉努分子瞻木山詩序先君子得木山三峯詩云蓬婆雪嶺巧雕鎪林開命訣云地上三竒甲戊庚故云次韻姚貴聰小簾低捲一庵春茗椀薰爐作意新今日共懽何事酒他年定託不孤鄰愁腸繚繞終難展醉字横斜半失真遙望江流横日脚極思沙嘴問歸津次通守韻題廓齋遙傳碧落入新除早向清都卜定居金勒鳴珂班退後玉堂揮翰酒醒餘試聴掣動鈴絛響驚看飛来錦帕舒甘露堂前正秋色集賢如堵望相如銀山寺和宗禪師四季詩春但聴清圓不覺喧松牀紙帳坦便便草深雉子争烘日樹煖蜂鶵懶趂烟無事石頭頻打睡有時村店蹔逃禪尋花問栁山前後隠隠鐘聲暮已傳夏繞廊行聴鐸丁當禾稻桑麻各一鄉竹影能令心灑落溪聲自與意清涼門無驚鹿衝籬破路有疎螢掠草光纔到斜陽生暮靄滿庭山露滴松香秋塵埃飛不到郊坰山鹿溪魚任意行宻逕竹烟迷莫影幽巖松露滴秋聲燒殘野草斕斑黒脱盡疎林隠約明溪石稜稜波激激水花紅紫謝還生冬夹徑長松耐凛冬隨溪覓路杳無窮曉霜易滑荆橋上朔雪難侵紙帳中溪冷無魚供酒客林荒有鹿伴樵翁江湖水濼多蘆葦不異飄鴻泊野風答楊教見和飯鼓逢逢睡起時先生弟子總關扉不妨堂下輕騎馬切莫江頭浪典衣且對燈花隨雨落任從苜蓿列盤稀杜陵鄭老襟期在今昨那能定是非挽趙處士叩閽凛凛疏三通歸社蕭蕭酒一鍾龍卧髙陽呼不醒鵬飛北海去無蹤無年及見安車召有子能荒大國封想見功名心未死亦隨江漢去朝宗弔法空鶴不勝癯汝更癯平沙獨立未為孤雨花臺上方知有明月堂中竟省無此夜吟風憑北固何時乘月叩西湖出頭已解挑包走試路西江問老夫空在建康雨花臺方尋詩忽有省始棄去從妙喜參禅妙喜甚恨其障深也見空来即曰拽出死屍著蓋以屍為詩提撕剖擊力矣空竟坐詩為魔參請少倦即尋溪陟山不覺又發諸吟哦妙喜屢歎其形太脆數不長此事恐難成未幾瘦死今二十年矣埋丹徒南陂有母尚存其乞貲曹勣云一夢江湖已十春芒鞋不踐馬頭塵只知今日了今日豈料一身愁一身南阮固應慙北阮越人那得累秦人西風不但吹游子吹老天涯白髪親效唐人體非空本法也雪山集卷十四
