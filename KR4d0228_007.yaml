body:
  text: 雪山集巻四宋王質撰表謝賜御書經解表漢儒集記表裏六經羲畫為章範模多士降自雲霄之表光生儒苑之間凡委質之諸生舉銘恩于方寸中謝竊以炎圗二百餘載名家獨生于戴生記禮四十八篇得趣惟深于經解綴葺雖嬴秦之後源流蓋孔聖之遺纂精義于千言闡大猷于六籍其為人也喜入國而可知不在兹乎幸斯文之未喪遇大聖而知其解等百世而莫之違爛奎璧于寳跗震龍鸞于樂石豈結露霏煙之比將赤文緑字之侔是何螢雪之儒方竄衣冠之版至為疎賤亦預光華此蓋伏遇皇帝陛下徳溥有容恩深無極育士類以阿陵之大器人才于榱桷之㣲憐臣等辛苦之累年既見君而心則喜念臣等遭逢于一日盡棄舊而新是圗爰頒雲漢之章用改草茅之觀在泥塗久矣甘為蹭蹬之流見聖王師之更被昭回之飾臣等敢不肅容歛袵維義誦言立則見參于前洋乎如在其上天高明而地博厚孰報鴻慈詩温厚而書疏通誓遵往訓代張江州謝到任表案張江州名孝祥此表當是髙宗紹興三十年所作賦政外臺弗稱將明之㫖承流支郡遽膺師帥之權仰大君觀過之仁開小臣自新之路拜命跼蹐感恩涕洟中謝伏念臣學無本根材有劑量精神困頓于百憂之後齒髮彫零于多病之餘生也有涯寖迫駸駸之老景身其餘幾但存耿耿之壯懷雖一行之尚堪恐萬分之無補腰佩魚符之寵心慚鼠技之窮方九重念彫瘵之民有如赤子罄四海盡循良之吏安用菲材此蓋伏遇皇帝陛下天覆絃埏海涵動植憐臣賦命之淺薄數蹈于網羅察臣起家之艱難粗諳于稼穡爰假列城之守俾行平日之知臣敢不謹守教條明宣徳意必先四者願推施仁發政之心比及三年儻獲有勇知方之效天申節賀表案此表當是孝宗隆興元年所作嵗運臨丁月元建午咸得離宫之正永為炎徳之祥恭惟太上皇帝陛下陶鑄帝皇權輿宇宙解乾綱而授聖襲氣母以存真雖令萬嵗之三呼適動九霄之一笑臣置身西服稽首南山阻陪百執之聯同上億斯之夀崆峒大道非下土之可聞姑射餘休尚含生之受賜㑹慶節賀表時夏陳常載育后稷大商燮伐篤生武王惟上天祐海内之民故元聖逰人間之世恭惟皇帝陛下叶膺符籙宗主生靈自聰明睿智之有臨覺氣燄威靈之頓著方千里者九行提全覆之封呼萬嵗者三茂對無疆之祉臣馳心北極稽首南山十聖相望逺紹長春之盛兩宫難老永延徳夀之期代張魏公謝表案此表當是孝宗隆興二年張浚復都督江淮軍馬時所作授任無方功垂成而忽敗至仁不殺罪當死以更生既苟逭于大刑仍弗移于故任彊顔拜命流涕銜恩中謝伏念臣遭時艱虞受國光寵自惜四朝之舊物嘗居百辟之上游意廣才疎乃自天而夙賦主憂臣辱實無地以能容自叨授鉞之權毎切繫纓之志痛國威之不振致邊警之多虞誓以三軍決于兩陣轉石之勢方疾投于千仞之顛破竹之威旋見格于數節之後當知難而遂退乃貪進以不休衆散而歸民逃其上莫解陸沉之憤益深旰食之憂嚮郊次以哭師至下行秦伯之事載廚車而徇市將奚逃漢法之誅敢期肉骨之恩尚詭焚舟之舉雖回谿失律他日冀黽池之功然城濮喪軍何顔見申息之老此蓋伏遇皇帝陛下順帝之則與神為謀憐臣耿耿之孤忠惟知徇國諒臣區區之小信尚足使人遏横議于風波脱㣲軀于鼎鑊盡蠲宿負俾勵後圗臣敢不蒐攬智能申明紀律焚龍庭而犁沙漠終必望燕然之銘馘王雙而遁郭淮行且報街亭之辱代慰安恭皇后祔廟表案此表當是孝宗乾道三年六月所作升馭于天莫瞻柔範妥靈于廟永閟徽音共銜厚載之恩益結無窮之痛恭惟皇帝陛下道隆正始徳茂齊家忽彫婺宿之輝遽失坤輿之助雖瑶池之燕方適難回王母之游然闗雎之應已成無損周南之化願寛哀抱俯慰羣情代虞丞相冬雷待罪表案此表當是孝宗乾道三年十一月所作閉藏之月雷乃發聲輔佐之司義難逃責伏念臣推移至此經濟蔑然在二三臣之間才最居于下乘越數千里之外位猶玷于元樞難使處中之臣獨當弗若之咎伏望皇帝陛下上承天意下酌民言責其無補于朝廷正以有常之刑典葢坎離易位是豈為標末之災雖天地至仁不敢望函容之造代虞樞密謝賜臘藥表焕發寳奩寵頒芳劑感便蕃之恩渥覺疲苶之身輕伏念臣粤自違離增多衰病䝉被慈皇之鄭重記存窮塞之荒寒内分龍藏之珍外傅螭文之寳爛榮光之璀璨盡私室以驚奔此蓋伏遇皇帝陛下天幬穹窿露濡汪濊俯憐老至雖曲意于扶衰自恨力愆終懷慙于報效代賀皇帝加上太上尊號表案此表當是孝宗乾道六年十一月所作降鸞輅于瑤庭啓龍泥于玉䇿慈顔端受嘉氣横流伏以上帝之統昊天膺御歴含真之號皇祇之鎮后土受承天效法之名光堯道契于粹精明慈徳參于博厚豈容稱謂弗配乾坤恭惟皇帝陛下親受聖傳密符帝則雖據域中之大益敦膝下之嚴涓選休明鋪張閎偉大安虗稱者八載曾莫貢于單辭興慶露請者再章終不逾于四字緬稽缺典稍曠榮觀而況貞觀弗逮于夀安至徳亦違于元獻未聞雙冊疊奉兩宫創行交舉之儀集在重熈之旦臣受二儀之生育託兩曜之光輝自阻宣承莫預嵩呼之列惟知明察永增川至之休代賀太上皇后加尊號表金繩貫冊覆以慶雲玉殿騰章麗乎華日夀先福五慈冠寳三疊顯號以再昇沸歡聲而四溢伏以元天標美祥符崇聖祖母之尊效法增徽政和闡皇地祇之盛仰瞻霄極妙契靈真儻非殫賁飾之文曷可稱坤元之至恭惟太上皇后殿下化光育物徳厚承天震一索而得長男付之大寳晉二爻而福王母燕我鴻釐御瑶池九色之龍秉玉女六丁之籙陪真人于雲表玩浩劫于塵中闗雎詠周南之風而不指其名思齊顯太任之性而弗彰其號極全功于今覩掩曠典于前聞臣雖觀善者之機莫測淵兮之似惟深鼓舞盡謝形容仰至徳乎上皇對揚休于吉日頌徽音乎慈母同衍夀于靈芝論漢髙帝論漢髙帝不事威儀溺冠踞洗怒罵叱咤不見優柔和易之意則似簡率立談之間刻印銷印逡巡反覆有若兒戲則似坦夷天下之人見其外而不察其中則以為大度之君皆莫若髙帝而不知髙帝之度實有所不足惟其巧于彌縫覆葢故天下之人以為簡率而不以為深以為坦夷而不以為隘然難以欺智者矣夫天下之英雄挟過人之智而負過人之勇惟大度之主為能與終始何者天下之英雄可以誠服之不可以疑待之待之以疑非彼負我則我負彼與其交至于相負也孰若兩無負之為愈嗟夫君臣而至于交相負者未有不自疑生者也漢景帝疑吳王濞而吳王濞反齊顯祖疑侯景而侯景反唐廢帝疑石敬塘而石敬塘反彼其一旦而乖君臣之分相與爭死生成敗于干戈鋒鏑之間雖甚暴戾凶嚚之人豈其心樂為也夫惟有所不得不為而後至于為故嘗謂韓信非負漢者也謂韓信非負漢者當日挈手繞庭之計胡為而發哉要之其初非負漢者也方其去楚而歸漢解衣推食之恩韓信未嘗一日忘也安知其終至此哉嗟乎使韓信至于負漢則髙帝疑之之過也髙帝疑信之端蓋兆于益兵之時韓信願益兵三萬請以北舉燕趙東擊齊南絶楚之糧道西與髙帝㑹于滎陽此固髙帝之所惕然而驚也雖不拒其益兵之請而其遣張耳以佐之佐之者所以閑之也其後為之罵使于滎陽奪兵于廣武當是之時幸韓信未覺而已使韓信而覺則髙帝何以處之韓信之覺則覺于雲夢之時也髙帝平日惴惴戰戰未嘗忘韓信也然猶未露其所以疑之之形至是而有不可掩者矣韓信之必反童兒舉知之而髙帝之東征也留稚妻弱子于新造未集之國與一必反之韓信共守之毎讀史至此未嘗不為髙帝寒心也嗚呼髙帝掃強秦斃項羽蓋無遺䇿而其馭韓信也數陷天下之危機而髙帝不悟也夫髙帝之為人外示大度而中實多忌豐沛故舊誰與蕭何之至昵哉方蕭何之居闗中而髙帝未離京索也勞苦之音不絶于道所以察蕭何之向背也以為虗言可以欺之而鮑生覺之其征陳豨也増爵益封而又置衛焉衛之者防之也以為虗文可以欺之而召平覺之推疑于人顧豈有弗覺者特遲速之間爾噫蕭何忠信謹樸之士也夫是以能不負于髙帝不然其將為韓信之流乎漢文帝論天下之患莫大于當然而不然不當然而然當然而不然則能者隳不當然而然則不能者喜夫是二者雖聖人不能以為天下且聖人之于天下也則亦近于人情而已矣夫當然則處之以當然而不然則處之以不然也此情所不可易者也而聖人烏能易之且非獨聖人為然也昔者齊威王召即墨大夫語之曰自子之居即墨也毁言日至吾使人視即墨田野闢人民給官無留事東方以寧是子不事吾左右以求助也封之萬家召阿大夫語之曰自子守阿譽言日至吾使人視阿田野不闢人民貧餒昔日趙攻鄄子不救衛取薛陵子不知是子厚幣事左右以求譽也是日烹阿大夫彼威王以為吾之設官所以治吾事也使人皆事事又何求惟其有不事事者得以容身養私于其間是以吾事時有不舉一事廢積而推之吾國幾何而不亂且亡也然而善治天下國家者不能使人皆事事而能使事事者有所勸不能使人皆不事事而能使不事事者有所懲夫欲使事事者有所勸則莫若當然而處之以當然欲使不事事者有所懲則莫若不然而處之以不然是二者苟别白而分明而天下國家之不治者未之有也嗟乎孰謂漢文帝之識而不若齊威王也文帝嘗問右丞相周勃曰天下一嵗決獄幾何勃謝不知也以問左丞相陳平曰各有主者即問決獄責廷尉問錢榖責治粟内史是二者其為不知一也勃訥于辯平㨗于言其為不知一也舉天下之事而付之宰相而宰相舉不事事如此文帝拱手而聴焉且又以陳平為能也其何以率天下之怠者耶禽獸之纖悉上林令之當知也上林令不知而虎圈嗇夫知之二人能否見矣嗇夫無所賞而令無所責則是知與不知固為一律而已此二事者皆可以馴致天下之亂而文帝特幸免耳漢之大亂四夷猖獗而諸侯驕恣其釁皆成于文帝之時而世以為文帝善用長者不知石奮衛綰之流果何補于漢蓋嘗讀西漢百官年表以為文帝公卿大夫類多齷齪庸樸之徒而其通明精悍之士則皆暴露于宣帝之際宣帝之所以鼓舞天下者何也賞有所不可辭而罰有所不可避名有所不可覈而實有所不可隠儒者之論則以宣帝為雜于霸文帝為純于王而不知賞罰名實此四者王道之大權也梁末帝論論曰梁晉之交讎乆矣方朱全忠之盛也雖李克用之雄勇善戰蓋嘗屢蹙而不振克用之末年全忠乘百鬭百勝之威略汾潞卷慈隰不旋踵而至太原晉于是時盖駸駸有亡徴矣克用既死而莊宗興收殫殘之餘而震厲提挈之削弱之氣化為精強梁于是時其勢反又稍稍下晉而其後卒以喪亡蓋其成敗強弱相反如此世之説者曰以克用而遇全忠之强故克用不支以莊宗而乘末帝之弱故莊宗得志由此之故也亦嘗詳觀其勢而至于成敗強弱相反之變則以為梁晉之所以為成敗強弱者不在梁晉而在河北自梁而言則汴為腹心而河北為手足自晉而言則太原為腹心而河北為手足是二國者立國之同不同而手足均係于河北則其利害豈不甚重矣哉全忠挾天子而暴諸侯舉天下之諸鎮蓋無有不被殃者而獨區區自結于魏全忠豈畏一羅紹威哉畏克用也彼全忠之謀度天下之可以害己者莫如晉度天下之可以限晉者莫如魏晉之攻我也必不越魏而渡河我之攻晋也所隔者魏也魏不我梗而土門飛狐可以平步而入矣故曰全忠之所以厚魏者為晉也末帝患魏博之驕析而分之以殺其強而梁人遂以失魏當是之時梁之限晉者一水之隔耳于是乎梁之失計未有若是其謬者也魏博天下之精兵處也不得重臣無以制魏博不能制魏博無以禦晉此其勢雖童兒知之方克用之相抗其初未有以相制也既得魏則梁遂以張晉遂以㣲獨幸晉之君臣上下一心戮力相守然而不亡者幸也莊宗徘徊境上竭力而不能有梁尺寸之地既得魏而拓地遂至于洛陽楊劉徳勝之軍與汴相望也當是之時汴之國都固已在其股掌中矣雖欲不亡得乎夫汴之為國無髙山大川扼險控帶之勢平原廣陸汗漫千里所謂四通五逹之地有河北則汴重無河北則汴輕是故梁之興也得魏而興其亡也裂魏而亡晉之弱也魏在梁而其強也魏在晉嗟夫此所以為梁晉之成敗也周世宗論石晉元年髙祖始割全燕以賂契丹而十八州之民遂為其所有全燕號為天下之形勢而民物富庶土田衍沃水草豐美皆足以為天下之冠契丹資之益以盛強開運之末契丹擁全燕之勢而窺中原震蕩飄忽如風雨之至而中原坐以覆沒漢髙祖周太祖雖創業之君而彷徨倥傯自衞之不暇而何敢覬覦于其間世宗不血刃而取三闗此豈可以不喜而中遂班師毁已成之功而十四州之地垂得而復失此又豈可以不惜也葢嘗深維其故則以為世宗用智深而為謀審未嘗不歎息世宗之善用兵知所以勝知所以敗何者用兵之患莫大于腹背之受敵昔者夫差謀中原而越入吳劉備抗袁術而吕布入下邳腹背受敵智者不能為之謀矣惟曹操不顧袁術之襲許而征劉備劉裕不顧盧循之犯建業而伐闗中雖僅保不敗而國勢岌岌幾至于不可復返今夫契丹之于太原與國也而太原之于周仇讎也蓋自太祖襲劉氏之孤而奪其國以殘其宗此固太原切骨銘心而不忘者也髙平之戰雖足以挫太原之鋒而忻口之敗反所以張契丹之勢當是之時契丹之形益強而太原之怨益深有益強之形而扼之于前有益深之怨而邀之于後世宗安得安枕而卧也以史攷之四月壬辰取乾寧軍辛丑取益津闗則相距十日也癸卯取瓦橋闗則相距三日也五月乙巳取瀛州則又相距三日也不兩旬而克三闗馳騁暴露于盛夏苦熱之地周之師亦少憊矣而契丹養其鋒以待之于前太原蓄其鋭以伺之于後如是而能不敗者太公穰苴之所難也嗟夫天下之事固自有先後緩急之序為世宗之䇿莫若先有事于太原遣一將提五萬師當忻口之衝而斷契丹之援諸將數萬人略汾潞下慈隰而蹙河東之勢而後徐以重兵擣太原既得太原而幽薊之地可以次第而經略矣豈以世宗而不察此也以萬乘之重而頓于二國之間契丹不拒太原不救以待我之敝而乘之使世宗狃勝而不知返嗚呼可憂也哉雪山集卷四
