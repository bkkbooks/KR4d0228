body:
  text: 雪山集卷三宋王質撰奏議論固本疏一日重淮夫所謂重淮者何臣嘗論之曰有三鎮然後能守河有兩淮然後能守江江之恃兩淮如河之恃三鎮皆所以藩籬其外而扄鐍于內自渡江以來強鄰悍敵相與隔藩牆而分爾汝蓋無嵗而不有疆場之警然建康未嘗聆西北金革之聲而長江未嘗染西北戎馬之氣雖苻堅傾天下之鋒而盡鋭于一擲卒阻于淝水而止宋文帝與佛貍相抗彼佛貍之師非脆敵矣衝蕩飄忽一旦而臨瓜步遂與建康相望然逡巡退避若不可以終日故臣以為晉之所以能保江左者以兩淮有以當其前佛貍之所以不能越瓜步者以兩淮有以邀其後國家渡江之初跡未著而心未安是故有兩淮而不能守和親之後誓已定而約已明是故有兩淮而不敢守然不能蔽淮終不可蔽江今沿江之屯有四一軍駐鄂州一軍駐池州一軍駐建康一軍駐鎮江平居無事形聯氣接可以當衝要而塞孔道一旦有急上下數千里聚之則不遍散之則不多故臣以為蔽江莫先于蔽淮非以為淮之果可以蔽江也綴之于前而待之于後則守之也固而應之也閒蓋軍旅之中一夫被重鎧一夫被單鎧被重鎧者一鎧洞則一鎧存而被單鎧者一鎧洞則肌膚切矣然而今日之計有蔽江之實而無蔽江之名有蔽江之實則我得利無蔽江之名則彼不驚此不可以不熟講也今兩浙州郡之卒亡者不捕而在者無幾是故有其籍而無其名所以供官吏衛府庫遞郵傳者舉不能備數如是則莫若以給役之名而增州郡之卒小州五百人大州倍之今之兩淮地曠人稀而郡縣孤弱是以有冒禁通茶之商出沒乎其間發源于江西而波流于江北蓋嘗震動郡縣力不能制如是則莫如以禦盜之名而增巡檢之土兵尉司之弓手小寨土兵二百人大寨倍之小縣之弓手百人大縣倍之一路有幾州一州有幾縣一縣有幾寨誠能皆勇鋭悍敏之夫屬之以戈矛弓矢之法而示之以坐作進退之節誘之以賞懲之以罰不出五年則精兵可以所在而有此可謂我得其利而彼不驚者也陛下若以臣之言為然則密諭兩淮之計臣可以損其餽軍之數而留之以為養土兵之資則兩淮不為無用而緩急可以綴敵長江不為無助而倉卒得以為備蓋天下之事不可使庸夫處之庸夫處之則坐安而待釁不可使褊夫處之褊夫處之則張皇而生變惟夫緩不為庸急不為褊然後能收冥冥之功是臣之䇿也二曰重蜀夫所謂重蜀者何臣嘗論之蜀之常勢非盜賊竊發蠻夷侵擾之為可憂而將帥專制之為可畏自古蜀之盜賊惟公孫述李雄崛起于閭閻草野之中猖狂僭竊以干正朔蓋其適逢大亂之世自李寶張忠之敗羅尚之死而朝廷不復有一戈一㦸入劔閣縱橫飄忽聽其所往而莫之限故此二人者前無所忌後無所顧得以坐成割據之勢其餘如漢之馬相趙祇晉之譙縱本朝之王均李順皆不旋踵而撲滅唐自天寶以後蜀嵗被南詔之擾蓋嘗一至成都而不能居又嘗再犯而不能入然卒以奔敗而逺遁故臣以為盜賊竊發蠻夷侵擾不為蜀憂何者主客之勢然也今夫蜀地險阻而離隔其人柔忍而朴厚惟其地險阻而離隔雖有盜賊卒起于其間而首尾肘腋不能以相應故其心搖蠻夷無故而深入則斷續先後不能以相入故其勢孤心搖者易散勢孤者難立可以為一時之擾而不可為久逺之患至于柔忍朴厚之人呼之則來招之則應有姦雄桀勇之夫而專制乎其上浸淫漸漬久而必至于為害故唐之崔寧韋臯皆積屢嵗之久遂擁兵擅利以抗朝廷梁之王建後唐之孟知祥亦皆先恢拓其腹心而長養其羽翼一旦反目而從容談笑坐得數千里之地小而為崔韋大而為王孟久而制蜀未有不然者此臣之所以為今日之慮也今之制蜀者其初始有一時之功栽培涵養而遂有不可拔之勢兄弟之相承支黨之相聯吏之奉承其風旨民之習熟其名字也蓋已久矣夫平居無事彼猶肯以虗名奉我我得以虗名役彼彼不幸有搖足之變則虗名有不可施而實禍將生蓋臣以為杜鴻漸擇其所畏假之以兵而布之列郡以扼其勢而制其姦安重誨納京師之兵扼蜀之腹心以幸其有所憚而不敢動而不知圉虎豹于一間跳蹌奮囓乃所以趣其鬭擬刃于人胸手足不疾應者未之有也鴻漸之䇿是圉虎豹于一間而重誨之䇿則擬刃于其胸也故二䇿之在今日皆有所不可行何者將以銷變而反以生變非朝廷之利也臣愚以為鎮靜而不驚寬緩而不迫久逺而有利者莫若厚恤二川之民于常賦之外時有所蠲除其征需于常傭之外時有所寬簡其力役間遣使者發德音下明詔丁寧委曲為之訓辭而深恤其疾苦蓋朝廷之待巴蜀必有以大過于江淮閩浙湖廣之民而後有以大慰巴蜀之心使其常有不能忘朝廷之心則緩急之際斯有不忍負朝廷之意夫如是則將帥能有兵而不能有民有兵而不能有民則可以為患而不可為大患今兩川之民外資邊屯內供朝廷以臣度之蓋必有重困者縱而不收恐為專制者資耳論鎮盜疏一曰收其所畏夫所謂收其所畏者何也臣嘗論之江西之贛其俗尚鬭而喜殺浙西之嚴其俗好大而敢為蓋其山川土木峻急暴厲故其風聲氣俗頑獷悍戾而不可告語平居無事聚博族飲叫號鬭詈以輕犯鞭撲甚至于發冢露刃揭關而掠財物以輕犯刀鋸又甚者至于捍城保壘蕩覆都邑竊立名字以輕犯兵革蓋臣嘗聞之犯鞭撲者無日而無犯刀鋸者無嵗而無犯兵革者雖不常有而逺者數年近者間嵗時猖狂竊發乎其間此二郡者蓋今日盜賊之淵藪也臣嘗以為贛之盜不可使出而嚴之盜不可使守贛之巨鎮不二百里而南安小壘介乎其間未足以分贛之勢也故贛之盜坐而守贛則必為禽縱而越嶺則二廣可以鼓行而無憂矣二廣之城池器械士卒錢榖以臣度之恐不可以支倉卒之急一旦有數千百人掉臂而疾呼不知其誰為抗也故曰贛之盜不可使出嚴地險厄而峭狹崇岡之路不可並臂胥口之溪不可橫舟一夫守其衝可以當百夫之力故曰嚴之盜不可使守往者齊寇之擾贛所以易禽者在于守而不能出方寇之擾嚴所以不長者在于出而不能守使二郡不幸有警而又有豪傑深謀逺慮者為之畫彼其鑒齊寇之失必不肯守鑒方冦之失必不肯出若是則非可以猝制也臣嘗熟講歷代制禦盜賊之術雖紛紛多端而其要不出于刑以為之懲賞以為之誘而二郡之民蓋刑之有所不能懲而賞之有所不能誘也故兩䇿皆不可施于二郡之間臣嘗聞之二郡人曰二郡之民不畏天子之官吏而畏鄉里之豪強是以不伏官吏之約束而伏豪強之號令蓋豪強之所以為重者有三智過人勇過人榖粟之蓄過人有是三者桀驁之民不得不低首下心折節而歸豪強之門為今之計者莫若諭郡縣之官吏重為之禮貌以致其敬輕為之科率以結其愛內有盜賊則假之以權以要其成苟有功效則縻之以爵以收其桀驁之民何者郡縣之官吏不能制其命而豪強能服其命此其為畏侮固不同矣故臣以為漢武帝不當殺郭解解之隂賊感概姦人之雄也恃氣以犯法藉義以報仇其情固可疾而其人亦甚不可廢臣嘗讀西漢游俠傳而觀郭解之始末以為容一夫之姦而可以制千夫之姦雖有害亦不為無利蓋天下之事利害兼行而不可偏去所貴夫善計惟擇其利多害少者為之故兩者兼權利可以掩害而害不可勝利此非深窮乎利害之端者有不能知雖知亦不能行嗟夫愚臣之䇿將為文吏之所誚矣二曰制其所主夫所謂制其所主者何也臣嘗論之曰盜賊之所出者有三一曰飢民二曰愚民三曰姦民飢民求生愚民求福姦民求利其初皆生于有所避有所慕而要其情之所終則有可返者有不可返者可返者飢民不可返者愚民姦民也何者飢民之為盜非有所大欲也無可生之計是以為冒死之䇿而其心未嘗不好生惡死也至于情之所迫而勢之所切以為生者必死而為盜者猶介乎可生可死之間當是之時苟非忠信廉恥之人其誰能安坐而待必死也故嵗凶則不得不為無恥之謀攻掠攘奪以濟一旦之命嵗豐則逡巡銷縮返而顧其有可生之路幡然動其欲生之心其勢不得不返田畝故飢民可閔而不可疾可濟而不可殺有所甚擾亦有所甚不必畏也惟夫愚民之求福也無厭求之于佛者而以為未足又轉而求之于鬼神求之于鬼神而以為未足故左道惑人焉則是食菜事魔者蓋生于愚民求福之無厭也姦民之求利也無已然惰而不肯為農拙而不能為技藝以為務農而業技藝所獲無幾而其勞有不可償者故相率而猖狂于三尺之外以僥幸于十倍之利得利而死姦民之所不恤則是盜販茶鹽者蓋生于姦民求利之無已也求福之無厭求利之無已是心易入而難出易聚而難散可以術解而不可以刑迫且朝廷所以禁止食菜事魔者可謂甚嚴而此弊未嘗除所以限制盜販茶鹽者可謂甚密而此弊未嘗絶為官吏者熟視而不敢訶曲蔽而不敢去無事而去官則後人當其患而任其責豈暇為拔本塞源之術也然臣以為小人可離而不可合小人合而為朋未有帖然者也臣往在江西見其所謂食菜事魔者彌鄉亘里誦經焚香夜則鬨然而來旦則寂然而亡其號令之所從出而語言之所從授則有宗師宗師之中有小有大而又有甚小者其徒大者或數千人其小者或千人其甚小者亦數百人其術則有雙修二㑹白佛金剛禪而其書則又有佛吐心師佛說涕淚小大明王出世開元經括地變文齊天論五來曲其所以為教戒傳習之言亦不過使人避害而趨利背禍而向福里民眩惑而莫知其所以然而然以為誠可以有利而無害有福而無禍故其宗師之御其徒如君之于臣父之于子而其徒之奉其宗師凛然如天地神明之不可犯較然如春夏秋冬之不可違也雖使之蹈白刃赴湯火可也由是言之莫若擒宗師則其徒不解而自散盜販私鹽臣之所甚詳也臣往在江西見其所盜販茶者多輒千餘少亦百數負者一夫而衛者兩夫橫刀揭斧叫呼踴躍以自震其威使人有所畏而不敢迫其在江西則江州興國軍屢被其害其在江北則舒蘄之國不堪其擾積纍浸漬而不已臣恐其患不止此數郡也臣嘗推其原以為非獨此曹之過也北界利其茶則以貨誘之于外園戶利其貨則以茶誘之于內北界雖未可以制而園户我之所及制也園戶有茶而不敢售則姦民欲茶而無所得臣不知其自能採而煮治之耶由是言之莫若禁園戶則其黨不治而自銷然欲擒宗師要使勿驚欲禁園户要使勿怨何者無故而擒其首則其黨疑其黨疑則懼而有所煽而為亂者臣願陛下密詢州縣之臣籍記其宗師之姓名鄉里多方誘之使自陷于刑辟而後鋤治而誅絶夫如是則可使不驚園戶所資以為生私茶之商也驟塞其資之之門則必有不平之心臣願陛下增降長短之引使其茶有所宣泄而不至于底滯夫如是則可使勿怨陛下試熟思之足以見愚臣計利算害如此其深也論州郡財賦殿最賞罰劄子臣竊謂方今天下之財患在于散而不能收隱而不能出能收其散出其隱據度外之財自可了目前之事臣愚不知生財大計獨以為禁姦懲慢謹藏嗇出猶為庶幾且一州之中姦欺逋慢漁取有司之利蟻漏公上之財者不知其幾精神思慮一有不到則財賦隨去臣嘗竊喻如手中搏沙放手即散隙中觀騁轉眼即失此物一去則百事盡廢今陛下郡國布在宇內臣竊料其間上下熬煎支吾不前者居其大半此其財賦亦未嘗無或逋滯不集或滲漏不見逋滯不集者促迫之不得其法則逋滯無可集之期滲漏不見者搜索之不得其處則滲漏無可塞之理因仍而不救則至大壞凡今陛下郡國其已壞者不知其幾其將壞者又不知其幾恐遲數年不復有可為之地其于陛下國事所係非輕臣所管州最為鄙陋窮薄之處又適當倒廢敗壞之期陛下溥博髙明固所具知而臣二年之間補發舊缺十萬有餘綱運上供州郡支遣五十萬有竒而終任見在又二萬有竒以此知世不可謂無財而散慢不收隱匿不出者以嵗計之不知其幾何以天下計之又不知其幾何方其散且隱也則此物或落于姦欺之手或委為廢棄之物及其收且出也則一物成一用一用濟一事以嵗計之其所濟不知其幾何以天下計之其所濟又不知其幾何臣蠢愚寡陋安知為政徒悉臣之心窮臣之力收拾一郡之財粗辦二十年之事而況郡國之大有什百于此人才之能有千萬于臣者乎近時一二儒臣所至之處輒稱沛然則陛下宇內之財果不可謂無也有人然後有政事有政事然後有財賦人廢而政事弛政事弛而財賦始不可見矣陛下凡臨事遣守臣莫逃聖鑒然非賞罰殿最則無以為勸沮臣願陛下明詔監司凡本路守臣如綱運上供無拖缺州郡官吏軍兵支請無積壓或拖缺積壓者每嵗各擇其尤一二人以聞陛下躬出剛斷顯行黜陟能者有以自喜而愈不惜力不能者自知其不可為必求引避又將有自為量力不敢試郡以謀苟祿者不待沙汰而庸者去不勞選舉而材者出自此州郡可以各自支持陛下可以少息思慮雖未能大治可漸冀小康伏惟陛下裁擇論吏民劄子臣嘗論古之為吏者無所忌于民而為民者無所忌于吏吏民不相忌故其情通而氣協情通則無乖阻氣協則無鬭爭古者郡邑之間吏不猜民民不疾吏歡欣怡愈如父子之相信兄弟之相愛平時追呼號召未嘗及于民之門而鞭撲笞箠亦未嘗切于民之肌膚間則出之阡陌勞來相勸以勉其耘耔蠶織之事然其色怡和而不厲其辭委曲而不徑若有以傷民之情者故民之于吏依依切切常有慕戀感恱之意出力以供其衣食雖甚勞而不辭及其無事之時則又為補葺其宫室以庶幾無虞于風雨鳥鼠之害蓋嘗讀詩而至七月之篇則見其吏民之情相親豈弟慈祥無纖毫齟齬扞格之態故曰三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜又曰春日遲遲采蘩祁祁女心傷悲其情亦可見矣然猶以為未也七月鳴鵙八月載績載𤣥載黃我朱孔陽為公子裳四月秀葽五月鳴蜩八月其穫十月隕蘀一之日于貉取彼狐狸為公子裘績以為己裳而公子則以𤣥黃貉以為己裘而公子則以狐狸蓋其不敢自愛其身而愛其吏也如此當是時為吏者優遊泮奂得以盡其志而為民者謹朴勤厚以安其身雖有狠戾無親之人咸悅慕而不肯疾視其上蓋自秦商鞅設法以鬭吏民而其情遂離散而不可復合而平居吏之視民惴惴然如覩其仇讎故吏得間則肆其忿以毒民而民得間則泄其憤以毒吏蓋嘗思之至于秦皇二世之際郡縣之吏屠人之父戕人之子暴虐慘酷假天子之法令以濟其凶及夫劉項勝廣之變則紛然剚刃于郡縣之吏者不可勝數蓋其勢之相激不得不然者故臣謂吏民不可使之相忌忌則爭爭則必至于交讎而不可止而後之有天下者不能平其爭之之心而反授以爭之之具以趣其鬭其初欲制姦吏而不知其弊或至于長姦吏姦吏未必可制而良吏先受病矣今夫民之訟長吏者使其誠無辜而濫罪則不得不自伸其寃誠過制而橫斂則不得不自訴其抑然其間或啖童僕以伺其隂或結胥吏以制其失或揚與之往來而餽遺他日則持之以為不法雖狡猾者未有不墮其計也此其端生于豪強兼并之家恃勢以暴民挾私以屈法多不便于能吏是故必欲擲發搜求而使之去且今之為郡縣之吏者蓋亦甚難矣監司不恤郡縣故嘗有不時之需稍緩則符檄紛紛逼切則急于星火權要不恤郡縣故嘗有難應之求稍不如所欲則怒罵陵拂以至于浸淫搖撼以快其志而又加之兼并豪強之民持其短長以逞其詐以肆其橫殆非所以保護能吏也嗟夫郡縣之間烏能事事盡善而人人無失哉臣愚以為非有大姦大慝一號令之不審一措置之失當不甚害民而蠧國者則包涵掩覆有以略其過責其效而盡其才使豪民不至于縱其姦而能吏不至于沮其志如是而吏民之爭庶乎其可息也雪山集卷三
