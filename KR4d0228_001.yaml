body:
  text: 乾隆四十年十一月十六日奉上諭據四庫全書館總裁將所輯永樂大典散篇進呈朕詳加披閲内宋劉跋學易集十二巻擬請刋刻其中有青詞一體乃道流祈禱之章非斯文正軌前因題胡宿集見其有道院青詞教坊致語之類命刪去刋行而抄本仍存其舊今劉跋所作則因己身服藥交年瑣事用青詞致告尤為不經雖抄本不妨姑存刋刻必不可也蓋青詞跡涉異端不特周程張朱諸儒所不肯為即韓栁歐蘇諸大家亦正集所未見若韓愈之送窮文栁宗元之乞巧文此乃擬托神靈㳺戲翰墨不過借以喻言竝非實有其事偶一為之固屬無害又如時文為舉業所習自前明以來通人擅長者甚多然亦只可聽其另集専行不宜竝登文集況青詞之尤乖典則者乎再所進書内有擬請抄錄之王質雪山集内如論和戰守疏及上宋孝宗書諸篇詞㫖剴切頗當事理竞宜付之剞劂但其中亦有青詞一種竝當一律從刪所有此二書著交該總裁等重加釐定分别削存用昭評騭之允至現在纂輯四庫全書部帙計盈數萬所採詩文别集既多自不能必其通體完善或大端可取原不妨棄瑕錄瑜如宋穆修集有曹操帳記語多稱頌謬于是非大義在所必刪而全集或可錄存亦不必因此以廢彼惟當于提要内闡明其故使去取之義昭然諸凡相類者均可照此辦理該總裁等務須詳慎決擇使羣言悉歸雅正副朕鑑古斥邪之意
