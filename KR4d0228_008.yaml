body:
  text: 雪山集卷五宋王質撰序樞密宣撫相公樂府序維大觀四年十一月戊子二日丙寅實生仁夀虞公于蜀乾道四年戊子是日己未門人汶陽王質依倣古樂府歌詞以為公之生日之獻其辭所倚託皆異代宰相故事于是公且相矣初公再入遂長西府太上皇帝親書漢中大夫褒所著聖主得賢臣頌以賜公皇帝又親述于其後維頌所論撰自堯舜禹湯文武之君六稷契臯陶伊吕之臣五餘皆闕而弗著其證取諸易利見之爻詩思皇之章天下咸知公當相也已而丞相莆田公葉壽春公魏去晉陵公蔣又去案宋史乾道三年十一月葉顒魏杞罷四年六月蔣芾以母喪去公方視師未復命天子虗其位弗實將有待焉蓋皇天后土太祖太宗與太上皇帝皇帝相與不言而同謀某知其如此而不知其所以然意者有期運厯數而莫之或知也維公當相者五采石郤敵宗社山河克安弗傾一當相涼雍將命民圗來歸國紀用章二當相荆襄總師上流乂安自漢達于淮海乃始克壯三當相西府初命敵蹙江漢者即日解去載盟用成至于今允懷四當相今功日茂望日隆天時人事極矣天下咸知公且相也其辭凡四事一章六十言君子大其意而不否其辭其將有傳俾世得以觀焉門人汶陽王質謹序西征叢紀序案此序當是孝宗乾道六年所作丁亥余西征自興國至于利里計二千六百九十有三陸也日計自閏七月之十一至十月之二十五得百有四日始達戊子自利至于成都里計七百十有五其還如之日計自十一月之四至十二月之十九得四十有五往來皆在焉己丑余東下自利至興國里計六千十有五水也日計自正月之二十至四月之十得八十日始達是役也宣撫虞公辟而西制置朝公檄而東事既是嵗又西自興國至于成都里計如丁戊西征之數日計自十月之十九至庚寅二月之五得百有六日始達司廢是嵗又東自成都至于興國里計五千十有九促于利來者其江異也日計自六月之一至八月之七得六十有六日始達是役也朝公檄而西朝公去解而東此再役本末也竟四百有一日萬七千三百十有五里其所經見博矣州無巨于成都漢次之無秀于眉閬次之縣無美于新繁鎮無集于蠶叢關無險于劔門饒風次之市無翕于沙頭九支次之樓無敞于成都之西樓南定嶽陽次之山無峻于房之外朝雞鳴女媧次之灘無難于漢初之峭門石門新灘次之江無雄于大江湖無廣于洞庭峽無偉于瞿唐石無尊于灔澦棧無危于朝天之龍洞峯無妙于巫峽之神女磯無猛于荆之髙伏溪無悍于堵陽之石口廟無宏于江瀆寺無袤于大慈見異無特于鳳凰山之龍訪古無邈于成都之石室畫無老于漢殿之人物碑無豐于學宫之石經遨遊無夥于浣花貿易無繁于藥市樹無大于下巖之槐花無茂于漢隂之山茶獸無竒于郢之烏鹿鳥無珍于夔之花蜂所見之傑者如此推此類具言之則亦有不可勝數者矣余之悲歌舒慘豐悴皆可以追見而耳目所增益心志所開廣自知之而弗能言之是紀也事繫日日繫月月繫年如先儒式而其文又隨事繫之詩一百三十有九詞五十有一記十序六銘二他文皆非相關者弗載自古經行天下其著者惟司馬子長杜子美為廣其文若詩皆宏偉洪博稱之豈不有所助哉余所厯非淺鮮矣顧未見有所超者所謂降才之殊非耶雖然其亦異夫昔矣于湖集序案此序當是孝宗淳熙元年所作故宋中書舍人張公安國奮起荒寒寂寞之鄉而聲名震耀天下者二十餘年可謂盛矣嵗丁丑某始從公于臨安間謂某曰吾有志于文章將須成于子其請為我言之某謝不能公益切某不得已而為之言文章之根本皆在六經非惟義理也而其機杼物采規模制度無不具備者也語未卒公出考古圗其品百二十有八曰是當為記于經乎何取某曰宜用顧命公拊掌變色曰吾得之吾得之嵗丁亥追遊廬山之間訖事將裒其所厯序之公曰何以某曰當用禹貢公益動嵗己丑某下峽過荆州公出其文數十篇于是超然殆不可追躡非漢唐諸子所能管攝也是嵗公沒于當塗之蕪湖而其歌詞數編先出嵗癸巳公之弟王臣官大冶道永興某謂王臣曰公之文當亟輯世酣于其歌詞而其英偉粹精之全體未著將有以狹公者王臣既去一年以公之文若干篇若干册示某公之文非修辭立論之所可贊也往會于荆州之杞梓堂公曰世之文秦降于三代漢降于秦唐又降焉何也某曰文章非人之所為天地之氣發露而為英華而人隨其淺深能否得之世運風俗轉移遷流愈降而愈薄此可以觀氣之盈虧自混淪以前其略見于釋氏之長含經而開闢以後其詳見于邵氏之皇極經世此文章所以有高下而亦奚獨文章也司馬子長班孟堅世以為匹觀張騫之贊子長孟堅增損之語可以見人情之廣狹枚乘漢之劣而栁子厚雄于唐者也觀乘之七發與子厚之八問可以見物態之厚薄顧第弗深考公益叩曰然則何如某曰世之風俗與天地之氣俱為消息盈虗而吾之心未嘗有所虧盈也自三代而降中庸大學之旨不傳而危微精一之學遂廢世徒以智力精神與萬物相抗而奪其情狀為吾之文章不知吾之智力精神與氣運風俗同流而我弗能制也若是何怪道愈降文益衰夫惟至誠不息之功全而克己復禮之力厚自為主宰不為氣運風俗所遷吾之智力精神返而與泰定之光相合不隨古今之變而常新無窮則三代之文章居然可致也林間之夫漢上之女與今之學士大夫其賢愚工拙宜至相絶矣而罝漢廣之聲非後世可吐此惟其有莫不好德之心故其音純有無思犯禮之念故其音正世溺于勢利聲名而方寸之地為萬物往來馳騁之塗蹂踐吾之精靈其力至淺鮮矣敘事而有大禹臯陶益稷之謨論諫而有説命旅獒立政之書諭衆而有梓材多方之訓析理而有洪範之文此非可以取必于其辭而其存諸中者如玉在石珠在淵溫純明湛之輝因物顯容而自莫如此天下之至文也公曰善哉始吾所志未為極也如子所言則六經是師三代是慕而後可也苟未死當無負于子言已泣下初莫諭其故後四月而公亡此某所以痛哭流涕而恨公之無年抱其不竭之才賫其未盡之志以沒使某之言徒發而不見其驗也哀哉退文序退文者王子悔過之書也王子少而為學問文章年十有六而貢于里二十有三而升于太學二十有六而選于禮部其在太學也得聲為多二十有七而朝野交稱辟召狎至得聲為尤多實淺而聲盈于是以功名為可立就而不知識未明才未練不足以當世故而氣已盛志已髙心之火為之宰才之薪為之用薪火相傳益炎而王子不知也嵗辛巳一觸禍其可以知之矣而弗知曰人忌我也嵗丙戌再觸禍其可以知之矣而又弗知亦曰人嫉我也嵗辛卯三觸禍其可以知之矣而又弗知亦曰人弗容我也嵗乙未得罪曰如是曰如是乃始躍然悔霍然悟平生諸非參然畢陳于前凛然懼慘然悲大變于頃刻之間于是王子年四十有一而始造端為人嗚呼甚矣吾心之躁也悔躁則為靜吾心之輕也悔輕則為重吾心之急也悔急則為緩吾心之猛也悔猛則為寬吾心之侈也悔侈則為儉甚矣吾心平生之多過而吾弗知也然則奚以知之曰途弗窮則弗回勢弗極則弗變方其變故之未知也吾心之火固自若也增之益昌殖之益滋則吾之禍故可勝言哉及其變故之至也如傾甘雨如激大波而吾心之火熾然者為蕭然則此變其可無也無此火弗能召此變無此變弗能銷此火嗚呼此變其可無也有此變王子為君子無此變王子為小人非吾之資小人也此火導而入之也熏蒸燔灼之心既息而溫純明淨之心乃生向者火所覆蔽而弗興也人以為得禍曰一職之失也三秩之鐫也而吾以為得福曰其失也有時而得其鐫也有時而復也機緘所斡鋒鋩所迫廓然移風易俗于吾靈臺之間此不亦天下之至吉至祥也哉且弗考其他以吾身觀之形輕神怡志慮簡以吾家觀之上輯下睦門閭雍何者吾心之火謝而弗為之主吾之幽顯咸安樂也弗謂之吉祥可乎嗚呼生于憂患死于安樂孟子決生死于憂患安樂之機而弗疑吾乃今知之得此變而後生此變也者不至固不可緩亦不可不至蹈于死緩則濵于死及是得之能弗死而生此天地之心他人弗知而吾于悔悟之際窺之審也今將何以持之使堅曰畏何以養之使熟曰緩作六悔著其昔之非作六變著其今之是總而謂之退書未悔則務進既悔則務退其相反蓋理勢然也淳熙二年二月自序趙信臣子名字序趙信臣見其子于王景文問字若名焉吾為名曰善祥字曰百卿咨爾善祥烏赤鵠朱馬圗器車麗玉葉芝有粲于兹其祥也歟兹祥在物不宅其閭不麗其軀來如飄風去如擲虗是則何有我不得居匪祥也歟附義而行秉禮以趨以手拊心不震以瞿以形視身不惕以趄父榮母安弟肅兄愈耳目聰明心氣佚舒疾癘遁藏粳稌羡餘家無噫聲里無謗譽真祥也歟故曰作善降之百祥子如不言視此古書雲韜堂楚辭後序陸氏埤雅比物性倍蓰增明案陸佃先著物性門類後著埤雅見其子宰埤雅序中此省文但稱物性初神宗以對時育物宅心陸氏推此類具言之造根于物性紀實于埤雅上迪君師下訓學士余之本趣資物態以陶已靈而已會情于耳目者多索妙于簡䇿者少以熟故精非以博故詳也山梁雌雉時哉時哉子路共之三嗅而作浴乎沂風乎舞雩詠而歸吾與點也故曰智者樂水仁者樂山智者動仁者靜智者樂仁者夀聖人之所事此凡寓意于彼適意于此所以導人心茂此種也孟子曰夫仁亦在乎熟之而已矣鳶飛戾天魚躍于淵此雖無補于世亦豈無益于己也大慧禪師正法眼藏序紹興二十七年余在杭遇大慧禪師于戶部侍郎榮公茂世之家余方年少氣壯持先儒故事抵佛甚力遇其徒輒憎之于是引卻弗與語明年又遇于湖之東林待之如故又五年師終于徑山而正法眼藏先行于世時隆興元年也又一年余夜宿金山之方丈不得寤信手而抽几案文書得此閲之至洪爐點雪恍然非平時之境竟夕危坐如行曲徑斜溪蒙籠繚繞忽林斷川明曠然平原巨野之陳前也眉目周張莫知其何以致此將從之逰以所省咨之則已無及顧遺恨終不可釋又一年見語録數種則淨智居士黃君文昌所纂者也益浩歎長吁恨一再遇師而不克親以至欲見而不可復得已矣余生平無所甚恨而此恨則與江河同流無時而極也既從事于其書每抱卷傷懷不得猛刃于接手揕胸之間而書之剸割亦少緩矣其與心相會者展轉思繹雖間若醍醐甘露到口旋又苦鹹擾之終疑其間果有不落一切迥超羣有之機蓋人間諸境法中萬趣至此皆無所攀緣若斬絶者亦嘗于斬絶之所盡力為之而情識不行塗轍俱斷無一可為者則又泊然莫知所之疑之又七八年而後稍見死生塗窮勢竭之地夫人之心無所往而不可天下之至難制者至于途窮勢竭則亦無能為也如兵戈迫之遇沮洳則涉沮洳遇荆棘則踐荆棘避死逃生其誰肯束手者至大川巨浸前無舟楫旁無町畦顧刃將及之則霍然覺性命之輕而身世之虗空矣況有所謂是非成敗得喪榮辱者哉故此心必導而致此地而後能死此心此心死則死生之路絶矣此心牛也死生之故車也牛斃則車止何能使牛斃而車止則柏樹子乾屎橛之屬載在此書者皆殞牛之具也至于講之而弗可明窮之而弗可徹情枯味竭則益當勿捨而與柏樹子乾屎橛之屬深相往來久而寖熟則此心無與為朋遁矣遁則窮其心有大川巨浸迎其前而決其命者嗚呼此書豈不可傳以激天下之為大丈夫者耶大慧之徒德洪來請序于余略攄所懷語之吁其贅矣題跋書張魏公祠堂記後乾道六年五月二十三日陳伯強王質共啖荔子于史大猷之舍伯強誦其妙年從軍數詩余亦誦從事張魏公幕府烏江盱眙數詩因曰魏公蜀人也東南是非固不能皆一而西南滋是少而非多何也伯強云云在庭擁篲老兵嘆曰學士好道幾句與我相公出氣余驚曰公議不在吾徒乃在此曹也亟引紙行墨書之漏下二鼓月在半空而文成以授合坐者曰俟吾墓檟可巢烏聽流傳也跋蘇給事放白鷴帖淳熙二年十一月二十七日早作潁昌程君元鼎來謁起立言曰昔先君巡檢鼎之桃源時給事蘇公居提舉使者幕府以鼎為治紹興三十一年也先君娶于柳氏展如之女某之母也太師蘇公之妹展如之母也于是與蘇氏有連公資巖壑喜魚鳥之儔先君所部山水深秀竒麗黃石山者其尤也其間得白鷴獻之護致者不謹傷焉公絶欲愈之不可得憐而返諸先君且屬深縱之乃即故處如公指久之騰上髙山顛周視悲鳴弗忍去又久之一白鷴從他來相與並立交呼又久之始皆徐飛去豈其雌雄耶仁心通乎異類何其驗之明也後數年先君尉光之固始以沒將終季子在旁戒曰我習言命以金木水火土五者揆之公他日必大且其所存形諸白鷴者可以推而知也天人之符較然汝其識之先君既喪他書疏多遺散獨此帖不敢荒先君之命囊别貯之旦慕視惟謹公今博大光明為知名公卿先君之言效矣某將夀諸石君其為我書之余曰説如是帖安在程君發諸袖中余掇視之慨然太息曰仁者人也合而言之道也蓋其大與天地同量而其端以惻隱之心充之孟子之言天下學士所信舍牛可以致王救孺子可以保四海其仁至不可勝用者自無欲害人始也子先君以白鷴驗蘇公此有道者之鑒也而余將何以贊之子休矣自白鷴充之可使斯世為堯舜成康此孟子之論而非余創建者也子毋疑公今為徽猷閣待制鎮當塗太師文忠公之曾孫其學力蓋真能擴充者也名昭廣字邦振蓋程君所道其先君者今附見之來者得以知焉題王承可文集後秦會之輕天下以為無人時無豪傑縱使至此方靖康士大夫垂頭搖尾時會之精神勃發敢與強鄰悍敵抗爭是非紹興講和無賢不肖皆以為不可會之獨保無後患雖其變在二十年之後而當時料者率不驗卧虎三郵舉國灑淅莫敢有撩頭編鬚者會之單力攻堅立挫其鋒罄天下而屈于會之則養成其威烏可以勝言哉惟公以輩行鈞敵相視而會之亦敬憚公然見厚而心不親辭甘而實不應以故多外而少內暫近而終逺則凡會之所昵而親之者世固不以為然而會之所疏而却之者自可知其人也題九歌圗九歌世未有能暢其旨者也蓋訴神之辭乎已矣國無人莫我知無可告者矣神其有靈尚庶幾見答乎哀哉蔡京當國致一異已者于理其人顧所謂天王號曰有冤不雪尚為天王乎神為之目張京聞而舍之屈子之訴切矣顧神漠焉何哉至使抱石投沙以殞其軀獨無力援之歟司命湘君之流其有負于兹賢哉復齋銘跋孔子言仁最多學者自礙不少聖人猶江海豈有心礙人哉且如答顔子之問稍異于他辭學者觸處礙生至是莫能渾融強作差别銘曰孔門問仁各得其正惟語顔子窮理盡性何其不疏而皆通也一日兩字學者多略之惟于克己復禮致思安知要在一日也銘云克己復禮一日之功天下歸仁快若飄風一日之狀渙然而克己復禮之趣亦炳然何其不燭而自明也學者以經典為情文不可造妙故曰禮者理也即天理也此銘不變字形不入注腳但云視聽言動但防其非由禮之門為仁之基躬行允蹈以禮踐形曲禮三千動皆合經又何其粲然也儻中此機無須某解無用某傳心力省目力口力手力皆省杜元凱雖季世晚儒其涣然氷釋怡然理順兩語真學者氣象也此鄉多嗜學宜置思樂之所與吾徒共之當有默而識之者跋文與可墨竹文與可甚多能最篤好畫得意無過竹者木石蓋晚為之亦寡作不自以為竒故木石流傳皆鮮配于竹與可作校理以疾請郡欲襄汝或資簡已有首丘之意既乃得吳興至苑丘傳舍而卒此帖去死無幾日猶眷戀竹未能掃除與可之死沐浴衣冠端坐而逝是時胸中不復有我況有竹乎畫後有帖云伏暑不能退須在假將理今僅能飲食惟皮骨耳欲求襄汝或資簡生事窘薄俯首碌碌為竊祿人慚悚素所嗜好都自撒去惟畫竹吟詩有子駿子瞻為真賞故斷之遲遲此與可將去國時畫及帖也故余言云然雪山集卷五
