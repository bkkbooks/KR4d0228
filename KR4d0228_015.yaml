body:
  text: 雪山集卷十二宋王質撰賦問北鴈賦波浟浟兮江平上有楓兮秋清聆極浦之遙聲曰此豈鴈之初征上手敬勞征行良苦大荒多霜長河多風背河而南川原蕭條無食可充幸而至于此也既勞之且訊之曰燕趙之野土梗俗徑慷慨大呼前無白刃齊負東海魯挾龜䝉士辨而智談髙氣洪三秦以西狎武喜功今皆弗聞為有為無以為有耶固未有奮精忠之烈建殊效于中都者也以為無耶山川興氣星辰定區奚獨于今而變于初言未既若將緩翼俯咮垂吐復吞未及有言又進之曰凡汝所經與汝所知比屋赤子為喜為悲飢兮何食寒兮何衣故老遺民為亡為存城郭苑囿桑麻草木為仍其生為一掃而更山兮崇崇為陷而深有淵其谷為墂而平古帝園陵繞牆崇扉為雄茂而森肅為寒凉而慘悽祕殿崔嵬邃館沈宫為丹青兮不改為荆榛兮灌叢異芳名英瑰竒怪石為形貌之猶然為蒼莽而不可蹤跡也吾惟汝問幸告其故勿簡而疏勿誕而誣于是哀鳴咿嚶若避若趨倐飛去兮不可追黯落日兮平蕪綺川亭賦苕溪之北有山曰貝錦之山並山而西有亭曰綺川之亭仰睨葛仙之丹鼎旁招卞山之白雲王子愛之坐見于牆食見于羮夜航溪而十往返晝履山而百降登客有問焉者曰造化治形耳目分職耳則司聲目則司色彼聲色之無有顧耳目之何得胡乃廢寢興輟飲食墮目于窈窕之境喪耳于默默之域王子曰子嘗覽于綺川之亭乎曰未也綺川何如王子曰子欲聞之乎曰然然則為子言之綺川之上巖穹谷淵青松魁竒翠竹淨娟絡以蒼藤激以飛泉聲如應和上徹雲天百鳥吟呼或高或低或僄疾而激烈或清深而逶迤如天球大鏞並作于庭笙以小雅之南陔歌以召南之采蘋綺川之下洲渚參差緑水紅蓮泛兮相依露濯而清風搖而馡月麗而皎煙䝉而竒白蘋青藻前導後隨屬玉鵁鶄戀不忍飛如洛水之浦巫山之陽戴金搖兮熠耀振文佩兮飄揚此其大略也故曰不律呂而聲者天下之至聲也不黼黻而色者天下之至色也且有喜而無憂有利而無害有得而無喪有成而無敗今夫洪震纖響銷神奪精命之曰伐命之兵豐頰長眉秀骨鮮膚命之曰銷軀之爐非獨聲色而已美酒甘餐溫醇濃渥命之曰腐腸之藥縟衣遝裳縻曼繁鮮命之曰沈躬之淵子亦知之乎于是客俯而思仰而歡曰嗚呼殆哉客與夷猶而戲虎狼禹行舜趨而涉瞿唐然則流蕩遁逸清宫洞房眩矅恍惚蜀文吳章邪氣湊襲正氣蔽藏精魄紛紜若有若亡日盛月新乃溘而僵鳴呼殆哉向也吾見子之陋今也吾見子之髙小人敢不敬再拜受賜雅樞相宣撫虞公壽雅并序乾道三年丁亥十一月壬子二日丙寅仁壽虞公生之日壽雅所謂作也私慶也曷以雅大賢之生天地有運陰陽有數星辰有度鬼神有謀關于天下大也曷為大宗廟有依生靈有歸禮樂有託道德有宗其為大明也嵩髙之詩曰維嶽降神生甫及申蒸民之詩曰保兹天子生仲山甫誦其人本其生非以其躬以其周也故曰維周之翰又曰天監有周私遺也曷以雅嵩髙之詩曰以贈申伯蒸民之詩曰仲山甫永懷以慰其心禮則私情則公也曷以為公天生蒸民好是懿德民之彞也無悖于古無浮于今某無尤焉維是有豐茂之德而無肆好之心有恢宏之功而無穆清之章此則某之愧也漢清漢水之清其石粼粼仁壽公來思漢水則清漢水之蜀其洄澳澳仁壽公往思漢水則濁農耰于野不蹂一苗賈馳于郊不驚一毛公在襄陽民生逍遙公來自東襄民齎齎止公毋西公來自吳襄民蹙蹙止公毋蜀金我襄城湯我漢江春我之筐秋我之箱我耄皤皤公昔年之而曷捐之我孩嬰嬰公昔體之而曷置之日月躞躞勿黧公色霜露烈烈勿華公髮公髮勿華我生則遐籲彼蒼天佑我皇家江艫江之沄沄艫之賁賁敵之休休震于崑崙仁壽公一臨靡靡其傾江之洋洋艫之揚揚敵之煌煌孔熾厥芒仁壽公一噓蕭蕭其凉天子在宮有恫悒悒神主在廟有震岌岌暨我國人以莫不惕在宮雍雍金石其音在廟湛湛虎兕其扄暨我國人以莫不寧在庚之寅維公其生在已之辛維公其成而有斯厄而有斯人匪天之私伊宋之仁大江之濱采石之津波之淪淪石之粼粼謂公可堙江則可塵山之嶔嶔隰之畇畇謂公可磨山則可簪五言古詩故事三公皆黃閣作黃閣辭文章開紫垣委耀照黃扉崇雉抱髙墉長虹曳華榱浮闌翼交楯㦸衣搖縹粉石紋浪花碎紫光射金鼎珠􅋒明黼領劒鏢玉螭冷槐香吹鬢影相對青炯炯故事相國金印紫綬三公亦如之作金印辭寶篆結金紋玉皇衣上雲飛馳雙日月開閉幾乾坤靈䕫挾輈吼幰弩指幡首絳霏密葱蒨隱隱龜銜紐祥文寫天影壽骨聳嶽頂蓮巢秋風冷甘守相國印永興丞以皓雪鮮梅竒語見示戲占閒人浪辭酬之四海一山玉切作冠巑岏冠上戴明月履下踏飛湍肺腸裹林壑表裏交珊珊上界雪可飽下土人希餐三春鎮長在九夏何曾殘大千薝蔔林巨萬梅花團花惟白皓皓巾自烏漫漫純玉龍爭飛雜玉龍皆蟠千丈亭不歷九尺庵隨看沈存中有觀雪庵其制在忘懷録摩雲起髙崖運斤吾能刋書空結竒字擘鏡誰能觀須彌有數盡此興無時闌聞雁我性愛風竹歷耳如管弦兩日偶不聞但見青摩烟半夜意展轉時聞雁翩翩未能叫雲月而我獨不眠抱被夜徙榻空堂秋山連亦有鷗鷺栖歷歷鳴更傳為汝飲一杯問汝以一言不居蘆葦中乃巢蒼翠巔蕭蕭西風多一等菰蒲寒逺來有相伴汝等豈不賢不覺點急急難通意惓惓振翼忽飛去江湖水連天荷柳松竹贈答并序淳案此詩當是孝宗熙八年所作王子景文蕭散人也涉暑即旁求水石茂林嘉木攘之惟饒閒故此念多酬其所得不資矣權輿起辛巳推遷至辛丑逾二十年營巢寖就緒全體山僧道人之廬非火宅也或者野之麋鹿山林自本性豈故為崖異者耶有荷有柳松竹兼之嵗久成魁幹成厚陰于素忌稍銷雖趨此門微有所省變熱惱為清凉亦無情而有趣者助也一日偃仰竹榻酬酢湖風意取故書翻之見香山雞鶴贈答凡二玉川客石竹贈答又加遜章凡三香山有競物之心焉玉川則展轉推卻避世而離俗者也寧為盧勿為白戲效其體為之然不全規摹亦在我者咸隨人焉難也小異何傷乎僕贈荷僕贈荷吾友清陰多為我生凉飈寒輝相蕩摩姑徐徐勿急急欹爾緑玉盤傾爾白玉粒荷遜柳荷遜柳短茁非修莖焉如子妙密騰起敷層陰明月上子勿障主欲務遐觀清宇任昭曠柳遜竹柳遜竹弱植短竒節戛玉仍鏗金難攀子清絶主睡酣毋驚醒遲主江湖歸相與獻清影竹遜松竹遜松古氣摩空纏鐵石作風骨可以班主賢虛空中走河海主不好世音子盍宏天籟松答僕松答僕奉主願盡心護以虬龍威娛以金玉音作炎夏作凜秋願主愛玉體五夜增輕裘和張晉彥白草䝉荒烟江南似江北游子無故鄉去住總為客平生不如意江闊見面窄相逢酒一杯意氣感知識和郭從範二首羽檄傳嵗月走馬不當疾我家在江南時節阻㑹集東臯冗不治杜老趣歸急何時秉犁鋤夜翻隴頭濕萱草搖清風榴英焰方午新燕披紫茸低昂子隨母暄寒換時節濃疏變庭樹杜老癡不歸空憐小兒女七言古詩初春癡雲漠漠低壓屋雨意垂垂篩似粟半夜春聲到幽竹方槽溜溜瀉寒玉夢破簷牙聲未乾開門山色青攢攢東君放步到籬腳桃李稍稍敷春妍既雨即晴應更好將及清明藉芳草廟堂老手調陰陽故應隨意為雨暘留别陳阜卿巍巍堂堂陳豫章身長五尺名八方千鈞寶鼎薦禘嘗百圍大木宜宮堂乃者從之在建康抉雲望見奎婁張一言拓我萬里疆眇視六合揮八荒震靂雷電飛清霜羣靈錯漠無晶光天駟超逸奔絶韁攙搶斂旗雕赤芒鴻鵠之上日月旁翩翩孤影搖蒼茫大兒太史公子長小兒元和韓侍郎䕫龍稷契伊傅姜青天白日雁成行耽耽我負千鍾囊置在公前一針鋩東齊南楚服晉强而况胡沈梁江黃今我不樂思還鄉石頭渡口呼歸航不獨别離多慨慷時事關心神轉傷一為公歌臣馬良黃塵蔽人聲不揚公何時乎歸廟廊土囊風怒於菟驤煥發海藏龍宮藏滿朝桂术參芝香三湔三釁我冠裳隻輪小車兩僕將不然扁舟下瀟湘參差孤起橫滄浪復欲淮南耕戰場傍鋤春草臥斜陽惠山樹石極葱蒼儻來相對高僧房送趙希郮集英殿下識乃翁遺愛樓前又識儂參差兩紀短一載伏想鬢髮秋蓬蓬道阻且修不可見何喜老兄相㑹逢老兄顏色清而丰娟娟秋水開芙蓉鐵甕城頭拭硎刃晚榜咫尺春旗紅觚稜金爵面成背半帆楚月迎淮風相思江西子王子尋盟來與白鷗同江莎濃淡俄一再庾樓卻倚廬山峯吾宗乃有此豚犬掩鼻急趨風露中老兄久厭臭來逐是行不復塵相䝉亦欲柁牙把船尾琵琶洲上攜手吟青楓陪林守遊南湖月下歌紫霄峯頭雲破湧明月翠華洞裏烟冷生清風水光上下相映碧小舟飛入玻瓈中荷露白凝珠蓼花紅綴米沈沈水晶宫金波幾千里君不見風流太守醉似泥倒著接䍦騎馬歸南湖風月君不知問君何似髙陽池翡翠杓金叵羅勸君一杯酒聽我南湖歌清風明月萬古長如此有酒不樂將奈何和袁丞海棠海裳不入草堂手見韓子蒼詩雪堂乃與同春風見蘇子瞻詩草堂雪堂各千載唐朝宋朝無兩紅露霏風嫋非人為見蘇子瞻詩夜染朝酣自化工見張建封詩大洋之內烟濛濛不似周公禮樂中見花木記花以海為名者悉自南海來墨梅貴簡不貴繁妙在有無間滿眼尋不見約略見纖纖貴老不貴稚妙在榮枯際芳態減初年其中寓幽意貴瘠不貴肥愈瘦愈清竒瘦到無何有政好玩空枝貴含不貴開風度韜胚胎游蜂啅不得乃始抱全才宜在幽且邃終日無人至水繞山重重隔樹令人嚏宜在平且闊大江驚濤潑潑上稍連顛半驀忽衝脫宜夜不宜晝更宜月波溜崖淨澗淙淙漁子推篷嗅宜陰不宜晴更宜雪花凝五七㸃未足封枝要全扄宜與竹相鄰白白參青青所恨花無音間借竹為聲宜與松相伴扶疏交凌亂松香粗則粗亦能佐一半其鳥宜翠羽否則碧蒿侶山雀仍山鴉速去切勿駐其人宜野僧否則閒道民宜疏綺紈客公子共王孫吾非僧又非道兩眼貯五湖兩肩負三島相煩健筆凌風掃梅子王子成二老龍珠吟蛇有黃雞有錦蚌有珠魚有枕萬物隨身各懷寶惟龍抱負超覆幬臆之上頷之下聲靈氣焰焯光輝威力神通宏變化小徑寸大圍尺口中皎月戲吐吞掌上流星恣拋擲存此珠千年萬年鱗不枯亡此珠一螻一蟻血可濡有水即珠榮無水即珠悴有雲即珠騰無雲即珠墜太陽真火力能鑠飛天夜叉勢能制所以多潛巖壑睡功成行滿自在飛天旋地轉皆由之如人賢愚有九品如人貴賤有十威三尺烏勿能啄大力鬼弗能摶開通萬類總圓明照耀十方齊廓落珠正有珠忽無猶存一念著吝惜即入三界纏空虛丹霞燒佛獨玩珠關南打鼓喜獲珠韶山心珠本無色大海龍珠同一如乾六爻龍六變潛見躍飛以次升飛上九天須一轉亢有悔在上九見無首在用九藏威在首不在身若到無時竟何有祗園佛闕里翁下土雖分兩聖域上天同是一真龍起伏龍行呈張元亮使君寸丹通九淵冷徹龍膽驚不眠掣關稽首玉帝前青霓影裏一粲鮮羣龍下走如奔泉電旗掀舞雷車旋怒蛟騰起纏陰涎四海五湖歸一髯黃塵白沙飛滿川頃刻變作聲潺湲何人此手有此拳斂散風雨麾雲烟一州千里十萬廛翻覆歉歲為豐年雲花繚繞金連錢使君倚鞚將朝天千珠萬玉傾箱圓夕陽捫腹秋風邊此時可懷不可瞻何不留取黃金鞭異蛇非蛟非龍奚為耶杳靄是蛇或非蛇軀如三丈中廬棟聲如二尺單夫車洶湧西來復南去激碎滿川波浪花爾等陸産殊水産亦有水産非其家平生康莊在菅莽胡乃出沒同魚蝦無何變化不俄頃野鴨凌亂揚風沙向來鱗甲渺烟霧但見浦溆連蒹葭立憑石樹踏莎草隄前隄後聽蝦蟇南山之趾西湖腹是日有物橫空拏一爪二角色純黑亂雲奔走相谽谺得非此物即此蛇是否恍惚空喧譁虹腰餘飛雨腳斷夕陽半閣西山斜登張安國右司官舍後閣東風吹塵暗城郭一見吳山增眼明文人筆力轉嵩華坐撫吳山毫髮輕向來嫵媚玉局老對公談罷猶縱橫參差萬象羅雙目奔走文場供約束東家粱肉西絲竹卻與青山作僮僕和游子明效李長吉體二首江楓搖落秋吹清吳波夜澄孤槳橫白蘋花老浪紋淺的皪背荷雙鷺明烟嶼雲岑楚江逺三更夢歸五更返斜陽影外逺山稠千里不遮南望眼樹頂參差山髻青漫漫秋浦無人行征衫塵土老歲月梧桐秋風桃李春水寒露冷蒹葭濕屬玉橫江孤影直波紋搖盡九秋香菱葉團圓水花碧聽談師彈琴君不能百步洪中裂橫竹一聲吹入秋天緑巨魚鼓舞碎明珠白浪軒昂動浮玉又不能多景樓上吹飛鴻哀絃欲斷滄浪風徘徊舟子駐不進江妃出聽烟溟濛不知何處得此薰風琴元龍六尺含蒼雲恐是嶧山孤峯絶頂上萬歲不老之寒根道人兩手提天機中有妙法無人知風顛雨急倐來往雨收風定游絲飛欲下不下窺魚鷗忽前忽後回波舟恍惚浮雲捲天宇錯落萬㸃飛星流世間萬法總非真況此假合非天成匣琴不出手無聲袖手不彈琴不鳴此琴此手兩無與問君廣陵賀若從何去王子有琴誰復傳無徽無軫亦無絃若人解得非耳聽為君試作無手彈題觀政池橋案此詩及游楊氏園詩當是孝宗乾道四年六年質在蜀時所作西徹秦川東劒關十有六州無間言威聲浩蕩流東南與大江水同發源節麾毿毿繡衣鮮剛風吹上九天門手從瑶宮掇明月貯在官池水不渾菱葉荷花淨晼晚舂鋤屬玉來頻煩冷光烈烈射地骨魑魅辟易聲煩寃牛腰抱去鳧行速來瞰皎潔聽潺湲玉龍蟠底抱竒寶獠奴試可呼崑崙洞庭青草似天闊灔澦瞿唐如馬奔不如我池有幽致寶奩平開秋露洗髙人未到已神融俗客若來應顙泚遊楊氏園幽芳秀陰似琅琊三四牛鳴通浣花少陵醉臥元不死强請起來殊更佳向來娟娟隔秋水誰與為期同在此德星分野到楊家亦有致然非偶爾蕭蕭騷騷詩韻寒腷腷膊膊棊聲乾澎澎湃湃酒波卷便便旋旋茶眼翻是日成都極炎熱此堂陰風下濃雪談端天地不支吾筆下龍蛇爭撇挒所恨江南在天末隔天鴻鴈難同飛彭蠡洞庭隔烟水他日豈不懷此時他日安得如此時楊家壁上更重題贈沈文伯沈公頂踵皆詩書如大國楚吞江湖平生瓊瑰三萬斛化作木鐵來侵膚霜臺柏葉夜驚耳大庾梅香春染裾世間萬法等一觀寧知憂患非歡娛三賢堂上一杯酒風流未減承明廬兩星熒煌耀南海化州老沈儋州蘇知公久間談笑口忍啄三尺不敢呼孟公故是大度士豈受譾譾繁文拘一朝青天返白日冰山轉眼成空虛秋鷹下鞲馬脫轡逸氣凜凜橫天衢蠻烟不折壯士節詩卷已作牛腰粗貝宮瑶胎貫月魄仙掌露華沈玉壺酒酣妙語一咀嚼舌根沆瀣如醍醐歸來清夢渺江海波濤一葉凌菰蒲十年故紙倦翻覆見此喜氣生眉鬚何當杖履奉君子看公快掃青松腴復和前韻小窗厭讀牛毛書徑思一葦航江湖英英山色著眉宇炯炯波光明髮膚清風蓑笠明月棹為我洗濯塵埃裾功名暫寄癡兒手烟雲且與閒人娛浴鳧飛鷺總相識近水遠山俱可廬東遊㑹稽略滄海西跨震澤窺姑蘇小官趨事苦奔走大官憂國多嗟吁幸今未掛衣冠籍浮家泛宅誰能拘天朝多士森列宿氐房奎壁牛女虛如公第一等人物故應䇿轡飛雲衢得印安用如斗大握筆㑹使如椽粗玉堂靜夜掣鈴索臥聽宫㸃鳴銅壺日閒剖茗碎鸞鳳霜清把酒傾醍醐記取江南子王子溪邊共立春風蒲及今未趨紫宸列尚容時挽張公鬚奚奴剩背古錦囊與公痛咀溪山腴又次韻眼前事事皆可書秋葉滿江烟滿湖霜風細織紅錦幄露菊洗出黃金膚山南山北躡飛徑步步藤梢牽客裾褰裳飛下蒹葭浦紛紛鷗鳥來相娛漁火深明隔橋浦炊烟出沒臨溪廬溪山洗斷鴛鴦夢犀箆不憶錢塘蘇百年日月走雙轂萬古興亡同一吁角鷹肯戀繡鞲穩野馬不受金羈拘功名貴富兩安用烏有先生并子虛不圖操筆賦清廟但思擊壤賡康衢何時再踏故山麓芭蕉長大榿栽粗夜疇娟娟濕翻露春林聒聒聽提壺魚肥不用去熊掌酒濁正是勝醍醐一區春雨熟瓜芋半溪秋水繁菰蒲侯門亦復憐稚子下狀不敢勞長鬚吾生一飽足已矣豈復過意求膏腴贈戴漁李氏小房何必廬顔氏心齊自有書吾衰久矣不復夢子歸求之師有餘千春杏花開闕里萬代風聲吟舞雩靜聽猶聞喚回也驚起不覺呼參乎茫茫空裏撮不得歷歷箇中殊不疏一㸃外皆閒事業三聲中有大工夫莫欺山東老王質撥醒江南窮戴漁若逢有眼但舉似漫敲此骨真何如能于靈府鑽三寸敢許孟門增一徒清風各自在何處明月相看元不孤他還見汝不見汝定是故吾非故吾用和游次公韻贈慧璉行到山深山愈青山青水青青照人水光易晝而難夜山態雖秋而亦春魚窠在水不知濕鳥翮憑空能自直霞綺橫飛總是紅浪花才起渾無碧再和示璉秋林秋葉無全青手先把者山中人不獨秋風早來到寒食清明隨立春倒飛斜日光不濕吹斷長虹影皆直娟妙全存慘淡中一寸不如一分碧倦繡圖短屏小鴨眠枯葦徘徊略住西風指佳人手閒心不閒腸斷吳江烟水寒凄凄空庭晚苔濕冷篆青烟半絲直卷簾寂寞滿天秋惟見孤楠一株碧送羅君舉首黃龍山色青琤琤乾葉墜寒林門首平塘泊鷗鷺吾與若曹都眼明海㑹幽銘掩清漢雲巖豐碑掣奔電一甌花乳一爐烟投地起來俱不見送張監稅歸去來歌君不見義熙元年陶彭澤偶纏秃綬稱長官俄揚輕舟作歸客蕭蕭五十年衮衮八十日縣令雖為百里君不似斜川臨流玩泉石公田雖收半頃稅不似東臯種禾滿阡陌後園之柳為我貯清陰東籬之菊為我發佳色濁醪妙理汝不知素琴真趣吾能識陶隱君張公子千二百年同一軌丈夫意氣當如此亦不掛冠神武門亦不還笏蓬萊陛盡展平生履歷書凌亂雲烟飛滿紙歸去來歸去來二君覺處真竒哉孔賓半夜呼將去李願終身喚不回子休矣子休矣取舍行藏都在已一往一來聊爾耳人生起滅半天雲世事浮沉一江水腰間帶不須束頭上巾還可漉南山荷鋤夕露晞北窗支枕凉風足酒具遮留栗里墟籃輿輕適廬山隅行將過且躊躇溪山雲月無今古試訪淵明舊隱居送趙師耳東風吹了落花天芍藥酴醿晚更妍典衣換酒正吾事不辭顛倒春風前胡為便作輕離别再拜忽成千里隔東君憐我太蕭條啼損黃鸝留不得我欲拖笻隨馬尾飽看廬陵好山水自憐憔悴縛江干去住未能隨意耳贈黃君君見雪山談晦菴晦菴南北隔山川有命歸來如二老不然隱去自三賢晦庵今年登五十鬢華未改目光力徘徊吳楚已多年晦庵不急蒼生急君行車馬衣冠衢亦有晦庵相似無君臣慶㑹第一格晦庵何日何時須橫渠雖沒尚可作平生此事喜商略君當長跪問橫渠子細平章句教錯大江朔風多湧波上江下江且婆娑古時賢士一時有奈此庚辛甲乙何黃君來過談士大夫甲乙及晦庵為詳所從之游者如此不凡可卜也君子通老端明為族孫故有士子風格云案朱子年譜生于建炎庚戌此詩當是淳熙六年己亥所作寄題陸務觀漁隱案此詩當是淳熙七年所作乙酉務觀二豫章書來告曰吾登孺子亭見子以詩道南州髙士之神情竒哉吾巢㑹稽築卑棲號漁隱子為我詩之蓋自是參差契闊相望動萬里又十六年務觀部江西治臨川又以書來驚嗟然諾之爽乃亟為之僕未嘗渡浙江安得識漁隱且久不見務觀弗克問其何如故寓諸夢以為之辭然心目皆往來于此常弗忘也寫真小軸偕之置在漁隱之旁與觀溪谷雲月之竒所怍其語鄙其容陋塵埃名勝之區為山川之神所卻或使周旋其間亦未可知也昔寄語他壤多矣未有以傳神俱者也此段風規自王景文始漁隱漁隱在何方海門潮白江沙黃吾嘗袖手江之旁西興草樹烟蒼蒼欲往從之道阻長波濤澎湃不敢航仰觀河漢翔鷫鸘安得與之俱頡頏得非蘭亭㑹諸王清湍茂竹聨崇岡無乃鏡湖留知章蘭蘅風露生寒凉不然此地何鏗鏘宿昔名勝沈光芒俟今焜耀名方昌恨不登時到侯鄉循墻三匝徐升堂觀山觀水觀松篁以及魚鳥同徜徉而俟南益仍西涼青霄空闊橫參商無繇交臂咨其詳鴻雁同天不同行愛而不見魂飛揚夢從縣圃周扶桑逢迎跪揖如平常齒牙砰磕搖風霜秦漢魏晉周隋唐江河滚滚傾興亡指畫所隱聲琅琅歡喜竒特不可當繼以驚愕懷慞惶倏忽烟霧輕騰驤徑跨越嶠超吳瀧秦碑禹穴稽山陽隱約中有神仙莊申椒菌桂連沙裳江蘺薜芷多同芳春風淡沱秋風香木蘭冠佩芙蓉裳杉烟竹月無時荒白蒲青荇春悠揚秀似黃家雙井塘雄如蘇老峨嵋江冰壺雪甕涵瑶漿夢回空闊嘹天篁縹眇羽客搴雲纕清都飛露寒侵腸涕唾塵窟掀翻牀俟其與世毋相忘且為清明開吉祥蒼生環堵棲平康是時桐渚尋嚴光否則孺纓濯滄浪不然楚竹然清湘下乃汀花靜鳴榔間騎麒麟翳鳳凰玉京羣帝參翺翔吾在風埃渺相望大千世界空茫茫贈楊溥豐城何以多英賢老杜曩有浮雲篇名季友者天下傳與吾偕出緱山仙豫章尚有豐碑堅萬古千秋不敢鐫卻距季友五百年星辰不滅同其躔致君逸氣常蹁蹮風后力牧參吾前往往劍氣騰衝天季者太阿仲龍泉斗牛河漢光相鮮雷煥安得知其然西山北巖埋蒼烟不及華陰玉井連延津雙虬終蜿蜒恨我不識張茂先精神胡為暗式乾案此句意義未甚明曉考晉書張華傳有式乾殿進諌事殆謂華既得豐城寶劍仍不能自顯其精神于式乾之議耳溥也疏骨粗繒纏叩門剝啄音清圓詢之與我生相聨同在豐城南北廛五行七曜難拘攣瑶環沈隱塵埃邊髙談雄辨波潺湲僂身縮手不敢揎揚徐李呂紛蘭荃雲溪獨造珞琭淵此曹可收不可捐康莊固有英豪潛溥也可惜真酸寒沙頭靜鷺清聨拳松梢野鶴飄孤搴合在林壑栖空禪否則江湖烟雨舷二者汝亦難當焉斗米三錢汝萬錢菜根墮葉如凝羶他時六版無兩肩枯蘆半席汝亦慳我亦自笑骨迍邅有時揮麈敲哀弦汝談我命五者全略與庚午相周旋我忽大笑汝失言魚水若得庚午權豈肯草草為江南功成名遂飛翩翩不作子房作仲連澤州叔寶令人憐長跪告别趨吳船無瓶無鉢何論氈觚稜金鏡射玉璿有見問者勿面謾但實告之灰不然别有一路非人寰王癲來處從溪癲狐踪不入象王圈驢乳難霑獅子涎臨濟飽受黃蘖鞭三鞭躍上層霄顛一喝一踏成平原後來三傑勤演端佛日霹靂天關三足搖驢兒八角盤駕雷驅電馳奔湍明月堂中一覺眠何時法鼓聲闐闐今其去兮風方顛大江茫茫雪滿川蓴鱸興盡撑西帆倘欲見我江淮堧不在廬山則祖山送施丙卿案此詩當是淳熙七年所作嗣宗仲容天下無施家更與阮家殊舍人騎星上天衢令君抱雲守仙都氐房奎壁牛女虛豈肯使人清暉孤舍人桃李將吹噓青青白白并朱朱子昔緑水敷紅渠速謝香火歸諸胥元豐歐陽元祐蘇黃朝張秦皆其徒子所標凖前規摹䇿勳豈不真良圖甘王樓下百日餘展盡胸襟渺江湖今年大燎然洪爐獨此冰玉涵秋菰玉山玉水清而腴山南山北多仙廬居仁寶玦敲珊瑚吉甫金碗傾醍醐山東文豪尹大夫銀河赤岸通方壺三山仙伯飄飄俱端明殿老爭摶扶子乃奔軼攀其鬚明月在天不可呼掇拾墮黑雲糢糊三台北斗韓尚書芙蓉旌旗駐飛車低挽鳳凰追鯨魚髙搴麒麟起玉除定不遺子鮫人珠宜春宣曲驂皇輿尚書許我能起豫飛黃一向拋蟾蜍不識尊意今何如四十有六垂桑榆西湖寒雪參清娛飛瓊砰磕波文粗卓玉稜嶒山骨癯尚書尚書切勿疏我久寂歷西山隅尚書擊鼓羣龍趨我豈不解吹笙竽青楓紅葉秋風初風聲獵獵搖江蒲矯首河漢且長吁與張安國圍棊勝者命題負者賦詩作藤枕歌平生屈盤在空谷髙韻清修疏節目上凌幽巖冠松頂下入寒溪捫石足觀君眉宇含風霜豈肯展轉蛾眉牀西齊一榻淨如水何如與我同臥起客子倦遊思故鄉歸心往來鷗鷺行夢中山川不識路慿君推挽過西江竹夫人歌君不見黃金屋裏貯阿嬌咳唾隨風飛九霄寵極妬深恩愛絶長門畢竟成蕭條又不見明妃千載居深苑年年不識春風面一朝上馬出君門萬里關山紫臺逺來來去去春空絲鶯鶯燕燕能幾時百年不辦専房計萬事翻覆仍難期豈如道人青奴元不惡金蠶玉燕慵梳掠眼眼相看似有情誰念佳人翠袖薄迢迢良夜款相親玉窗冰簟夢無塵西風索索暫别去一歲一回重見君重見君猶勝姮娥不嫁人送空上人歸育王生涯挑上古藤梢歸心飛渡鄞江潮長安貴人足官府不似育玉山色髙山前山後松風岑一衲無塵雙蹻輕月寒濯足半溪玉日淨穿林兩袖雲吾生浪走踰千里天涯踏破青鞋底誰令插腳墮紅塵只恐愈深收不起千載此山端有期翩翩清夢隨君飛他年拄杖叩泉石莫認此翁作生客贈僧師能稽首十方大醫王乞我太素靈樞方無朱無墨無文章不用桂术參芝香亦非山澤川原良非丸非散仍非湯勺撮銖兩何能量尋源不出羲農黃岐伯伊叟無交相而況韓孟陳吳楊韓保升孟詵陳藏器吳普楊損之一切靈府常含光不屬心脾肝膽腸倏忽六猴窺六窗心花撩亂空飄揚三界六趣橫顛狂六交十習紛踉蹡中此疾者何茫茫爾出何䇿能相當此魔跋扈真强梁汗流盧扁走且僵眼亂孫陶驚而蹌溫寒燥濕翻陰陽君臣佐使徒慞惶我發刀匕非尋常應證取效無參商臨濟一擊雷橫撞德山一喝龍騰驤荒郊解使枯骨强龍盤虎繞嬉迷藏明月堂中啓祕囊一服甘露玻璃漿大千世界都清凉此藥亟咽不必嘗一粒中裹千金剛炮爁炙煿誰精詳聽取露柱聲琅琅西泝江漢浮瀟湘呼將石人撑鐵航藥囊拋向江中央長風落日雲蒼蒼能精醫邂逅有竒功雖雜學禪門所訶然挾醫飬道猶有愈于其他也贈南道人露水班白未全白長江大湖喜為客西風漸少北風多腳底路聲行格格一袍兩蹻都無餘腰間一二三葫蘆生涯如此秖如此如此如此無他須紅黃瀰漫雜奔走觀旁亦有可人否公卿將相總不問蓑衣鐵拐豈無有青山緑水逢迎時亟來相報令吾知戴起一頂青蒻笠拖將七尺紫藤枝因緣渺茫多阻隔斯人吾前亦不識且吞溪玉濯心神更攬月輪摩眼力摩到無明醉夢醒挹袖拍肩須有人贈開懷道人開懷道民以隻履為標榜鬻命資身其曠達妙趣有起人者達磨隻履投西歸一隻乃為汝所持汝持此隻將奚為十方三世包無遺大撓十干十二支衍作六十花參差釋迦佛亦不出斯丈六身外還屬誰七十九年略可推無始劫來何從知可滿盛著琅琊兒任汝胎年月日時烏窠披上粗繒衣龍尾引入黃金墀平川袤野觀游絲東西南北隨風飛水流雲在俱遲遲凡度眼者都忘機一物今古長光輝無頭無尾無骨皮無男無女無妾妻無肝無膽無心脾大率一切皆無之太空赤立孤悽悽珞琭忽見全如癡何況呂李楊徐奚我命居申西南維我身在未正直西臘月三十日到來此身此命成煙霏捲起卦盤收卦棊梅軒共看花陰移雪山集卷十二
