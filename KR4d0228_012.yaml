body:
  text: 雪山集卷九宋王質撰啓代通王制置啓奠坤軸於西維藹著金城之譽奉雲章於北闕遄歸玉筍之班停鷁首於江干望斗標於天末雙鯉驚傳於尺素五雲喜近於三台恭惟某官千載偉人萬夫重望大圭不琢質涵天地之純黄鍾為宫氣韞隂陽之正文彩步漢唐之上風流及晉宋之間峙冰玉於螭坳見之屬目演絲綸於鳯闥聞者動心四方於申伯之宣九命作周官之牧幅員萬里歡喜一辭身留玉壘之偏聲徹劔闗之外版圖盡入見黄河天上之源鉦鼓不驚下滳博雲間之戍總蜀部纔幾於再閏兼武侯僅數於兩人尚韜游刃之餘未及叩囊之㡳戎行小駐鎮崑崙萬國之西册拜殊榮將特進羣公之表某久淪潮海絶望盛明偶叨半竹之分符適際介圭之入覲見紫芝之眉宇昔嘗覩於英資望芙蓉之旌旗今再逢於仙馭代張守謝張都督啓案此啓當是孝宗興隆二年張孝祥守江州時所作持部使者之權弗能將命視古諸侯之秩遽起為州悼擢髪之罪盈感噓枯之徳厚伏念某智非語上才不逮中曽大道之弗聞致危機之數蹈徃墮司刑之密網實䝉太上之深恩寛其九死之誅賜以再生之路用之禮樂惟難稱於光華畏此簡書粗服勞於奔走終坐才疏而意廣弗知福過以災生至身擠淵谷之危殆天奪神明之鑒置尊拳於雞肋何以當之厝烈火於鴻毛必無事矣顧惟么麽安用誅鋤既偶逭于嚴科苟自存於餘喘塵凝滿席秖圖飯飽以從容門設常闗不問客來之剥啄聴蒼狗白衣之改變任雙鳧乘鴈之去來䄂手旁觀已斷不談於世事纓冠徃救未能絶念于鄉鄰但虞覆轍之車幾作傷弓之鳥敢謀更始猶使治民惟九江據水陸之衝當一面受襟喉之任時維東晉視荆豫以分權嵗紀紹興兼舒蘄而授節豈容重寄乃付陳人此盖伏遇某官道大無方功髙不伐充徳量以乾坤之廣霈仁恩於河海之深憐不諌之前非規未來之後效欽惟舊徳載遇榮期鎡基不如待時正飢食渇飲之日天地亦各從類乃風虎雲龍之辰兼收羣才共集大事自揣不堪於一障何能有補於萬方某敢不運甓苦形飲氷厲志提封千里當撫摩凋俗以安居飛櫂百艘更鼓舞壯夫而効命上晁制置啓案此啓當是孝宗乾道四年後所作十年而受坎壈殊無宦情一旦而得依歸頓有生意以半生之齒髪與百指之妻孥寘在并包之中託為生死之所某之平素公所照知無内美與修能有靈均與正則日遒盡而羲和不容於弭節路曼修而望舒不亟于先驅伏念某神交吴下之一書心醉漢中之數面以此決䇿翻然委身恭惟某官綱維鼓舞之神而應以無方負荷英豪之氣而御之有道宏知馳騖於鬼神天地之表博學經緯于帝霸皇王之間三代有其人至秦漢而不聞六經有其事更荀揚而弗著豈謂當代乃生斯賢雖祖宗積累之使然亦期運推移之至此顧兩宫未滿之願與四海同然之情有大功名終落公手凡今人物誰同此心儻不鄙夷願相料理恐事於此去矣庾征西至迫殷浩以見從其肯為我來乎烏大夫猶慮石洪之不至凡今日全家而求託盖平時慕義以來歸惟所控提以之奔走頗有如此客固未足以滿懐乃能駕馭卿亦何患於無勢行將斂板豫達空函逢迎有主人都無遺恨跪起如子姪曷敢不恭南樓夜月之據牀北地秋風之分檝老子有興之際癡兒了事之餘詠紅蓮緑水之風流望黄色赤雲之氣象容司馬之狂於方外敢以此施於嚴尊誌書記之名于壁間庶來者得以觀覽謝四川制幹到任啓案此啓當是乾道五年後所作萬里中州之宅曾無隙地以少留數仞宫墻之門夫何窘步之得入某贅疣昭代露電半生與其放浪形骸而溘死於江湖曷若收召魂魄而來歸于豪傑依魏國者半載事虞公者期年若問所從之誰足以無憾於此惟我三朝之彦友於二老之間無日不可無公託為司命在晉亦猶在楚敢有他腸恭惟某官負斡旋乾坤之才而損至于無挾籠絡宇宙之志而空諸所有故能折節下士至曲拳擎跽以服勞推誠育才與無故俱存而同樂惟來歸之本意久屬慕於先聲欲遺以芳馨悵莫知美人之何許欲贈以瑶玉恐不稱君子之所思雖一再面以相逢盖千萬心之未吐來期官守甘作庭趨過䝉綢繆繾綣之私頓解躑躅沈吟之抱優渥之恩足以融物使窮塗有更生之歡恢洪之度足以感人使㣲軀有輕死之決念平昔艱難之多阻坐此生偃蹇之好修荃不察兮余忠蓀何似兮愁苦登白蘋而聘望則嫋嫋秋風之不可禁搴素華而習芳則遲遲春日之不可度倚結軫而太息攬騑轡以徜徉方四顧動泣岐之悲忽三匝得依枝之所蜀道有時而或易豈復興青天之嗟王孫何事而不歸未能忘萋草之恨暫違幕府往訪庭幃樂莫樂于新相知雖于義頗傷于去速怨復怨兮逺山曲然所親久念于來遲盡家室以相攜託門闌而終老成都萬事之好未免吾廬之少歸巴東三峽之長誰勸北人之莫上賀晁侍郎敷文閣直學士啓案此啓當是乾道六年所作地開井絡肆疇鎮撫之庸天麗奎躔増重邃嚴之直竊以弓劍歸於永固訓謨秘於敷文既已有山君海王裒對以䕶昭回之光又當有地靈人傑典領以鎮神明之蔵偉五百年之名世統十六郡之提封雨潤松州不覩夕烽之到雲浮玉壘常觀春色之新升華河洛之上游改觀岷峨之福地去天尺五低迷接雲漢之章在殿西南宻勿近山龍之象恭惟某官羣公事而弗友萬乗學而後臣莘渭尚有英靈驚九原之復作漢唐豈無俊彦覺千載之無光過周公居東之年而不歸比山甫徂齊之役而差逺安知上意葢有淵謀嶓冢之蕩東流將以據襄陽而䠞操劍門之石北向將以率益州而出秦古今未了之功名豪傑難成之事業渭上雜耕之志既格於徃日富平大舉之勲復隳於近時誰留啐啄之機付在經綸之手把命珪兼相印胡可無桃林賀捷之詩躡區落焚龍庭胡可無燕然勒功之頌自量不敏未敢輕辭既適當泛水以依蓮寜不願攀鱗而附翼有如此客於公固未足深誇問所從來在某亦可為幸會㣲生多難薄命少逢精神喪于言語之風波意度靡于飢寒之湯火寄百指夢魂之外山川修阻而音希過平生道路之間風雪創殘而力竭磨成老態彫盡宦情今兹自力以上來所望乞骸而歸去雖進退豈不在已但當師心以行然死生既以託人敢不惟命是聴政使處山林之下何嘗隔造化之中惟期早定於中原俾遂生還於東國白摧朽骨掩纍纍先世之阡紅皺曬簷剥纂纂故園之棗姑因贊喜少控由衷繼此有陳期于得請上王參政啓案王參政名炎此啓當是乾道六年後所作南極一星厯荆揚而西上長城萬里䕶江漢以東流冠兩班文武之崇分萬乘旌旗之半繙路朝之顯册卿士從而大同灼太廟之元龜鬼神依而協吉時際君臣之㑹情均骨肉之親二人同心洽金蘭之契一日不見覺嵗月之深暫命徃釐亶非得已大禹征苗之役未㡬而伯益已贊其班師仲山徂齊之行無何而吉甫式遄其歸覲想二臣濡轡驅馳之際使兩君馳神寤寐之間欽惟列聖之相承益重大臣之出使文潞公之帥河北及闕下亦正大昭文之班韓康公之莅陜西即軍中而頒左僕射之詔於皇太上既及今王亦遵令猷以待元老忠獻張公之至即次趙公而秉鈞仁夀虞公之還行與陳公而竝位案以上言文彦博韓絳張浚趙鼎虞允文陳俊卿原本忠獻之獻訛作憲今改正公居此地前有成規恭惟某官以伊尹之一徳而闡幽以周公之多才而應變照臨四海以羲仲之日鼓舞萬物以老子之龍多厯年所而囘翔不終日間而契悟我見魏徴自比於匠之礪金孤有孔明不啻如魚之得水山雲之出有開必先谷風之生同聲相應五百年必興王者有名世焉而居其間九五爻利見大人有親上者而從其類盡闗天數非出人謀總二火以制名符國家之運氣賦一壬而定命合主上之天元上帝賚之以澤生靈聖祖遺之以貽孫子恢洪百度疆理四方文法技巧之精有黄龍之象車馬噐械之備有東都之風忽千載一時之相逢將三光五嶽之復合祖宗有訓宰相當用北人周漢以來太平多從西起惟桑梓之名邦曰相而衮繡之先達有韓載生我公益懋其美實河朔英豪之彦有雍梁形勢之區人與地以相當古至今而莫竝渭上雜耕之志既格於前代富平大舉之謀復隳於近時留此功名付公掌握劉當興而李為輔時將至則人隨之來秦易并而羽可圖謀既定則事從以濟纔覩行臺之建即知昌運之開盍使孤生預觀盛事豈無他人不如同姓偶受氏列宗盟之中既見君子實獲我心願終身依門牆之下通宣州許侍郎啓繡幢畫㦸占大藩鼓角之雄緗帙縹函通寶殿圖書之秘鬰五雲之多處居千騎之上頭敢掣鈴絛載馳書牘恭惟某官量涵海嶽氣塞乾坤孕楚東山水之靈為天下搢紳之選宏圖甚逺摶九霄鵬翮之風獨力不摇扛萬斛龍文之鼎雖未見紫芝之眉宇固嘗聞夫子之文章月斧風斤驅英辭于筆下籖牙軸錦落佳製於人間數端事業以兼全近代人才之未有惟疊嶂雙溪之形勝有一王二謝之風流不忝此邦亶惟今日控赤鯉之駕行趨覲于天皇踞白龜之城暫鎮臨于郡㑹某素無竒操喜慕英游周旋諸彦之中奔走盛名之下四海習鑿齒蹣跚絶望于亨塗一識韓荆州晼晚終酬于素願麥秋清淑棠䕃靚深願調六氣之宜用慰羣倫之望代通鄧安撫啓元戎十乘遥尊節制之雄列國一同仰庇帡幪之大曽未遑于守屏敢先達以空函恭惟某官識貫羣宗才周數噐大圭不琢質涵天地之純黄鍾為宫氣韞隂陽之正九命作周官之牧四方於南土之宣養以雨風春入窮𥜗之煖去其蟊賊霜侵姦膽之寒刑徳竝流武文兼濟觀所謂滕王閣暫看孤鶩之飛趣駕之未央宫行從六龍之御某仰韓北斗頼楚餘波弓服矢房阻聴命旌幢之下物華天寶第馳神翼軫之區通司馬守啓風聞上徹亟辭芸館之清班天度隆寛尚畀芹宫之舊物適𤓰期之已及望棠舍以非遥行修斂板之恭豫貢空函之贄伏念某闇而多蠢疎以近狂始縁畫餅之虛名旋致索瘢之巧謗舟離蓬島悵紫芝丹草之難逢路失桃源想流水落花之故在望千門而駐馬豈一飯以忘君紫陌尋春敢避紅塵之撲面青衫獨往翻愁白首之闗心雖銜去國之哀未替憂時之慮每切纓冠而往救何曽䄂手以旁觀自憐牛馬走之㣲誰念蟣蝨臣之意園蔬未鞠幸叨倚席之閒茅舍雖荒且緩來歸之賦益逺長安之日徃依刺史之天楚客悠哉久恨佳人之隔魯侯戻止將陪采藻之遊恭惟某官學詣真源才周數用繼元祐宗臣之轍為紹興循吏之師鏘鸞佇聴于來歸外服豈容于越在紫宸戸外即觀淑景之移雲夢澤南姑借長城之重及鋒車之未至尚賔閣之可窺得所歸依忘其流落自身罹于坎壈彌念切于氷兢耳喧牀蟻之牛音目眩盃弓之蛇影仰憑徳度俾逭官評儻䝉長者之知甘受欺予之笑本無怪事曽何咄咄之敢書但乏酒錢所頼時時而頻與代回晁知郡啓人生五馬方傴僂以辭榮客遺雙魚仰輝光而拜賜雖重私心之媿亦増老眼之明伏惟某官共謂通才亶惟佳士必復其始是為天道之常能世其家未斬君子之澤豈有海涵之噐即安斗大之州合殿春風行玩紫宸之淑景譙門森㦸寜須燕寢之清香某衰謝窮途欹危小器雙鳧乘鴈本何係于滄溟錯貝文羈偶復加于病顙惟兹冒寵定自噓枯曾不崇朝將快争先之覩安知為政更資樂告之忠代回鍾知府啓已受二毛難勝五馬之寄遽傳尺素逺致雙魚之勤目為增明心知自媿恭惟某官受才膚敏禀噐渾成學術研精已詣淵源之極吏能絶俗亦推土苴之餘攷所至之能聲實今時之良士清華髙選冝居元都雨露之邉勞佚相均暫憇廬阜烟雲之下某從遊惟舊託契最深聮伯氏以䇿名因感在原之急代淮壖而丞郡更嗟㑹面之難中更多故之百罹行對故人而一笑擕河梁之手久漂泊以離羣共燈燭之光幸從容而道舊代通王總領啓序諸侯之上仰瞻禮樂之華攝大國之間幸𨽻轉輸之部入謁尚遥于賔榻修辭敢後于齋鈴恭惟某官徳廣無津才全不器斵鼻有運斤之巧解牛無游刃之難六路提封居海内幅員之半三軍宿飽盖胸中經濟之餘共安枕席之行師豈慮樵蘇而後爨留闗中之丞相果成髙祖之功用范蠡之計能終雪㑹稽之恥行膺渥寵入踐崇班某濫分銅虎之半符遥跂繡衣之直指雖風便不踰於一日然雲從徒望於三台方當公私竝立之時難圖近效儻有洒掃不勝之咎願賜隆寛回李知録啓一衣帶之水方馳想于修途雙鯉魚之書遽驚傳於尺素無以下體先于匹夫鄰里聳觀子孫用寶恭惟某官維時吉徳為世聞人略無瑕疵粹然操履之迹具有本未卓哉踐揚之勲尚窘步于修門肯卑飛於下國天子命我參卿事勿言州縣之徒勞宰相安得失此人但患富貴之來逼某隨縁林下絶意世間野渡舟横屈指數濟江之日公家事了放懐為同社之遊回嚴敎授啓王文公之故里常預瞻于萬蟻戰之場甘將軍之舊封幸相望於一牛鳴之地星移物換十有六年目擊道存百無一恨惟慙客遺于尺素重嘆身先于匹夫恭惟某官道韻閎深文機妙密學問出漢唐之上風流在晉宋之間將飛舉于木天稍低囘于芹水範模多士坐進百能之千敎育英才是居三樂之一凡兹同志自以得師某䕃宇俱空書癡未暇既已得見君子斯可矣未必尚論古人而友之動春酌於燈前時赴鄭老同襟之約立諸生于館下願聆韓公進學之辭雪山集卷九
