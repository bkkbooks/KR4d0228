body:
  text: 雪山集卷十五宋王質撰五言排律挽虞丞相一徳風雲㑹千秋海嶽靈中涵天度量外峙玉儀形人物如三代文章似六經嘉謀調藥石偉望振雷霆二水盤明鏡三嵎揭秀屏天心開俊傑世路化畦町采石交綏急時金人親督衆渡江鋭甚參謀攬轡停公時為参謀勒兵督戰却之舟中掬晉指屋上建秦瓴帝座憂回喜邦人醉得醒江聲鳴歴歴圖畫儼亭亭有畫采石戰圖鬻之者公儼立山巔旁標曰虞舍人蜀道馳宣詔函關寖啟扃公時宣諭川陜希文初遇吕平仲卒逢丁旋以異議易鎮䕫直北烟都歇居東雨載零野隨裴令緑竹為武公青宇宙傾風采朝廷遲典刑公罷政甫至仙井即趣召三邊頻仗節公為江淮荆襄川陜叅謀制置宣諭宣撫凡五出使七府遍移㕔公為同簽書同知知院及使叅政左右皆遍厯堅重車方軌光新刃發硎事融湯裏雪物轉手中瓶杞梓充庭茂芝蘭滿甸馨公當國推挽賢才甚衆今所用多其賓客也寶奩森漆栗藥籠富參苓幽士寧悲鵩該儒總識鼮輸懐情繾綣接語步竛竮公當國接人務盡其情或至跛踦而公不倦也巖壑多空帳江湖少帶笭姚崇資倜儻葛亮意丁寧秀氣横連霍洪恩沇溢滎徳威馴虎兕道力化蝗螟烽燧寒邊堠桑麻蔽逺坰農熙牛􅋾􅋾兵勁馬駉駉雁澤寛心駐西北来歸之民數萬口賴公以安龍沙側耳聴敵中聞公姓名輒變色令諜者潛摹公像以歸觀之檄囊停插羽綸閣緩搖鈴周廪仍多黍堯階再産蓂長楊荒御宿茂草鞠虚囹忽化雙林火俄流五丈星更生游佛國有人入㝠見先太師為更生佛中衛立仙庭陵寢稽朝洛王師寖度涇蕭何雖鎮蜀韓信未踰陘鶴踞新華表鯨歸舊紫溟月明空皎皎風逺但泠泠蚤嵗䝉推奨多時備使令盤飡傳舴艋公航江入蜀視師乘小艇公舟時傳嘉飱餽之茵吐濺篁箳嘗元宵侍宴醉吐公探囊發藥餌之追琢叅羣玉調和作五鯖公不鄙數以清貫處之自從悲殄瘁誰弗念伶俜道路紆脩阻音塵墮杳㝠口呿惟墨墨頭㸃自惺惺髪白心隨老燈青目不瞑有聲號井絡無路挽車軨睿意思元老徽章播大廷雲臺先鄧禹烟閣重房齡未解聨温贊何勞勒固銘公以文章見期然未有以報也孫多騏驥骨子悉鳳凰翎公之子學問道法皆茂生死雖無憾哀榮不忍聆一從雲隔漢兩見水漫汀别公二年而公薨得公書前未薨十日手澤也其略云景文之身可以升沈而文章不與時髙下哀哉飛夢風翻絮浮生泿捲萍西塵黯沈日雙照淚熒熒興國視蜀門為西五言絶句燈花造化管不得要開時便開洗天風雨夜春色滿銀臺團扇歌鸞背如花女出自咸陽宫不愁無主愛惟怕見秋風竹夫人二首夫人承主愛不在鴛鴦幃庭楓飄一葉滿眼貯秋悲洞房暗薫結誰作雙蝴蝶夫人獨自夢清露泣寒月七言絶句上虞相行春口號十首賓從行間錦作團相公馬上玉為山今朝除却西湖好天下無春似此間馳上平岡小打圍相公自控紫絲鞿一鞭揮出三千騎驚動流紅窣窣飛蝶整鶯齊不亂飛好風吹雨上花啼和寧門外沙如雪且向江堤試馬蹄團紅碎緑罥絲飛不敢輕輕觸衮衣正欲辭春春未許且教留待相公歸暖霧昏雲養麥天春風引緑去綿綿種成百萬軍民飽忠孝心頭一寸田浪縠髙張碧四垂游絲欲下不能低斜陽却恐花成睡只在天邊未肯西雲空玉宇降重重匣面雙蟠小戲龍夾路繁花香到骨不如天上紫芝封近口屡有宸翰之賜暗黄退栁緑厭厭長與行人駐别筵傅説歸朝天下雨不如休繫相公船嬌風悄悄日晶晶只見花光不見塵行過津頭旗轉脚萬波吹動碧鱗鱗是日微風過浮橋始大作遥指吳天背蜀雲峡波小緑作微皴西州寒食清明了猶見檀心上苑春效竹枝體有感四首来時梅花繞路旁祇今壓枝梅子黄回思孤徑踏斜月冉冉馬頭迎曉香石橋直下槳雙横落葉漸低湖水生歸心欲寄潮頭去潮頭不肯過湓城斜風急雨暮瀟瀟更與客懐增寂寥樹頭梅子未全熟莫来牕下打芭蕉江南烟雨梅子肥稻針刺水青離離江南風物亦如此所恨情懐非昔時即事桃李隂隂子滿枝春心宻意兩忘機無何一㸃流鶯過驚動楊花簌簌飛夜泊荻港二首落日人家已半扉隔籬問答語聲微桑枝亞路蟬争噪一似南村割稻歸野火參差度暗光蕭蕭蒲稗自生涼夜深雲上無星斗古樹隂沈覺許長次虞樞宻九日登髙韻滿擬重陽醉菊觴花時多已過重陽年来莫是無知己未遇淵明不肯香問王稚川借其父承可詩二首侍郎墓檟已蒼蒼萬古江河一錦囊杜老平生憐驥子不將衣鉢付他郎集中有憐幼子詩謂稚川也百代風流集豫章娟娟各自作時妝誰知索虎鉤鯨手傳到黄家便到王夜坐起贈范西叔何子方濃淡雲中月吐吞寒枝驚葉動烏蹲青熒一㸃無人對賴有西風為掩門贈李時雍平生飽識世間愁牢落江南盡處州插架有禾三百把與君来往亦風流集秦國文恭公句壽胡正仲四首絳霄别有大羅天題洞真觀鈞奏聲沈帝所閑上元禁樂嵗晚政成丹詔下集賢石學士守符離水蒼朝珮響珊珊和曼卿館中夜直玉蟾清翰待君揮送陳澤歸吳興五世嘉占得鳳飛送吕解元江隂禮席朝野多驩天子聖暮冬離京便應調鼎向黄扉和承旨宋尚書君在東南第一流送李供奉歸闕緑綈應檢出神州送杜學士知明州舉頭試作長安望宛陵秋晚昨夜靈槎近斗牛送秘閣張學士二浙提宫三殿觚稜照綵霓漢宫星郵傳語紫芝泥送李舍人歸闕休論萬里封侯事題雄州射亭此去青霄别有梯公子送徐聖可十首此州斗大故為慳金印如之足解顔他日低頭看屈肘亦思王老住胡灣某所廬在胡家灣古云豫州如斗大又云金印如斗大故併取以寄意云元素當年㑹子瞻山三百疊故依然風流文采徐楊並所欠賓朋似往年蘇子瞻過楊元素時元素守此邦送至石田子瞻有詩略云溪上青山三百疊快馬輕衫来一抹君玉風標世所希日臨小閣瞰清池君来已隔元豐夢鷺静魚寒尚往時王君玉元豐中守此邦愛滄浪亭有詩畧云魚寒不食清池釣鷺静頻驚小閣碁此亭猶在一陳一葉此横飛飛到清霄總不遲東海月輪今又滿履綦安穏上丹墀陳子象葉叔範皆自此滿秩登朝以至崇班古云徐徐東海出漸漸入天衢此夜一輪滿凊光何處無東海徐氏望也吾知昭徳眼通明君與渠家最有情何况蜚聲滿黄閣定應倒屣笑相迎晁子公侍郎識趙溫叔于未奮而君與晁有連丞相相知亦以此故君到長安見侍郎定咨老子鬢毛蒼為言薜茘藤邊事一局棊収又一觴芮國瑞侍郎往櫂舟相過于東林棊觴酒薜茘回仙事也文康伯仲見昌黎杜詩伯仲之間見伊吕傳到雲孫又過之君見小坡應記憶近香亭下啜茶時葛楚輔正言嘗和某詩略云我家文康公世謂昌黎韓某數榜舟訪楚輔寳溪對談書齋周游花逕荷不鄙夷也近香園中亭名東望苕溪想月卿尚懐泉石養精神倘于歸雁亭邊見為道陽關有故人沈徳逺少卿與某同登不見今八年時領毗陵也寳溪同社兩齊年一落江湖一上天試問吾兄應好在何時再拜玉階前沈子壽編修與楚輔皆文溪為命今子壽尚棲遲子壽于某長一月某命亦文溪也故以兄稱卷雪樓前欲放船滄浪亭上且扶肩他時一月同千里江漢吳淞共拍天贈畫工我無頭上進賢冠祇帶儒生一味酸願向筆端求蒻笠桃花春水把漁竿寄峡石老人白沙渡口見鬚眉袖角槎牙出好詩願得揚舲秋水去共看明月墮琉璃題大浩寺漫山竹樹結清深古殿荒寒一兩燈但有菜根隨粥飯老夫請作住持僧題真如寺詩舊紅新緑都如許塵世何曾有定春晚渡野航衝雨去今朝佳處總吾人月下看古碑唐正元間物也泥土相纒四百年摩挲十在九彫殘明朝义手東西去更有誰人月下看題李白笠釣圖龍子梅粧釣笠前脱鞾豪氣總蕭然一絲来往茫茫碧不記開元後幾年題竇伯山小隠詩六首栗里柴桑事事無但言吾亦愛吾廬掃開秋草門前路恐有觀潮訪後湖深衣緇縁古風標不用横飛上九臯且伴寒泉薦秋菊水仙王亦是吾曹蒲稗蒹葭宻擁門無風亦自有秋聲烟塵齊魯今何在下雉陽新有兩生山澹雲濃間有無數牛鳴外接匡廬甘樓亦有鴟夷老左右盆山即五湖瘦水微皴漸復槽秋楓脱葉下江臯王楊慮駱青㝠上不廢江河廢爾曹秋草空繁不識名秋蒲雖脱尚能聲君行愛護青鞵底行到山空恐路生題薛公肅西湖問梅圖二首茅屋荒寒篝影昏口心相應共花論山橋野渡香凌亂君在江南我劍門人眼心花總不昏細從烟外月中論孤山疎影横斜處今有珠樓鎖翠門舟中題石母洞前潭中玉犀石玉犀玉犀是何物白玉鱗蹄水晶骨珠宫貝闕不勝寒夜来走出蛟龍窟黄制幹坐上題墨竹扇自有清風風不吹雖無明月月相隨此君不可無一日奈有霜寒露冷時和黄少譽緑萼梅緑毛么鳳仰衘花不在山椒即水涯昔日鬢邊能似此春愁磨盡總成華問查元章覓龍團茶詩戲龍頓㫁天門鎖来蟄公家片段箱恐有墮髯収不盡覓来驚起雁鳧行用前韻謝元章惠茶二首五夜輕行過故鄉不知箭栝與車箱清風一㸃吹靈府夢㫁江南白鷺行白日騰騰睡醉鄉塵絲撩亂罥巾箱從令易趁繙書課滿眼精神下五行和袁丞蓋嶺長松三首强名呼作大夫官亘古摩空不免冠但惜五封遭一㸃寧如深嶺撼風寒露邊穉葉亦堪餐霜後皴皮更可冠撫此盤旋不憂晚但憂栗里酒樽寒百灘飛度半雲端波浪聲雄不濕冠嚲袖垂鞭徐進馬市塵無此雪風寒和李無變與諸公出郊訪王彦博病来無力勝鞍馬不得蘭亭共一觴射雉如臯猶不笑散花方丈錦千張和李無變求詩十年慘淡經營處一㸃青熒燈火知平日詩從天外得只今天外總無詩和秋日即事韻二首駮駮山蒼雜水紅不如冷眼看秋風北鴻已望江南起飛過榆林月正中蕭琦云燕人喜射鴈鴈南嚮多夜度初楓葉外數行飛瘦竹竿頭一㸃黐浮世危機總如此青蛇飛處且相隨千葉梅一枝獨立衆芳先小翠長紅一任妍縞袂仙人来閱世向来手眼故千千新竹我不疎君君自疎此君於我定何如中庭明月常常在卷地風来不掃除合歡扇明月雖圓有缺時合歡安有百年期故令六六深宫女淚落君前自不知九華扇玉斧修成玉兔宫蕭蕭無日不秋風九華紫翠騰空起取次拈來在掌中紗扇八字囘環字字精一規孤月半銖輕只應来自鮫人室風動猶聞細浪聲簡文帝紗扇銘照月空光耀發風霜黄鵠扇摩盡青雲到紫微玉城風露冷霏霏政令同落生綃上亦勝空梁一燕飛竹扇二首脱盡龍兒錦繡衣一枝變化作千絲泠然不受人間暑誰道清風有歇時老龍飛去葛家陂尚有龍兒戲錦衣只恐世塵吹不盡世塵吹盡聴龍歸白羽扇二首昔卧隆中今渭湄真龍長御快風飛出關吹碎兒郎膽安用軍師更指揮鼎足三雄各立時卧龍騰起向西飛渭川波盡搖明月百萬貔貅聴指揮七寳扇七寶薫開萬竅風靈犀一㸃與天通婆娑吹動紅爐雪總在清涼世界中六角扇二首一自昭陵掩閟都龍跳虎卧世間疎如今縱有千金璧不博當年十字書昔日蘭亭暢惠風至今不與庶人同百金五字都休問修竹清湍在眼中蒲葵扇輕蒲獵獵野風秋吹上蟾宫白玉樓想見東山紅粉裏超然惟有此風流道經或云道家無經旨五千言而已故作詩以咄之端拱主人無語句臺輿僕隸閙喧闐希聲絶想忘言處海水墨山書不全雪山集卷十五
