body:
  text: 雪山集卷二宋王質撰奏議論廟謀疏一曰浮言勿搖臣嘗論之夫人之為國利之不能不喜害之不能不懼惟其當利害之際喜而不示其喜之之形懼而不露其懼之之迹故其虗實不可得而窺而淺深不可得而測何者慮之素定故不搖養之素厚故不驚彼其輕喜而驟懼者皆慮之不定養之不厚故倉卒迫懼之中利得以怵而動害得以脅而遷嗟夫天下之變生于有間而可入善為國者深藏其喜懼之端補綻縫隙以自祕其肺腑使人探之而莫能抵其淵叩之而莫能揣其鑰窮搜曲覽而莫能得其要領當是之時雖有強鄰悍敵亦且逡巡退縮而不敢措意于我臣觀自古謀人之國既先誘之以利又喝之以害所以尋其間也或者不能閉其尋之之路而開其入之之門喜懼之情洋溢于內表著于外故墮其計而不知此何異摶人而授之以手足盜在門而自啓其鍵也其亦可謂大惑矣蓋昔者秦人欲以十五城而易趙璧趙人雖吝于豫璧而喜于得城璧既入而城不割則倉皇攜璧以歸夫秦人以虎狼之心欲盡吞諸侯而宰天下其志豈在璧也而藉以試趙趙人信之則秦人固已得其肺腑矣是以暴驁陵劫至于加兵而不忌蓋知其無能為也楚子伐宋不服令其師曰築室反耕楚烏能築室反耕也哉何者越千里以伐人而強晉蠢蠢然又有欲動之勢形孤而心搖必不能久矣而華元不得其情震悼惴栗奔走求盟若不可以終日此其勢不得不折而歸楚是二國者其初未嘗有致弱之形而不能自窒其間近者傳北朝欲歸河南之地臣聞之士大夫以為朝廷至于動色相慶已而聞北朝欲遷汴京之都臣聞之士大夫以為朝廷錯愕而莫知所為夫河南之歸汴京之遷此不待智者而得其是非矣何者古之棄地有三或不能有而棄或無所得而棄或交相易而棄此三者今北朝皆無焉臣固知河南之不歸也然而此言之所以出者臣恐北朝之謀以利誘我而試其喜不喜也古之遷都有三或以兵火殘敝而遷或以鄰敵窺伺而遷或以形勢迫隘而遷此三者今北朝皆無焉臣固知汴京之不遷也然而此言之所以出者臣恐北朝之謀以害喝我而試其懼不懼也此正當今窒間之時而喜懼之形烏可輕出哉臣讀東晉謝安傳而詳觀之處利害之際至于苻堅之寇而不為懼謝元之勝而不為喜案謝元之元宋時避廟諱所改未嘗不咨嗟嘆息以為後世君子之莫及而推原其故則蓋本于慮之素定而養之素厚是以利不能誘害不能喝夫天下之事緣飾之則以文雅而鎮壓之則以器局就二者而輕重之寧不足于文雅而器局之君子天下國家不可一日無也二曰小利勿動臣嘗論之曰靜而觀利害之變揣其輕重量其多寡而擇其害輕利重害寡利多者為之雖間有所拂于世俗然固當有所勿恤何者天下之利害紛綸反覆于冥漠之中搏之而不可執其形尋之而不可究其端然輕重自有定勢而多寡自有定量甚不難知也今夫以銖兩鈞石而視衡則銖不若兩兩不若鈞鈞不若石以籥合升斗斛而觀量則籥不若合合不若升升不若斗斗不若斛善處利害者如衡之于銖兩鈞石量之于籥合升斗斛深明于毫忽之間曲辨于勺撮之際惟夫世之君子心不平而氣不定高則為名所眩下則為利所怵是以輕重之定勢多寡之定量舉惶惑顛倒而莫知朝錯之削七國朱异之納侯景楊國忠之服安南昔以為利一而害百者利一而害百雖童子亦有所避而不為執天下之柄而不若童子之識亦可謂大拙矣臣嘗嘆伏㑹昌宰相李德裕之善處事以為非庸材常智所可及烏介可汗飢不能振退渾党項請以部落擊之因天德軍使田牟以為言德裕曰不可沙陀退渾不可恃也見利則進遇敵則走誰肯為用耶天德兵素弱以一城與徑敵角必敗黠戛斯來言攻安西北庭武宗欲求其地德裕曰不可安西距京師七千里北庭五千里異時河隴為我郡縣故能緩急調運河隴既入吐蕃則何所興發何道餽挽縱得無用嗟夫有誅敵之便而不進有得地之勢而不取此庸材常智之所謂失機者也而德裕所以揣輕重者甚明而量多寡者甚精以為誅敵而生釁則不如勿誅得地而耗財則不如勿得故他人以為可德裕以為不可而今之謀利害者不然近者括沙田籍銅器此其為利亦末矣臣聞之士大夫沙田之數租以石計錢以緡計殆不過十數萬而淮浙西之民咨嗟憤恨有甚不堪者舉天下之銅器而付之爐冶或者以為風餐土食之餘薪烹火化之後頗不利于鑄錢而生民器用一掃而空之此二者皆以豪髮之利而召天下之怨豈非謀利害者不揣輕重不量多寡之過與臣聞天下之人誰能皆有以順適其意苟使吾事舉而有功功成而有利則雖朝謗夕誹固有不必問者今之所圗者百分之勞曾未有一分之獲而天下已紛紜議論而不可禁臣竊以為善計利害者不為也論舉能疏一曰寬大臣夫所謂寬大臣者何也臣嘗論之曰古之大臣其操心也不危其臨事也不忌是以優游閒散而能有所建立夫使大臣而下比小吏瑟縮踧踖常若有所掣其肘而履其足者左顧右盼惟恐他人得以短長是非而議其後坐于廟堂凛然燕之巢幕也當是之時惟夫無能不才慕恩寵保爵位之人然後能靦顔安據乎其上而竒傑大度之士以有為之才而束之小吏之律則亦褰裳而去有所不顧者故夫天子之于大臣使其施為措置不盡拘于繩墨規矩之內間有所斡旋提挈以讋天下之情夫既為天子之大臣則當開胸露臆以與天子共推無疑之心不可為曲亷細謹以自免于衆人之議而僥幸于久安而不奪夫曲亷細謹非所以為大臣體也其賢不過為張禹孔光而不肖者乃至于蘇循趙涉夫其開胸露臆而無所疑其上者遂為伊尹周公而下亦不失為杜黃裳李德裕天下徒見夫王莽楊堅之流盜權而取國以謂凡為大臣者舉不可以有所為而不知王莽楊堅之流固不世世有也如是則拱手卷舌而已矣蓋昔者堯舜之咨四嶽曰孰能乂水也四嶽曰鯀可曰孰能㢲朕位也四嶽曰舜可夫鯀之方命圮族雖堯舜亦度其不可用而四嶽乃以甚不肖之人而猥充至重之責自今視之必曰是誤國也舉天下而豫人豈細事哉而四嶽遽以在下匹夫而上居天子之正位自今觀之必曰是非所當言也蓋古之君臣相與忘機于形迹之外小過不責大言不怒然後能濟天下之功今之大臣何其甚謹也平日之論薦者才氣雄渾足以任重而道逺者何人也議論慷慨足以籌安而慮危者何人也幹局明練足以剸繁而解紛者何人也以臣觀之非雕章繪句而取科第則守已畏事而省過失者也夫雕章繪句而取科第君子謂之陋儒守已畏事而省過失君子謂之庸夫非天子大臣所宜論薦也然此二流者雖不足以立事亦不足以纍人大臣論薦而出此無乃取其不足以纍人而不恤其不足以立事歟懼馬之奔蹶而求其無奔蹶者可矣取偶馬乘之曰吾懼其奔蹶也不亦太過矣乎臣非敢妄詆大臣之論薦也然慮其操心太危臨事太忌而偶馬得至乎其間也欲使大臣操心不危臨事不忌則莫若陛下少寬假之略其小失而責之以大綱使大臣稍稍釋去負背之芒刺從容伴奐措意于法律之外而專搜天下英偉豪傑之才必不敢徒為論薦以虗文而塞上意臣愚以謂小有所肆者乃大有所畏也二曰制私情夫所謂制私情者何也臣嘗論之曰古者才則進不才則退舉天下之才而其進退舉不出于此兩者而今進退才與不才俱無預乎其間古者士大夫皆涵養醖釀于學校之中司徒之所謂選士則士之秀者也學之所謂進士則造士之秀者也司馬之所謂辨論官材則又進士之賢者也天下之士萃而奔走于天子之爵祿惟其秀且賢者得之秀者異于人賢者過于人之謂也至于東寄而西棘則皆恬于為惡而不變者也夫是之謂有才者進不才者退自後世才與不才混并為一而所謂進退者惟其有力無力而已有力者不患其不才而無力者雖有才而不濟是故爵祿之公器而集乎權勢之私門此其勢然也蓋制私者不強其勢而反之正而使平其勢而不趨乎偏故祖宗所為舉薦之格者所以均天下進退之勢也今之法大略自迪功推而上之必三削而後遷謂之關升自從政推而上之必五削而後遷謂之改官而其上所當舉薦之人以章計之嵗有定數以人計之嵗有定員如是而後有力者有所格而不得騁而無力者亦得以馴致而序進臣故曰祖宗所以均天下進退之勢也自今觀之進退之勢初未嘗均非法之有弊也法為人所勝也非人之能勝法也人為情所勝也凡人之情有所畏則有所迫有所愛則有所牽迫者牽者交勝則天下之公法徇于一人之情有不得不然者今夫某人操某人之書而謁于某人此必有所挾也挾之愈重則應之愈速謂之應副其求者又如執劵之取償其應之也如取諸懷而豫之也有某章而不敢用有某人而不敢舉曰後將無以應權勢之請也謂之準備寧忍而不發以俟夫急而應也某人禱某人而求薦某人則某人亦禱某人而求薦某人謂之换易內有不酬從而為辭曰某人債未償也或委某人而治某事則先令之曰某事集則以某章薦或以某人營某物則隂囑之曰某物至則以某章薦謂之酬勞有不如其所欲不特不薦而已又加以罪焉夫是四弊者舉內外流之失也臣嘗謂應副之弊凖備之弊是生于畏而有所迫换易之弊酬勞之弊是生于愛而有所牽臣愚欲望陛下明諭當薦舉之人舉某人則列其實曰臣以某事而舉某人也既以名聞則京秩而上付之給舍京秩而下付之都司是其所以然而駮其所以不然既定則付之御史以按其姦此其事雖繁然可以制人畏愛之私情庶幾有所憚而不至于大縱今某之論曰是無益也植藩籬固扃鑰雖未足以禦盜不猶愈于撤藩籬而啓扃鑰以聽其自至者哉是謂之無益不可也論馭臣疏一曰勿窮恩臣嘗論之聖人之服天下惟其我無望于人而人不能無望于我夫是以能鼓舞天下才俊豪傑之士至于奔走勞苦終其身而不厭夫天下之才㑓豪傑所謂奔走勞苦終其身而不厭者何也有所深慕而不可以遽取有可得之方而無必得之理欲進則有所格欲退則有所不忍捨聖人默藏其顧盼顰笑而天下爭先為役而聖人漠然終未嘗有所求于天下夫使天下才㑓豪傑之士稍有所長則挾其所習以邀其上軒然自以為天子不可一日無我也而天子惟其欲之為徇慊然亦自以為天下不可以一日而無斯人也天子以為天下不可以一日而無斯人則斯人亦以為天子不可以一日而無我夫如是則黃帝堯舜不能以號召天下嗟夫天下誠不可無才㑓豪傑之士也而不可使之失機故聖人駕馭才俊豪傑之士亷于用恩而信于用法大抵以為我之所賴于爾者輕而爾之所托于我者重我可以無爾而爾不可以無我然後聖人之所以憑藉而倚仗者甚重而不輕也是之謂機昔者漢高帝崛起于匹夫之微而與秦楚爭天下所藉以為心膂爪牙者惟二三豪傑是賴然高帝銖分寸量未嘗有以大慰其心下某城則得某邑破某敵則錫某爵否則終嵗不遷至于以一齊而授韓信猶靳靳而不肯豫彼髙帝非有所嗇以為我之官爵有時而窮土地有時而盡也要使有時而窮者常若無窮有時而盡者常若無盡使夫豪傑之士相與回旋曲折于無窮盡之中而莫自知此固高帝之所以為善將將者也唐明皇寵一安祿山自營州都督十遷而至宰相自平盧一軍五增而兼三道之兵祿山之才未盡而爵祿已窮矣臣聞之習鷹者搏擊之權在鷹而飲食之權在人故鷹之于人常不惜其搏擊之力以易其飲食之資而人之于鷹常重惜其飲食之資以邀其搏擊之力而後能用鷹有淺丈夫者惴惴然惟恐其不可使也則雉雞鼠日陳于前其不揚去者鮮矣尚安能為我盡力于搏擊哉明皇之于祿山是養鷹而飽者也臣嘗論祿山逆計萌于天寶之中年然而隱忍涵養以爵祿之窮而後發是故役使天下豪傑之士必使彼之才有盡而我之爵祿不可窮今之為大將平居無事為天子統㑹士卒而已非有攻城掠地之功汗馬之勞也然而無故而進某階加某職夫今之為大將者類非小官也馴致不已不數月可以極人臣之位昔者曹彬克江南太祖皇帝惜一莭度使不與拳拳留之以待巴蜀之平狄青交廣逐儂智髙議者欲寵以樞密使獨宰相龐籍以為西北猶未平後有大功何以賞之蓋其深謀逺慮以為寧使之常有所不足而不可使之自安于有餘今無故而窮之何也且天下未嘗無緩急也窮之于無事之時則何以使之于有事之際乎臣懼其才未盡而爵祿先窮也二曰勿開隙臣嘗論之天下之患其開也有隙其成也有形方其開也棲之則墜轉之則散稍縱而弛則復合往來翕忽眇眇綿綿使人可以疑可以欺夫是之謂隙及其成也掩于東而生于西抑于內而振于外極力而攻之力愈窮而患愈熾夫是之謂形天下之患惟不可使至于形成天下之患而至于形成雖有敏者不可以措手嗟夫世之君子其所以待天下之變盡矣而惟其杜隙者甚難彼其智非不足以知也而知之以為無足憂何者見其微而不察其著見其小而不極其大見其所出而不推原其所窮夫三者是拱手而待變也蓋臣思之荷堅之寵鮮卑李林甫之任邊將僕固懷恩之裂河北杜元頴崔植之縱朱克融皆熟視其隙而不為彌縫補苴以塞其變近者至于陷國忘身而逺者至于遺害數百年而不息臣嘗密察天下之患其狀如長江大河方其激然若有所泄而不能潰凝然若有所鬱而不得發回旋曲折隂蓄其怒于其心而朝搜暮求以尋其馳騁奔衝之路于此之時而不為之髙其隄防以殺其暴導其支派以泄其潰其勢必咆哮騰踴蕩然而四出壤城郭包陵谷而不可治然天下之人不能曲盡水之情狀狎其安流而忽其無事以為無足畏者則是引水而橫流于天下也臣觀漢唐之季皆由宦官斫喪其國內脅人主戕公卿外招姦雄連盜賊至于舉天下鬨然而起縱橫奔突天下卒至亂而不可制蓋其慘如此臣嘗細究其源則似甚微蓋自竇憲兄弟竊威弄權而鄭衆于是有功故臣以為漢之宦官其隙開于鄭衆其形成于孫程曹騰而極于曹節王甫自安南林邑之擾而楊思勉于是有功故臣以為唐之宦官其隙開于楊思勉其形成于李輔國仇士良國家宣和之末紹興之初因宦官而召亂者再而至于今亦少損矣平居廣殖貨財縱享娛樂窮極滋味此近習之常態固無足怪者臣獨慮其爭引朝士以為門人此其漸則不可以不制且民間之論以為某人之進某人主之臣非舉以為信也而熟察其迹則不為無證何者天子之密㫖或泄而外傳而人臣之私情或不旋踵而疾應非此曹而誰為也嗟夫天下之事有聚必有散有所甚昵則必有所甚踈唐自開元之間髙力士引宇文融楊國忠韋堅王鉷而南北司合而為一自永泰以後元載殺魚朝恩而南北司判而為二其合也則南司藉北司以成姦其判也則南司因北司以成釁此其勢之相激有不得不然者今日勿使合而為一則異時不至于判而為二此陛下不可不留意也雪山集卷二
